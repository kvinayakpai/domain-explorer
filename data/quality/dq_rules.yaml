    expectation: "every planogram_position.sku_id resolves in sku"
    severity: critical
    sql: "SELECT COUNT(*) FROM category_management.planogram_position pp LEFT JOIN category_management.sku s ON pp.sku_id = s.sku_id WHERE s.sku_id IS NULL"

  - id: dq_cm_007
    subdomain: category_management
    table: category_management.planogram
    column: status
    rule_type: distribution
    expectation: "planogram.status in canonical enum"
    severity: high
    sql: "SELECT COUNT(*) FROM category_management.planogram WHERE status NOT IN ('draft','approved','in_market','superseded','killed')"

  - id: dq_cm_008
    subdomain: category_management
    table: category_management.planogram
    column: effective_to
    rule_type: integrity
    expectation: "effective_to must be on or after effective_from"
    severity: high
    sql: "SELECT COUNT(*) FROM category_management.planogram WHERE effective_to IS NOT NULL AND effective_from IS NOT NULL AND effective_to < effective_from"

  - id: dq_cm_009
    subdomain: category_management
    table: category_management.distribution_record
    column: acv_weight
    rule_type: range
    expectation: "acv_weight must be in [0,1] — it's a fractional weight"
    severity: medium
    sql: "SELECT COUNT(*) FROM category_management.distribution_record WHERE acv_weight IS NOT NULL AND (acv_weight < 0 OR acv_weight > 1)"

  - id: dq_cm_010
    subdomain: category_management
    table: category_management.syndicated_measurement
    column: source
    rule_type: distribution
    expectation: "syndicated_measurement.source in known providers"
    severity: medium
    sql: "SELECT COUNT(*) FROM category_management.syndicated_measurement WHERE source NOT IN ('circana_unify','niq_connect','numerator','kantar_worldpanel','first_party')"

  # ---------- procurement_spend_analytics (Manufacturing) ----------
  - id: dq_psa_001
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.supplier
    column: duns_number
    rule_type: format
    expectation: "supplier.duns_number is exactly 9 numeric digits when present (D&B DUNS)"
    severity: high
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.supplier WHERE duns_number IS NOT NULL AND NOT regexp_matches(duns_number, '^[0-9]{9}$')"

  - id: dq_psa_002
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.supplier
    column: supplier_id
    rule_type: uniqueness
    expectation: "supplier_id is unique across the supplier master"
    severity: critical
    sql: "SELECT (SELECT COUNT(*) FROM procurement_spend_analytics.supplier) - (SELECT COUNT(DISTINCT supplier_id) FROM procurement_spend_analytics.supplier)"

  - id: dq_psa_003
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.contract
    column: expiry_date
    rule_type: integrity
    expectation: "contract.expiry_date must be on or after contract.effective_date"
    severity: critical
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.contract WHERE effective_date IS NOT NULL AND expiry_date IS NOT NULL AND expiry_date < effective_date"

  - id: dq_psa_004
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.contract
    column: supplier_id
    rule_type: foreign_key
    expectation: "every contract.supplier_id resolves in supplier"
    severity: critical
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.contract c LEFT JOIN procurement_spend_analytics.supplier s ON c.supplier_id = s.supplier_id WHERE s.supplier_id IS NULL"

  - id: dq_psa_005
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.purchase_order
    column: supplier_id
    rule_type: foreign_key
    expectation: "every purchase_order.supplier_id resolves in supplier"
    severity: critical
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.purchase_order po LEFT JOIN procurement_spend_analytics.supplier s ON po.supplier_id = s.supplier_id WHERE s.supplier_id IS NULL"

  - id: dq_psa_006
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.purchase_order
    column: status
    rule_type: distribution
    expectation: "purchase_order.status in canonical lifecycle enum"
    severity: medium
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.purchase_order WHERE status NOT IN ('draft','approved','sent','partially_received','received','invoiced','closed','cancelled')"

  - id: dq_psa_007
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.po_line
    column: po_id
    rule_type: foreign_key
    expectation: "every po_line.po_id resolves in purchase_order"
    severity: critical
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.po_line pl LEFT JOIN procurement_spend_analytics.purchase_order po ON pl.po_id = po.po_id WHERE po.po_id IS NULL"

  - id: dq_psa_008
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.po_line
    column: line_amount
    rule_type: invariant
    expectation: "po_line.line_amount must be non-negative"
    severity: high
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.po_line WHERE line_amount IS NOT NULL AND line_amount < 0"

  - id: dq_psa_009
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.invoice
    column: total_amount
    rule_type: invariant
    expectation: "invoice.total_amount must not exceed parent purchase_order.total_amount * 1.10 (tolerance band)"
    severity: high
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.invoice i JOIN procurement_spend_analytics.purchase_order po ON i.po_id = po.po_id WHERE i.total_amount IS NOT NULL AND po.total_amount IS NOT NULL AND i.total_amount > po.total_amount * 1.10"

  - id: dq_psa_010
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.invoice
    column: match_type
    rule_type: distribution
    expectation: "invoice.match_type in canonical enum"
    severity: medium
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.invoice WHERE match_type NOT IN ('two_way','three_way','exception','none')"

  - id: dq_psa_011
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.invoice
    column: matched
    rule_type: invariant
    expectation: "invoice.matched=true requires match_type in ('two_way','three_way') — internal consistency"
    severity: high
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.invoice WHERE matched = TRUE AND match_type NOT IN ('two_way','three_way')"

  - id: dq_psa_012
    subdomain: procurement_spend_analytics
    table: procurement_spend_analytics.category_taxonomy
    column: category_code
    rule_type: format
    expectation: "category_code must be a UNSPSC 8-digit code"
    severity: high
    sql: "SELECT COUNT(*) FROM procurement_spend_analytics.category_taxonomy WHERE NOT regexp_matches(category_code, '^[0-9]{8}$')"
