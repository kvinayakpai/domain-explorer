# Master KPI library — canonical, deduplicated catalog aggregated across the
# 116-subdomain taxonomy. Each entry includes:
#   formula      — math used to compute the metric
#   unit         — reporting unit (%, USD, hours, count, etc.)
#   direction    — higher_is_better | lower_is_better | target_band
#   definition   — 1–2 sentences explaining the metric
#   vertical     — primary vertical (one of the 16 verticals)
#   subdomains[] — subdomain ids that use this KPI (auto-augmented at load)
#   related_personas[] — typical owners / consumers
#
# Generated/refreshed by tools/build_kpi_master.py from data/taxonomy/*.yaml.
# Hand-curated definitions for the 7 anchor subdomains; the breadth library
# carries auto-generated metadata that can be hand-tuned over time.

kpis:
  # ============================================================
  # Anchor: Payments (BFSI)
  # ============================================================
  - id: pay.kpi.stp_rate
    name: STP Rate
    formula: straight_through_count / total_count
    unit: "%"
    direction: higher_is_better
    definition: Share of payment transactions that complete end-to-end without manual repair or human intervention. Higher rates correlate with lower per-transaction operational cost.
    vertical: BFSI
    subdomains: [payments]
    related_personas: [Head of Payments, Payments Operations Lead]
    decisionsSupported: [pay.d.partner_mix]
  - id: pay.kpi.settlement_latency
    name: Settlement Latency
    formula: avg(settlement_ts - auth_ts)
    unit: hours
    direction: lower_is_better
    definition: Average elapsed time between authorisation and the merchant's funds being settled. Shorter latency means better merchant cash flow and pricing power.
    vertical: BFSI
    subdomains: [payments]
    related_personas: [Head of Payments, CFO]
    decisionsSupported: [pay.d.rail]
  - id: pay.kpi.chargeback_ratio
    name: Chargeback Ratio
    formula: chargebacks / sales_count
    unit: "%"
    direction: lower_is_better
    definition: Share of sales transactions that result in a cardholder dispute. Above network thresholds (~1%) it triggers monitoring programs and fines.
    vertical: BFSI
    subdomains: [payments]
    related_personas: [Fraud/Risk Lead, Payments Operations Lead]
    decisionsSupported: [pay.d.dispute_invest, pay.d.fraud_threshold]
  - id: pay.kpi.afr
    name: Auth Failure Rate (AFR)
    formula: failed_auths / total_auths
    unit: "%"
    direction: lower_is_better
    definition: Share of authorisation requests that the issuer declines. Tracked by issuer, BIN, and rail to localise root causes.
    vertical: BFSI
    subdomains: [payments]
    related_personas: [Fraud/Risk Lead, Head of Payments]
    decisionsSupported: [pay.d.fraud_threshold]
  - id: pay.kpi.interchange_revenue
    name: Interchange Revenue
    formula: sum(interchange_amount)
    unit: USD
    direction: higher_is_better
    definition: Gross interchange-fee income earned across acquirers, card networks, and rails over a period.
    vertical: BFSI
    subdomains: [payments]
    related_personas: [CFO, Head of Payments]
    decisionsSupported: [pay.d.partner_mix]
  - id: pay.kpi.dispute_resolution_time
    name: Dispute Resolution Time
    formula: avg(resolved_ts - opened_ts)
    unit: days
    direction: lower_is_better
    definition: Average elapsed days from chargeback opened to a final resolution (won/lost/refunded).
    vertical: BFSI
    subdomains: [payments]
    related_personas: [Payments Operations Lead]
    decisionsSupported: [pay.d.dispute_invest]

  # ============================================================
  # Anchor: P&C Claims (Insurance)
  # ============================================================
  - id: pcc.kpi.cycle_time
    name: Claim Cycle Time
    formula: avg(closed_ts - fnol_ts)
    unit: days
    direction: lower_is_better
    definition: Average elapsed days from first notice of loss (FNOL) to claim closure. Shorter cycles improve NPS and reduce loss adjustment expense.
    vertical: Insurance
    subdomains: [p_and_c_claims]
    related_personas: [Chief Claims Officer, FNOL Operations Manager]
    decisionsSupported: [pcc.d.fast_track]
  - id: pcc.kpi.leakage
    name: Claims Leakage
    formula: sum(avoidable_paid) / sum(paid)
    unit: "%"
    direction: lower_is_better
    definition: Share of paid losses that should have been avoided through correct coverage interpretation, fraud detection, or subrogation.
    vertical: Insurance
    subdomains: [p_and_c_claims]
    related_personas: [SIU Lead, Senior Claims Adjuster]
    decisionsSupported: [pcc.d.assign]
  - id: pcc.kpi.severity
    name: Severity
    formula: sum(paid) / count(claims)
    unit: USD
    direction: lower_is_better
    definition: Average paid amount per closed claim.
    vertical: Insurance
    subdomains: [p_and_c_claims]
    related_personas: [Chief Claims Officer]
  - id: pcc.kpi.frequency
    name: Frequency
    formula: count(claims) / earned_exposure
    unit: per 100 policies
    direction: lower_is_better
    definition: Number of claims reported per unit of earned exposure (e.g. per 100 policy-years).
    vertical: Insurance
    subdomains: [p_and_c_claims]
    related_personas: [Chief Claims Officer]
  - id: pcc.kpi.lae_ratio
    name: LAE Ratio
    formula: loss_adjustment_expense / paid_losses
    unit: "%"
    direction: lower_is_better
    definition: Loss-adjustment expense as a share of paid losses; measures handling cost efficiency.
    vertical: Insurance
    subdomains: [p_and_c_claims]
  - id: pcc.kpi.nps
    name: Claims NPS
    formula: promoters_pct - detractors_pct
    unit: NPS
    direction: higher_is_better
    definition: Net Promoter Score collected from closed-claim customer surveys.
    vertical: Insurance
    subdomains: [p_and_c_claims]

  # ============================================================
  # Anchor: Merchandising (Retail)
  # ============================================================
  - id: mer.kpi.sell_through
    name: Sell-through %
    formula: units_sold / units_received
    unit: "%"
    direction: higher_is_better
    definition: Share of units received from a vendor that have been sold within a window. Used to inform reorders and markdowns.
    vertical: Retail
    subdomains: [merchandising]
    related_personas: [Buyer, Merchandise Planner]
    decisionsSupported: [mer.d.markdown, mer.d.assortment]
  - id: mer.kpi.gmroi
    name: GMROI
    formula: gross_margin / avg_inventory_cost
    unit: ratio
    direction: higher_is_better
    definition: Gross Margin Return on Inventory Investment — gross profit per dollar invested in average inventory.
    vertical: Retail
    subdomains: [merchandising]
  - id: mer.kpi.markdown_pct
    name: Markdown %
    formula: markdown_dollars / sales_dollars
    unit: "%"
    direction: lower_is_better
    definition: Markdown dollars as a percentage of gross sales dollars.
    vertical: Retail
    subdomains: [merchandising]
  - id: mer.kpi.inventory_turn
    name: Inventory Turn
    formula: cogs / avg_inventory
    unit: turns/yr
    direction: higher_is_better
    definition: Number of times inventory is sold and replaced over a year.
    vertical: Retail
    subdomains: [merchandising]
  - id: mer.kpi.oos
    name: Out-of-Stock Rate
    formula: oos_skus / total_skus
    unit: "%"
    direction: lower_is_better
    definition: Share of SKUs that are out of stock at the end of a measurement window.
    vertical: Retail
    subdomains: [merchandising]
    decisionsSupported: [mer.d.allocation]
  - id: mer.kpi.share_of_shelf
    name: Share of Shelf
    formula: facings_brand / total_facings
    unit: "%"
    direction: higher_is_better
    definition: Share of shelf facings dedicated to a brand within a category.
    vertical: Retail
    subdomains: [merchandising, retail_execution]

  # ============================================================
  # Anchor: Demand Planning (CPG)
  # ============================================================
  - id: dem.kpi.mape
    name: Forecast Accuracy (MAPE)
    formula: mean(abs(actual - forecast)/actual)
    unit: "%"
    direction: lower_is_better
    definition: Mean Absolute Percentage Error of the forecast versus actual demand.
    vertical: CPG
    subdomains: [demand_planning]
    related_personas: [Demand Planner, S&OP Lead]
    decisionsSupported: [dem.d.consensus]
  - id: dem.kpi.bias
    name: Forecast Bias
    formula: mean(forecast - actual)
    unit: units
    direction: target_band
    definition: Average signed difference between forecast and actual; positive = over-forecasting, negative = under-forecasting.
    vertical: CPG
    subdomains: [demand_planning]
  - id: dem.kpi.fill_rate
    name: Fill Rate
    formula: lines_filled / lines_ordered
    unit: "%"
    direction: higher_is_better
    definition: Share of order lines fully delivered as ordered (case fill rate).
    vertical: CPG
    subdomains: [demand_planning]
  - id: dem.kpi.otif
    name: OTIF
    formula: orders_on_time_in_full / orders
    unit: "%"
    direction: higher_is_better
    definition: Orders delivered on time, in full, as a share of all orders.
    vertical: CPG
    subdomains: [demand_planning]
  - id: dem.kpi.inventory_days
    name: Inventory Days
    formula: avg_inventory / daily_cogs
    unit: days
    direction: lower_is_better
    definition: Days of inventory held at average daily COGS.
    vertical: CPG
    subdomains: [demand_planning]
  - id: dem.kpi.safety_stock_days
    name: Safety Stock Days
    formula: safety_stock_units / daily_demand
    unit: days
    direction: target_band
    definition: Days of demand covered by safety stock at current daily run rate.
    vertical: CPG
    subdomains: [demand_planning]
    decisionsSupported: [dem.d.safety_stock]

  # ============================================================
  # Anchor: Hotel Revenue Management (TTH)
  # ============================================================
  - id: hrm.kpi.revpar
    name: RevPAR
    formula: total_room_revenue / available_room_nights
    unit: USD
    direction: higher_is_better
    definition: Revenue Per Available Room — composite of ADR × occupancy. The principal hotel performance metric.
    vertical: TTH
    subdomains: [hotel_revenue_management, vacation_rentals]
    related_personas: [Director of Revenue Management, General Manager]
    decisionsSupported: [hrm.d.bar]
  - id: hrm.kpi.adr
    name: ADR
    formula: total_room_revenue / occupied_rooms
    unit: USD
    direction: higher_is_better
    definition: Average Daily Rate — average price per occupied room.
    vertical: TTH
    subdomains: [hotel_revenue_management, vacation_rentals]
  - id: hrm.kpi.occupancy
    name: Occupancy
    formula: occupied_rooms / available_rooms
    unit: "%"
    direction: target_band
    definition: Share of available rooms sold. Targeted around a property's optimal yield curve, not maximised.
    vertical: TTH
    subdomains: [hotel_revenue_management, vacation_rentals]
    decisionsSupported: [hrm.d.overbooking]
  - id: hrm.kpi.mpi
    name: Market Penetration Index (MPI)
    formula: occupancy_property / occupancy_compset
    unit: index
    direction: higher_is_better
    definition: Property's occupancy relative to its competitive set. >1 means winning share.
    vertical: TTH
    subdomains: [hotel_revenue_management]
  - id: hrm.kpi.ari
    name: Average Rate Index (ARI)
    formula: adr_property / adr_compset
    unit: index
    direction: higher_is_better
    definition: Property's ADR relative to its competitive set.
    vertical: TTH
    subdomains: [hotel_revenue_management]
  - id: hrm.kpi.rgi
    name: Revenue Generation Index (RGI)
    formula: revpar_property / revpar_compset
    unit: index
    direction: higher_is_better
    definition: Property's RevPAR relative to its competitive set; the composite of MPI × ARI.
    vertical: TTH
    subdomains: [hotel_revenue_management]
  - id: hrm.kpi.bar_variance
    name: BAR Variance
    formula: avg(actual_bar - planned_bar)
    unit: USD
    direction: target_band
    definition: Average difference between actual Best-Available Rate and the rate planned by the RMS.
    vertical: TTH
    subdomains: [hotel_revenue_management]

  # ============================================================
  # Anchor: MES & Quality (Manufacturing)
  # ============================================================
  - id: mes.kpi.oee
    name: OEE
    formula: availability * performance * quality
    unit: "%"
    direction: higher_is_better
    definition: Overall Equipment Effectiveness — composite of equipment availability, throughput performance, and first-pass quality.
    vertical: Manufacturing
    subdomains: [mes_quality, shop_floor_iot]
    related_personas: [Plant Manager, OT Engineer]
    decisionsSupported: [mes.d.line_balance]
  - id: mes.kpi.fpy
    name: First Pass Yield
    formula: good_units_first_try / total_started
    unit: "%"
    direction: higher_is_better
    definition: Share of units that pass quality on the first attempt without rework or scrap.
    vertical: Manufacturing
    subdomains: [mes_quality]
  - id: mes.kpi.scrap
    name: Scrap Rate
    formula: scrap_units / total_units
    unit: "%"
    direction: lower_is_better
    definition: Units scrapped as a share of total units started.
    vertical: Manufacturing
    subdomains: [mes_quality]
    decisionsSupported: [mes.d.scrap_root_cause]
  - id: mes.kpi.mtbf
    name: MTBF
    formula: total_operational_time / failure_count
    unit: hours
    direction: higher_is_better
    definition: Mean Time Between Failures — average operational time between equipment failures.
    vertical: Manufacturing
    subdomains: [mes_quality, predictive_maintenance, shop_floor_iot]
    decisionsSupported: [mes.d.maintenance]
  - id: mes.kpi.mttr
    name: MTTR
    formula: total_repair_time / failure_count
    unit: hours
    direction: lower_is_better
    definition: Mean Time To Repair — average elapsed time to restore a failed asset to service.
    vertical: Manufacturing
    subdomains: [mes_quality, network_operations, shop_floor_iot]
  - id: mes.kpi.cpk
    name: CpK
    formula: min((USL-mu)/(3*sigma), (mu-LSL)/(3*sigma))
    unit: index
    direction: higher_is_better
    definition: Process capability index. Measures how well a process fits inside its spec limits, accounting for centring.
    vertical: Manufacturing
    subdomains: [mes_quality]

  # ============================================================
  # Anchor: Pharmacovigilance (LifeSciences)
  # ============================================================
  - id: pv.kpi.case_processing_time
    name: Case Processing Time
    formula: avg(closed_ts - intake_ts)
    unit: days
    direction: lower_is_better
    definition: Average days from ICSR intake to case closure (locked in the safety database).
    vertical: LifeSciences
    subdomains: [pharmacovigilance]
    related_personas: [PV Scientist, Medical Reviewer]
    decisionsSupported: [pv.d.expedited]
  - id: pv.kpi.signal_latency
    name: Signal Detection Latency
    formula: avg(signal_flagged_ts - first_event_ts)
    unit: days
    direction: lower_is_better
    definition: Average days from the first AE that contributed to a signal to the moment it was flagged for review.
    vertical: LifeSciences
    subdomains: [pharmacovigilance]
    decisionsSupported: [pv.d.signal]
  - id: pv.kpi.submission_timeliness
    name: Regulatory Submission Timeliness
    formula: on_time_submissions / total_submissions
    unit: "%"
    direction: higher_is_better
    definition: Share of regulatory submissions filed by their statutory due date.
    vertical: LifeSciences
    subdomains: [pharmacovigilance]
  - id: pv.kpi.icsr_volume
    name: ICSR Volume
    formula: count(ICSRs)
    unit: cases
    direction: target_band
    definition: Number of Individual Case Safety Reports received per period. Sudden surges may indicate signal or data-quality issues.
    vertical: LifeSciences
    subdomains: [pharmacovigilance]
  - id: pv.kpi.ae_pt_accuracy
    name: AE-to-PT Mapping Accuracy
    formula: correct_PT_codings / sampled_codings
    unit: "%"
    direction: higher_is_better
    definition: Sampled accuracy of MedDRA preferred-term coding for adverse events.
    vertical: LifeSciences
    subdomains: [pharmacovigilance]

  # ============================================================
  # Breadth — Insurance
  # ============================================================
  - { id: act.kpi.combined_ratio, name: Combined Ratio, formula: (losses + expenses)/earned_premium, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [actuarial_pricing], definition: "Sum of loss ratio and expense ratio. Below 100% indicates underwriting profit." }
  - { id: act.kpi.scr_ratio, name: Solvency Capital Ratio, formula: own_funds / scr, unit: "%", direction: higher_is_better, vertical: Insurance, subdomains: [actuarial_pricing], definition: "Own funds expressed as a percentage of Solvency Capital Requirement." }
  - { id: act.kpi.reserve_strengthening, name: Reserve Strengthening, formula: prior_year_dev / reserves, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [actuarial_pricing], definition: "Adverse development on prior accident years as a share of held reserves." }
  - { id: act.kpi.rate_change, name: Rate Change, formula: new_rate / old_rate - 1, unit: "%", direction: target_band, vertical: Insurance, subdomains: [actuarial_pricing], definition: "Period-over-period change in filed rates." }
  - { id: act.kpi.pricing_lift, name: Model Pricing Lift, formula: gini_coefficient, unit: ratio, direction: higher_is_better, vertical: Insurance, subdomains: [actuarial_pricing], definition: "Gini-style discriminatory power of the pricing model on the validation set." }
  - { id: clm.kpi.subrogation_recovery, name: Subrogation Recovery Rate, formula: recovered / recoverable, unit: "%", direction: higher_is_better, vertical: Insurance, subdomains: [claims_subrogation], definition: "Share of identified-recoverable losses actually recovered from third parties." }
  - { id: clm.kpi.reopen_rate, name: Reopen Rate, formula: reopened / closed, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [claims_subrogation], definition: "Share of closed claims that get reopened — an indicator of premature closure." }
  - { id: la.kpi.persistency, name: 13-month Persistency, formula: active_at_13m / issued, unit: "%", direction: higher_is_better, vertical: Insurance, subdomains: [life_annuity], definition: "Share of policies still in force 13 months after issuance." }
  - { id: la.kpi.surrender_rate, name: Surrender Rate, formula: surrenders / in_force, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [life_annuity], definition: "Share of in-force policies surrendered during the period." }
  - { id: la.kpi.new_business_apv, name: New Business APV, formula: sum(annual_premium_value), unit: USD, direction: higher_is_better, vertical: Insurance, subdomains: [life_annuity] }
  - { id: la.kpi.claim_ratio, name: Mortality / Claim Ratio, formula: claims_paid / earned_premium, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [life_annuity] }
  - { id: la.kpi.unitlinked_aum, name: Unit-Linked AUM, formula: sum(fund_value), unit: USD, direction: higher_is_better, vertical: Insurance, subdomains: [life_annuity] }
  - { id: re.kpi.ceded_ratio, name: Ceded Premium Ratio, formula: ceded / gross_premium, unit: "%", direction: target_band, vertical: Insurance, subdomains: [reinsurance] }
  - { id: re.kpi.recoverables, name: Reinsurance Recoverables, formula: sum(recoverable), unit: USD, direction: higher_is_better, vertical: Insurance, subdomains: [reinsurance] }
  - { id: re.kpi.commission_ratio, name: Ceding Commission Ratio, formula: commission / ceded_premium, unit: "%", direction: target_band, vertical: Insurance, subdomains: [reinsurance] }
  - { id: re.kpi.dso, name: Reinsurer DSO, formula: avg(days_outstanding), unit: days, direction: lower_is_better, vertical: Insurance, subdomains: [reinsurance] }
  - { id: re.kpi.cat_concentration, name: CAT Concentration, formula: largest_treaty / total, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [reinsurance] }
  - { id: uw.kpi.hit_ratio, name: Quote-to-Bind Hit Ratio, formula: bound / quoted, unit: "%", direction: higher_is_better, vertical: Insurance, subdomains: [underwriting] }
  - { id: uw.kpi.loss_ratio, name: Loss Ratio, formula: losses / earned_premium, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [underwriting] }
  - { id: uw.kpi.cycle_time, name: UW Cycle Time, formula: avg(decision_ts - submitted_ts), unit: hours, direction: lower_is_better, vertical: Insurance, subdomains: [underwriting] }
  - { id: uw.kpi.declination_rate, name: Declination Rate, formula: declined / submissions, unit: "%", direction: target_band, vertical: Insurance, subdomains: [underwriting] }
  - { id: uw.kpi.referral_rate, name: Referral Rate, formula: referred / submissions, unit: "%", direction: lower_is_better, vertical: Insurance, subdomains: [underwriting] }
  - { id: pa.kpi.renewal_retention, name: Renewal Retention, formula: renewed / eligible, unit: "%", direction: higher_is_better, vertical: Insurance, subdomains: [policy_admin] }
  - { id: pa.kpi.billing_dso, name: Billing DSO, formula: avg(days_outstanding), unit: days, direction: lower_is_better, vertical: Insurance, subdomains: [policy_admin] }
  - { id: pa.kpi.policy_count, name: Policies-in-Force, formula: count(active_policies), unit: policies, direction: higher_is_better, vertical: Insurance, subdomains: [policy_admin] }

  # ============================================================
  # Breadth — BFSI
  # ============================================================
  - { id: cm.kpi.trade_break_rate, name: Trade Break Rate, formula: breaks / total_trades, unit: "%", direction: lower_is_better, vertical: BFSI, subdomains: [capital_markets] }
  - { id: cm.kpi.t_plus_1_settlement, name: T+1 Settlement Rate, formula: settled_t1 / eligible_trades, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [capital_markets] }
  - { id: cm.kpi.var, name: Value at Risk (1d 99%), formula: var_1d_99, unit: USD, direction: target_band, vertical: BFSI, subdomains: [capital_markets] }
  - { id: cm.kpi.execution_slippage, name: Execution Slippage vs Arrival, formula: avg(arrival_px - exec_px) / arrival_px, unit: bps, direction: lower_is_better, vertical: BFSI, subdomains: [capital_markets] }
  - { id: cm.kpi.regulatory_breaches, name: Regulatory Breaches, formula: count(breach_events), unit: events, direction: lower_is_better, vertical: BFSI, subdomains: [capital_markets] }
  - { id: card.kpi.activation_rate, name: Activation Rate, formula: activated / issued, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [cards] }
  - { id: card.kpi.spend_per_active, name: Spend per Active Card, formula: total_spend / active_cards, unit: USD, direction: higher_is_better, vertical: BFSI, subdomains: [cards] }
  - { id: card.kpi.delinquency_30, name: 30+ DPD Delinquency, formula: balance_30dpd / total_balance, unit: "%", direction: lower_is_better, vertical: BFSI, subdomains: [cards] }
  - { id: card.kpi.cost_of_rewards, name: Cost of Rewards, formula: rewards_paid / spend, unit: "%", direction: target_band, vertical: BFSI, subdomains: [cards] }
  - { id: card.kpi.attrition, name: Card Attrition, formula: closed_cards / open_cards, unit: "%", direction: lower_is_better, vertical: BFSI, subdomains: [cards] }
  - { id: xb.kpi.straight_through, name: Cross-Border STP, formula: stp_count / total, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [cross_border_payments] }
  - { id: xb.kpi.fx_spread, name: FX Spread Captured, formula: spread_bps, unit: bps, direction: higher_is_better, vertical: BFSI, subdomains: [cross_border_payments] }
  - { id: xb.kpi.settlement_time, name: Cross-Border Settlement Time, formula: avg(settled - sent), unit: hours, direction: lower_is_better, vertical: BFSI, subdomains: [cross_border_payments] }
  - { id: xb.kpi.repair_rate, name: Repair Rate, formula: repaired / total, unit: "%", direction: lower_is_better, vertical: BFSI, subdomains: [cross_border_payments] }
  - { id: xb.kpi.compliance_holds, name: Compliance Holds, formula: held / sent, unit: "%", direction: lower_is_better, vertical: BFSI, subdomains: [cross_border_payments] }
  - { id: fraud.kpi.fraud_loss_bps, name: Fraud Loss (bps of volume), formula: net_fraud_loss / volume * 10000, unit: bps, direction: lower_is_better, vertical: BFSI, subdomains: [fraud, prepaid_cards] }
  - { id: fraud.kpi.false_positive_rate, name: False Positive Rate, formula: legit_blocked / total_blocked, unit: "%", direction: lower_is_better, vertical: BFSI, subdomains: [fraud] }
  - { id: fraud.kpi.detection_rate, name: Detection Rate, formula: caught_fraud / total_fraud, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [fraud] }
  - { id: fraud.kpi.time_to_disposition, name: Time to Disposition, formula: avg(disposition_ts - alert_ts), unit: minutes, direction: lower_is_better, vertical: BFSI, subdomains: [fraud] }
  - { id: fraud.kpi.recovery_rate, name: Loss Recovery Rate, formula: recovered / gross_loss, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [fraud] }
  - { id: aml.kpi.case_backlog, name: Case Investigation Backlog, formula: open_cases_over_sla, unit: cases, direction: lower_is_better, vertical: BFSI, subdomains: [kyc_aml] }
  - { id: aml.kpi.sar_filing_timeliness, name: SAR Filing Timeliness, formula: on_time_sars / total_sars, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [kyc_aml] }
