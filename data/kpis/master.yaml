  - { id: rs.kpi.driver_utilization, name: Driver Utilization, formula: paid_minutes / online_minutes, unit: "%", direction: higher_is_better, vertical: TTH, subdomains: [ride_share_dispatch] }
  - { id: to.kpi.on_time, name: Transit On-Time Performance, formula: on_time / arrivals, unit: "%", direction: higher_is_better, vertical: PublicSector, subdomains: [transit_operations] }
  - { id: to.kpi.headway_adherence, name: Headway Adherence, formula: within_band / observations, unit: "%", direction: higher_is_better, vertical: PublicSector, subdomains: [transit_operations] }
  - { id: to.kpi.ridership, name: Daily Ridership, formula: sum(boardings), unit: passengers, direction: higher_is_better, vertical: PublicSector, subdomains: [transit_operations] }
  - { id: sc.kpi.perfect_order_rate, name: Perfect Order Rate, formula: perfect_orders / total_orders, unit: "%", direction: higher_is_better, vertical: TTH, subdomains: [supply_chain] }
  - { id: sc.kpi.dc_throughput, name: DC Throughput, formula: lines_shipped / labor_hours, unit: lines/hr, direction: higher_is_better, vertical: TTH, subdomains: [supply_chain] }
  - { id: sc.kpi.cost_per_unit_shipped, name: Cost per Unit Shipped, formula: total_logistics_cost / units_shipped, unit: USD, direction: lower_is_better, vertical: TTH, subdomains: [supply_chain] }
  - { id: sc.kpi.on_time_delivery, name: Supply Chain On-Time Delivery, formula: on_time_deliveries / total_deliveries, unit: "%", direction: higher_is_better, vertical: TTH, subdomains: [supply_chain] }
  - { id: sc.kpi.inventory_accuracy, name: Inventory Accuracy, formula: counted_matches / counted_total, unit: "%", direction: higher_is_better, vertical: TTH, subdomains: [supply_chain] }
  - { id: scv.kpi.eta_accuracy, name: Shipment ETA Accuracy, formula: abs(actual - eta) <= 1d, unit: "%", direction: higher_is_better, vertical: TTH, subdomains: [supply_chain_visibility] }
  - { id: scv.kpi.exception_rate, name: Shipment Exception Rate, formula: exceptions / shipments, unit: "%", direction: lower_is_better, vertical: TTH, subdomains: [supply_chain_visibility] }
  - { id: scv.kpi.dwell_time, name: Shipment Dwell Time, formula: avg(dwell), unit: hours, direction: lower_is_better, vertical: TTH, subdomains: [supply_chain_visibility] }
  - { id: mp.kpi.gmv, name: Marketplace GMV, formula: sum(order_value), unit: USD, direction: higher_is_better, vertical: Retail, subdomains: [marketplace_operations] }
  - { id: mp.kpi.take_rate, name: Marketplace Take Rate, formula: revenue / gmv, unit: "%", direction: target_band, vertical: Retail, subdomains: [marketplace_operations] }
  - { id: mp.kpi.bad_actor_rate, name: Bad Actor Rate, formula: removed_actors / total_actors, unit: "%", direction: lower_is_better, vertical: Retail, subdomains: [marketplace_operations] }
  - { id: mp.kpi.payout_latency, name: Seller Payout Latency, formula: avg(payout_ts - order_complete_ts), unit: hours, direction: lower_is_better, vertical: Retail, subdomains: [marketplace_operations] }
  - { id: reg.kpi.on_time_filings, name: On-Time Regulatory Filings, formula: filings_on_time / total_filings, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [regulatory_reporting] }
  - { id: reg.kpi.restatements, name: Regulatory Restatements, formula: restated_reports / submitted_reports, unit: "%", direction: lower_is_better, vertical: BFSI, subdomains: [regulatory_reporting] }
  - { id: reg.kpi.lineage_coverage, name: Data Lineage Coverage, formula: data_elements_with_lineage / total, unit: "%", direction: higher_is_better, vertical: BFSI, subdomains: [regulatory_reporting] }
  - { id: am.kpi.aum, name: Assets Under Management, formula: sum(market_value), unit: USD, direction: higher_is_better, vertical: BFSI, subdomains: [asset_management] }
  - { id: am.kpi.alpha, name: Alpha vs Benchmark, formula: return - benchmark, unit: bps, direction: higher_is_better, vertical: BFSI, subdomains: [asset_management] }
  - { id: am.kpi.sharpe, name: Sharpe Ratio, formula: (return-rf)/stddev, unit: ratio, direction: higher_is_better, vertical: BFSI, subdomains: [asset_management] }
  - { id: iiot.kpi.energy_per_unit, name: Energy per Unit Produced, formula: kwh / units_produced, unit: kWh/unit, direction: lower_is_better, vertical: Manufacturing, subdomains: [shop_floor_iot] }
  - { id: iiot.kpi.tag_uptime, name: IoT Tag Stream Uptime, formula: minutes_streaming / total_minutes, unit: "%", direction: higher_is_better, vertical: Manufacturing, subdomains: [shop_floor_iot] }

  # ============================================================
  # Anchor: Settlement & Clearing (BFSI)
  # Sources: ISO 20022 securities (sese.*, semt.*, colr.*), DTCC NSCC CNS
  # ============================================================
  - id: stl.kpi.same_day_settle
    name: Same-Day Settlement Rate
    formula: same_day_settled / total_trades
    unit: "%"
    direction: higher_is_better
    definition: Share of eligible trades that settle on the same business day they were intended to settle. Drives operational throughput under T+1 mandates.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Head of Settlements, Operations COO]
  - id: stl.kpi.fail_rate
    name: Settlement Fail Rate
    formula: failed_settlements / total_settlements
    unit: "%"
    direction: lower_is_better
    definition: Share of settlement instructions (ISO 20022 sese.023) that did not settle by intended settlement date. Drives CSDR penalty exposure and buy-in volume.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Head of Settlements, Recon Lead]
    decisionsSupported: [stl.d.buyin, stl.d.partial]
  - id: stl.kpi.recon_break_count
    name: Recon Break Count
    formula: open_breaks_eod
    unit: count
    direction: lower_is_better
    definition: Open reconciliation breaks between internal book and CSD/CCP statements at end of day.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Recon Lead]
  - id: stl.kpi.aging_breaks
    name: Aging Breaks > 5d
    formula: breaks_over_5d / total_breaks
    unit: "%"
    direction: lower_is_better
    definition: Share of open recon breaks aged more than 5 business days; a leading indicator of regulatory escalation.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Recon Lead, Operations COO]
  - id: stl.kpi.intraday_liquidity_use
    name: Intraday Liquidity Usage
    formula: peak_intraday_use / committed_facility
    unit: "%"
    direction: target_band
    definition: BCBS 248 intraday liquidity peak relative to committed correspondent or RTGS facility.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Treasury Liaison]
  - id: stl.kpi.match_rate
    name: Pre-Settlement Match Rate
    formula: matched_t1 / eligible_trades
    unit: "%"
    direction: higher_is_better
    definition: Share of settlement instructions (sese.024 status MACH) matched on or before T+1.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Head of Settlements]
  - id: stl.kpi.cns_compression
    name: CNS Net Compression Ratio
    formula: gross_obligations / net_obligations
    unit: ratio
    direction: higher_is_better
    definition: Compression achieved by DTCC NSCC Continuous Net Settlement — gross obligations divided by net obligations after CNS.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Head of Settlements]
    decisionsSupported: [stl.d.cns_optout]
  - id: stl.kpi.collateral_haircut_avg
    name: Average Collateral Haircut
    formula: weighted_haircut_pct
    unit: "%"
    direction: target_band
    definition: Weighted-average haircut applied across pledged collateral against CCP margin calls.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [CCP Risk Manager, Treasury Liaison]
    decisionsSupported: [stl.d.collateral]
  - id: stl.kpi.buyin_count
    name: Buy-In Initiations
    formula: count(buyin_events)
    unit: count
    direction: lower_is_better
    definition: Number of CSDR buy-in executions initiated against failed settlements in the period.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Head of Settlements]
    decisionsSupported: [stl.d.buyin]
  - id: stl.kpi.cutoff_extension_rate
    name: Cutoff-Extension Rate
    formula: cutoff_extensions / total_settlements
    unit: "%"
    direction: lower_is_better
    definition: Share of settlements that required a CSD cutoff extension to clear.
    vertical: BFSI
    subdomains: [settlement_clearing]
    related_personas: [Head of Settlements, Operations COO]
    decisionsSupported: [stl.d.cutoff_extend]

  # ============================================================
  # Anchor: Programmatic Advertising (Media)
  # Sources: IAB Tech Lab OpenRTB 2.6, AdCOM 1.0, VAST 4.2, MRC viewability
  # ============================================================
  - id: prog.kpi.fill_rate
    name: Programmatic Fill Rate
    formula: filled_impressions / ad_requests
    unit: "%"
    direction: higher_is_better
    definition: Share of OpenRTB BidRequests that produce a served impression. Low fill rates indicate floors set above demand or supply-path issues.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Head of Programmatic, Yield Analyst]
    decisionsSupported: [prog.d.floor]
  - id: prog.kpi.ecpm
    name: Effective CPM
    formula: gross_revenue * 1000 / impressions
    unit: USD
    direction: higher_is_better
    definition: Revenue per thousand served impressions across all auction types (open + PMP + PG).
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Head of Programmatic, Yield Analyst]
  - id: prog.kpi.viewability
    name: MRC Viewability Rate
    formula: viewable_impressions / measurable_impressions
    unit: "%"
    direction: higher_is_better
    definition: MRC standard — display 50% pixels viewable for ≥1s, video for ≥2s.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Head of Programmatic, Ad Ops Engineer]
    decisionsSupported: [prog.d.floor]
  - id: prog.kpi.bid_win_rate
    name: Bid Win Rate
    formula: wins / bids_submitted
    unit: "%"
    direction: target_band
    definition: Share of submitted Bids that won the auction. Above target band suggests under-priced supply; below suggests bidder quality issues.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Trader, Demand Strategist]
    decisionsSupported: [prog.d.bidder_throttle]
  - id: prog.kpi.ivt_rate
    name: Invalid Traffic Rate
    formula: ivt_impressions / impressions
    unit: "%"
    direction: lower_is_better
    definition: MRC GIVT + SIVT classification share of served impressions; tracked per supply path and per DSP.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Head of Programmatic, Ad Ops Engineer]
    decisionsSupported: [prog.d.fraud_threshold]
  - id: prog.kpi.bid_response_latency
    name: Bid Response Latency P95
    formula: p95(response_received_ms - bid_request_ms)
    unit: ms
    direction: lower_is_better
    definition: 95th-percentile bidder response time inside Imp.tmax. Bidders failing this trigger throttling.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Ad Ops Engineer]
    decisionsSupported: [prog.d.bidder_throttle]
  - id: prog.kpi.video_completion
    name: Video Completion Rate
    formula: vast_complete_events / vast_start_events
    unit: "%"
    direction: higher_is_better
    definition: Share of VAST-served video impressions that fire the "complete" tracking event. Drives CPCV pricing.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Yield Analyst]
  - id: prog.kpi.pmp_share
    name: PMP Share of Spend
    formula: pmp_revenue / total_revenue
    unit: "%"
    direction: target_band
    definition: Share of revenue cleared through private marketplace (PMP/PG/Preferred Deals) vs open auction.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Head of Programmatic, Demand Strategist]
    decisionsSupported: [prog.d.deal_priority, prog.d.pmp_renewal]
  - id: prog.kpi.match_rate
    name: User-Match Rate
    formula: matched_user_ids / addressable_requests
    unit: "%"
    direction: higher_is_better
    definition: Share of addressable BidRequests where the buyer can resolve a User.id (or User.eids[]) match.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Trader]
  - id: prog.kpi.consent_share
    name: Consented Traffic Share
    formula: consented_requests / total_requests
    unit: "%"
    direction: higher_is_better
    definition: Share of EU/UK/US-privacy traffic that arrives with a TCF v2.2 / GPP consent string permitting targeting.
    vertical: Media
    subdomains: [programmatic_advertising]
    related_personas: [Head of Programmatic, Ad Ops Engineer]

  # ============================================================
  # Anchor: Agentic Commerce (CrossCutting)
  # ============================================================
  - id: ac.kpi.agent_attributable_gmv_pct
    name: Agent-Attributable GMV %
    formula: sum(agent_attributable_gmv) / sum(total_gmv)
    unit: "%"
    direction: higher_is_better
    definition: Share of total merchandise value attributable, via signed AP2 IntentMandate chains, to AI agents acting on behalf of human principals. The headline horizon-shift KPI for agentic commerce.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Head of Agentic Commerce, Merchant Agent Integration Engineer]
    decisionsSupported: [ac.d.merchant_tiering, ac.d.mcp_publish]
  - id: ac.kpi.agent_conversion_rate
    name: Agent Conversion Rate
    formula: agent_purchases / agent_intent_events
    unit: "%"
    direction: higher_is_better
    definition: Share of agent IntentMandates that resolve to a captured PaymentMandate within the deadline window. The agentic analog to the e-commerce funnel conversion rate.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Head of Agentic Commerce, Agent Experience PM]
    decisionsSupported: [ac.d.intent_attribution, ac.d.cart_takeover]
  - id: ac.kpi.agent_chargeback_rate
    name: Agent-Initiated Chargeback Rate
    formula: agent_chargebacks / agent_transactions
    unit: "%"
    direction: lower_is_better
    definition: Disputes opened on agent transactions divided by all agent transactions. Above ~0.7% triggers Visa AP2 §7 carry-back review and Mastercard Agent Pay scrutiny.
    vertical: CrossCutting
    subdomains: [agentic_commerce, fraud, payments]
    related_personas: [Payments Risk Officer, Agent Trust & Safety Lead]
    decisionsSupported: [ac.d.stepup_threshold, ac.d.dispute_carryback]
  - id: ac.kpi.intent_to_purchase_p50
    name: Intent-to-Purchase Latency (P50)
    formula: percentile(purchase_ts - intent_ts, 0.50)
    unit: seconds
    direction: lower_is_better
    definition: Median elapsed time from IntentMandate signing to PaymentMandate capture. Surfaces tool-call cost and MCP catalog freshness pain.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Agent Experience PM]
    decisionsSupported: [ac.d.cart_takeover]
  - id: ac.kpi.intent_to_purchase_p95
    name: Intent-to-Purchase Latency (P95)
    formula: percentile(purchase_ts - intent_ts, 0.95)
    unit: seconds
    direction: lower_is_better
    definition: P95 elapsed time from IntentMandate signing to PaymentMandate capture. The tail that breaks long-running shopping sessions.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Agent Experience PM]
  - id: ac.kpi.stepup_rate
    name: Step-Up Auth Rate
    formula: stepup_required / agent_authorizations
    unit: "%"
    direction: target_band
    definition: Share of agent authorizations that required out-of-band step-up (WebAuthn / SPC / push). Too low risks fraud; too high kills conversion.
    vertical: CrossCutting
    subdomains: [agentic_commerce, payments]
    related_personas: [Payments Risk Officer, Agent Experience PM]
    decisionsSupported: [ac.d.stepup_threshold]
  - id: ac.kpi.cross_agent_trust_score
    name: Cross-Agent Trust Score (median)
    formula: median(kya_trust_score)
    unit: index
    direction: higher_is_better
    definition: Median Know-Your-Agent trust index across active agents. Aggregates Skyfire, Visa KYA, Mastercard AAI, and merchant-local signals.
    vertical: CrossCutting
    subdomains: [agentic_commerce, fraud]
    related_personas: [Agent Trust & Safety Lead]
    decisionsSupported: [ac.d.agent_block]
  - id: ac.kpi.refund_rate_agent
    name: Refund Rate on Agent Purchases
    formula: agent_refunds / agent_purchases
    unit: "%"
    direction: lower_is_better
    definition: Refunds on agent transactions divided by agent purchases. Driven by stale catalogs, wrong-cart selections, and principal regret.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Head of Agentic Commerce, Agent Experience PM]
    decisionsSupported: [ac.d.refund_route]
  - id: ac.kpi.catalog_mcp_discoverability
    name: Catalog Discoverability via MCP
    formula: products_listed_via_mcp / products_listed_total
    unit: "%"
    direction: higher_is_better
    definition: Share of merchant SKUs published over an MCP server (with current price + inventory). Drives agent discoverability without scraping.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Merchant Agent Integration Engineer]
    decisionsSupported: [ac.d.mcp_publish]
  - id: ac.kpi.agent_id_verification_pass
    name: Agent Identity Verification Pass Rate
    formula: agent_id_verified / agent_auth_attempts
    unit: "%"
    direction: higher_is_better
    definition: Share of agent transactions where AAID + operator JWT + delegation chain verified successfully at AP2 PaymentMandate evaluation.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Agent Trust & Safety Lead]
  - id: ac.kpi.human_override_rate
    name: Human Override Rate
    formula: human_overrides / agent_proposed_purchases
    unit: "%"
    direction: target_band
    definition: Share of agent-proposed purchases the principal modified or cancelled at confirmation step. Too high signals poor agent-PM alignment.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Agent Experience PM]
  - id: ac.kpi.tool_call_cost
    name: Mean Tool-Call Cost per Conversion
    formula: sum(tool_call_cost) / count(agent_purchases)
    unit: USD
    direction: lower_is_better
    definition: Sum of MCP tool-call costs divided by closed agent purchases. Proxy for agent loop efficiency and Skyfire/Crossmint per-call billing exposure.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Merchant Agent Integration Engineer]
  - id: ac.kpi.agent_affinity
    name: Agent Affinity (returning agents)
    formula: distinct_agents_repeat_30d / distinct_agents_30d
    unit: "%"
    direction: higher_is_better
    definition: Share of agents that transacted at the merchant in the last 30 days who returned within the same window.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Head of Agentic Commerce]
  - id: ac.kpi.auth_refresh_rate
    name: Agent Authorization Refresh Rate
    formula: refreshed_grants / agent_grants_total
    unit: "%"
    direction: target_band
    definition: Share of authorization_grants refreshed within their TTL versus expiring. Too low means principals re-authorize often (bad UX); too high may indicate scope creep.
    vertical: CrossCutting
    subdomains: [agentic_commerce]
    related_personas: [Agent Experience PM, Agent Trust & Safety Lead]
