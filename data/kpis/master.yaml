  # S&OP / IBP anchor (sop_supply_chain_planning)
  - id: sop.kpi.forecast_accuracy_mape
    name: Forecast Accuracy (MAPE)
    formula: 1 - (sum(abs(actual - forecast)) / sum(actual))
    unit: "%"
    direction: higher_is_better
    definition: Mean Absolute Percentage Error inverted to an accuracy reading; the headline forecast-quality KPI in S&OP / IBP. Penalises percentage error uniformly across rows.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, demand_planning]
    related_personas: [Demand Planner, S&OP Process Lead]
    decisionsSupported: [sop.d.consensus_forecast, sop.d.produce]
  - id: sop.kpi.forecast_accuracy_wape
    name: Forecast Accuracy (WAPE)
    formula: 1 - (sum(abs(actual - forecast)) / sum(actual))
    unit: "%"
    direction: higher_is_better
    definition: Weighted accuracy — the volume-weighted complement of WAPE. Robust to near-zero actuals; the favoured headline accuracy KPI in retail / CPG-heavy networks.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, demand_planning]
    related_personas: [Demand Planner]
    decisionsSupported: [sop.d.consensus_forecast]
  - id: sop.kpi.forecast_bias
    name: Forecast Bias
    formula: sum(forecast - actual) / sum(actual)
    unit: "%"
    direction: target_band
    definition: Systematic over- or under-forecast. Persistent positive bias drives excess inventory; negative bias drives stockouts.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, demand_planning]
    related_personas: [Demand Planner]
    decisionsSupported: [sop.d.consensus_forecast, sop.d.stock]
  - id: sop.kpi.otif
    name: On-Time In-Full (OTIF)
    formula: orders_otif / total_orders
    unit: "%"
    direction: higher_is_better
    definition: Orders delivered both on-time and complete. The supply-side service KPI that the plan defends.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, omnichannel_oms]
    related_personas: [Supply Planner, VP Supply Chain Planning]
    decisionsSupported: [sop.d.allocate, sop.d.defer]
  - id: sop.kpi.fill_rate
    name: Order Fill Rate
    formula: lines_filled_complete / lines_ordered
    unit: "%"
    direction: higher_is_better
    definition: Lines (or cases) shipped complete on first pass. Different from OTIF in that it ignores the on-time component.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, demand_planning]
    related_personas: [Supply Planner]
    decisionsSupported: [sop.d.stock, sop.d.allocate]
  - id: sop.kpi.inventory_turns
    name: Inventory Turns
    formula: cogs_annualized / avg_inventory_value
    unit: turns/yr
    direction: higher_is_better
    definition: How many times the average inventory turns over per year. Higher = leaner working capital.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, omnichannel_oms]
    related_personas: [Inventory Strategist, CFO]
    decisionsSupported: [sop.d.stock, sop.d.network_flow]
  - id: sop.kpi.doh
    name: Days on Hand (DOH)
    formula: avg_inventory_units / avg_daily_demand_units
    unit: days
    direction: target_band
    definition: Forward days of demand covered by on-hand inventory. Targeted per ABC class — A items low DOH, C items higher.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, omnichannel_oms]
    related_personas: [Inventory Strategist]
    decisionsSupported: [sop.d.stock, sop.d.produce]
  - id: sop.kpi.plan_adherence
    name: Plan Adherence %
    formula: sum(min(actual_units, plan_units)) / sum(plan_units)
    unit: "%"
    direction: higher_is_better
    definition: How closely the executed result tracked the consensus plan. Surfaces both supply misses and demand-side surprises.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning]
    related_personas: [Executive S&OP Sponsor, S&OP Process Lead]
    decisionsSupported: [sop.d.produce, sop.d.exec_signoff]
  - id: sop.kpi.capacity_utilization
    name: Capacity Utilization %
    formula: planned_load_hours / available_capacity_hours
    unit: "%"
    direction: target_band
    definition: Planned-load over available capacity. Too low wastes capex; too high (>90%) creates fragile schedules.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, production_scheduling]
    related_personas: [Plant Scheduler, VP Supply Chain Planning]
    decisionsSupported: [sop.d.capacity_invest, sop.d.produce]
  - id: sop.kpi.demand_sensing_lead_time
    name: Demand Sensing Lead Time
    formula: avg(plan_publish_ts - signal_observed_ts)
    unit: hours
    direction: lower_is_better
    definition: Time from observing a near-real-time demand signal (POS, sell-through, weather) to a refreshed short-horizon plan. The headline sensing-loop KPI.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, demand_planning]
    related_personas: [Demand Planner]
    decisionsSupported: [sop.d.consensus_forecast, sop.d.scenario_choice]
  - id: sop.kpi.scenario_cycle_time
    name: Scenario Cycle Time
    formula: avg(scenario_published_ts - scenario_requested_ts)
    unit: minutes
    direction: lower_is_better
    definition: Wall-clock time to evaluate and publish a what-if scenario. Concurrent planning platforms (Kinaxis, o9) compete on this measure.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning]
    related_personas: [S&OP Process Lead]
    decisionsSupported: [sop.d.scenario_choice]
  - id: sop.kpi.working_capital_impact
    name: Working Capital Impact ($)
    formula: avg_inventory_value + avg_receivables - avg_payables
    unit: USD
    direction: lower_is_better
    definition: Net working capital outcome of the plan — inventory + receivables less payables. The CFO-facing IBP KPI.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning]
    related_personas: [Executive S&OP Sponsor, CFO]
    decisionsSupported: [sop.d.stock, sop.d.exec_signoff]
  - id: sop.kpi.stockout_rate
    name: Stockout Rate
    formula: stockout_item_location_days / total_item_location_days
    unit: "%"
    direction: lower_is_better
    definition: Item-location-days at zero on-hand divided by all item-location-days. Lagging indicator of safety-stock and supply-plan misses.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, omnichannel_oms]
    related_personas: [Supply Planner, Inventory Strategist]
    decisionsSupported: [sop.d.stock, sop.d.allocate]
  - id: sop.kpi.excess_inventory_pct
    name: Excess Inventory %
    formula: excess_inventory_value / total_inventory_value
    unit: "%"
    direction: lower_is_better
    definition: Inventory above policy caps divided by total inventory. Surfaces obsolete-risk and write-down exposure.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning]
    related_personas: [Inventory Strategist]
    decisionsSupported: [sop.d.stock, sop.d.produce]
  - id: sop.kpi.demand_volatility
    name: Demand Volatility (CoV)
    formula: stddev(weekly_demand) / mean(weekly_demand)
    unit: ratio
    direction: target_band
    definition: Coefficient of variation of weekly demand per item-location. Drives safety-stock formulas and segmenting under XYZ classification.
    vertical: Manufacturing
    subdomains: [sop_supply_chain_planning, demand_planning]
    related_personas: [Demand Planner, Inventory Strategist]
    decisionsSupported: [sop.d.stock, sop.d.consensus_forecast]
