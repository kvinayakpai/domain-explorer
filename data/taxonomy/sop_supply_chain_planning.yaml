  - { type: Oracle SCM Cloud REST, protocol: HTTPS JSON, auth: OAuth2 + JWT user assertion }
  - { type: Anaplan API v2, protocol: HTTPS JSON, auth: OAuth2 / CA-certificate }
  - { type: Logility REST, protocol: HTTPS JSON, auth: API key + tenant header }
  - { type: ToolsGroup SO99+ REST, protocol: HTTPS JSON, auth: API key }
  - { type: EDI 852 Product Activity, protocol: AS2, auth: PKI }
  - { type: NielsenIQ / Circana SFTP feed, protocol: SFTP, auth: SSH key }
