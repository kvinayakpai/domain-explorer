ingestionChallenges:
  - Forecast snapshot proliferation — a single monthly cycle produces 3-7 forecast versions × millions of item-location-customer-period rows; incremental upserts must preserve the immutable signed-off snapshot.
  - Multi-grain reconciliation — POS arrives daily, syndicated weekly, ERP shipments monthly; aligning grains without double-counting requires deterministic disaggregation/aggregation rules.
  - Late-arriving sales actuals — retailer EDI 852 feeds and syndicated data arrive 2-6 weeks late; forecast-accuracy backfills must restate without rewriting closed cycle snapshots.
  - Hierarchy drift — item families re-classify, customers re-segment, locations re-tier mid-cycle; planning hierarchies must be slowly-changing (Type-2) and reproducible at any prior cycle.
  - High-cardinality scenario explosion — 5k items × 100 locations × 26 weeks × 10 scenarios = 130M scenario rows per cycle; scenario data must be sparsified (delta against base) or partitioned by scenario_id.
  - Cross-system master-data drift — the same item carries different IDs in SAP S/4 vs SAP IBP vs Kinaxis vs distributor systems; canonical GTIN mapping is required at ingest.

integrationChallenges:
  - name: Hierarchical disaggregation
    description: Forecasts are produced at item-family / region / month for accuracy but executed at item-location-customer / week. The mapping must preserve totals across levels and remain stable when the hierarchy itself changes.
    mitigation: Implement reconciliation passes (top-down proportional, bottom-up sum, middle-out blended) per ASCM IBP playbook; lock disaggregation weights at cycle close to make the consensus snapshot reproducible; snapshot the hierarchy with each forecast row (cycle_id + hierarchy_version).
  - name: Multi-currency rollup and FX exposure
    description: A global plan rolls plant-local currencies (EUR, JPY, INR, MXN, CNY) into reporting USD/EUR. FX rates and corporate finance assumptions can swing working capital and gap-to-budget by tens of millions; the same plan re-stated at fresh FX looks like a "plan change".
    mitigation: Persist a forecast_value_local + applied FX rate + plan_currency on every forecast/supply row; freeze the FX rate-set at cycle close in a slowly-changing dim_fx; provide an "as if at today's FX" view for variance analysis without rewriting history.
  - name: Capacity constraint propagation
    description: A bottleneck on a specific line in one plant cascades into supplier capacity, packaging, labor, and downstream DC inventory through the BOM and network. Naive S&OP planners ignore the cascade and produce infeasible plans.
    mitigation: Run a finite-capacity solver (linear program or constraint solver — SAP IBP Optimizer, Kinaxis solver, o9 solver) after the demand consensus; persist constraint violations as facts (fct_constraint_violations) so the planner sees what was clipped and why; tie work-order release back to relieved bottlenecks.
  - name: Cross-functional plan reconciliation
    description: Sales has one number, marketing another, finance a third, supply a fourth. The Integrated Reconciliation step in IBP must produce a single consensus that everyone signs off on — and the gaps must be auditable.
    mitigation: Persist every forecast_version side-by-side at the same grain; compute and surface gap-to-budget, gap-to-prior-cycle, and gap-to-statistical-baseline; track signed-off consensus as an immutable row set per cycle_id; preserve commentary blob keyed by cycle_id for audit.
  - name: Late-binding actuals and restated history
    description: Sell-through arrives weeks after ship; returns and chargebacks arrive months after invoice. Forecast accuracy must be recomputed as the truth set fills in, without invalidating closed-cycle signoffs.
    mitigation: Append-only sales_history with valid-time + transaction-time; recompute fct_forecast_accuracy on every actual-arrival event but anchor the locked consensus snapshot; report "MAPE at lag N" rather than a single MAPE number.
  - name: SKU explosion under variant / promo combinations
    description: A base item splinters into pack-size, regional-pack, promo-on-pack, club-pack variants — multiplying the forecast grid 5-10× with sparse history per leaf SKU.
    mitigation: Forecast at the planning-family level + use share-of-family disaggregation for leaf SKUs; use probabilistic models (ToolsGroup, GAINS) that handle sparse intermittent demand (Croston, TSB, hierarchical Bayesian).
  - name: New product introduction (NPI) and EOL curves
    description: New products have no history; supersession / cannibalization shifts existing item demand; EOL items decay non-linearly. Statistical models fail; planner overrides dominate.
    mitigation: Maintain library of curve templates (launch S-curve, exponential ramp, cliff EOL); chain superseded item history to successor; track NPI rows separately and audit accuracy at month-3 / month-6 / month-12.
  - name: Tariff / trade-policy shocks
    description: A new tariff on US$ imports from a country flips the lowest-landed-cost source for thousands of item-locations overnight; the supply plan must reroute and the inventory plan must absorb in-flight stock.
    mitigation: Maintain a tariff matrix as a slowly-changing dim; re-cost forecast_value + supply_plan_value at scenario evaluation; expose a "tariff what-if" scenario template prepopulated for common shocks.

