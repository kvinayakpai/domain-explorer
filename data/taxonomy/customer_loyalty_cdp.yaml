  - { vendor: Salesforce, product: Salesforce Data Cloud (Genie / Customer 360), category: CDP / Identity Graph }
  - { vendor: Adobe, product: Adobe Real-Time CDP (RT-CDP), category: CDP }
  - { vendor: Treasure Data (Arm), product: Treasure Data CDP, category: CDP }
