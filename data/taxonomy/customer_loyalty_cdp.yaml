ingestionChallenges:
  - High-cardinality event firehose — a Tier-1 retailer ingests 100M+ events/day across web, app, email, push, SMS, and POS. Identity resolution must run in <100ms at the edge for the activation path while batch reconciliation back-fills probabilistic stitches overnight.
  - Late-arriving identifiers — a customer browses anonymously for weeks, then converts and authenticates. The CDP must back-stitch the prior anonymous_id activity to the new customer_id without rewriting downstream marts.
  - Cross-device, cross-channel stitching — the same person on mobile-app, desktop-web, and a friend's iPad creates three anonymous IDs. Deterministic stitching needs a shared identifier (login, hashed email); probabilistic blending requires labeled training pairs.
  - PII vs hashed-PII zoning — many destinations (Meta CAPI, Google EUID, TikTok Events) accept only hashed email/phone; the CDP must maintain both zones and never leak raw PII to the analytical store.
  - Source-system schema drift — Klaviyo renames a property, Salesforce adds a custom field, the e-com platform changes a column. CDP schema management (Adobe XDM, Segment Protocols) is itself a project.
  - Loyalty points liability accounting under ASC 606 — points ledger must support deferred-revenue valuation, point-expiry sweeps, and reversals; finance reconciles to the GL nightly.

integrationChallenges:
  - name: Identity resolution — probabilistic vs deterministic
    description: Deterministic stitching (hashed email match) is high-precision but low-recall — fewer than 30% of anonymous web sessions ever sign in. Probabilistic stitching (IP + UA + device + behavioral) raises recall but introduces false merges that propagate downstream as polluted golden records.
    mitigation: Adopt a hybrid identity model — deterministic edges always merge; probabilistic edges merge only above a tuned confidence threshold (typically 0.85+). Score every merge; surface the lowest-confidence golden records weekly for human review; persist a confidence column so downstream BI can filter on it.
  - name: Consent management across jurisdictions (CCPA / GDPR / CPRA / LGPD)
    description: Every record needs a defensible consent basis. GDPR Art. 6 enumerates six lawful bases; CCPA + CPRA add do-not-sell + sensitive-info opt-outs. Right-to-be-forgotten requests must propagate to every downstream destination within 30 days (GDPR Art. 17).
    mitigation: Persist consent_record as the legal book of record with IAB TCF v2.2 / GPP encoded strings; treat consent state as a join key in every audience query; subscribe destinations to a consent-change webhook so suppressions flow within hours, not weeks; document data-residency and lawful basis per purpose code.
  - name: Real-time CDP vs batch reconciliation
    description: Real-time decisioning (cart abandonment, in-session offer, send-time triggers) needs identity in <100ms; batch reconciliation (overnight ML score refresh, segment back-fill) operates over the same data. Running them against one engine creates contention; running them against two engines creates drift.
    mitigation: Two-tier architecture — a fast path (Tealium, Segment, mParticle, Adobe Edge) does deterministic stitch + real-time activation; a slow path (Snowflake / Databricks + Amperity / Salesforce Data Cloud) does probabilistic stitch + ML enrichment; reconcile on a 4h cadence; publish a confidence delta KPI to track drift.
  - name: Cross-channel attribution
    description: A customer sees a Meta ad, opens a Klaviyo email, gets a push notification, and walks into a store. Single-touch attribution erases most of the chain; multi-touch needs every touch to land in the CDP with consistent customer_id and timestamps.
    mitigation: Ingest channel touches as event rows on the same grain (customer_id + event_ts + event_type); compute multi-touch attribution at the warehouse layer (time-decay, ML uplift) rather than relying on each channel's self-reported credit; publish the canonical attribution table to all reporters.
  - name: Data sharing across brands in a holding company
    description: Many retailers operate a portfolio of brands (Gap-Old Navy-Banana Republic, LVMH portfolio, Inditex portfolio). Sharing customer data across brands creates GDPR purpose-limitation risk and CCPA disclosure obligations, but blocking sharing kills cross-brand CLV.
    mitigation: Operate brand-scoped CDPs with explicit cross-brand data-sharing agreements per consent purpose; honor brand-level opt-outs separately from group-level; surface in the preference center; document data-flow maps for regulators (Art. 30 records of processing).
  - name: Golden-record conflict resolution
    description: Two source systems disagree on a customer's last name, email, or address. Picking one silently introduces errors; holding all variants pollutes downstream personalization. Survivorship rules are policy decisions, not technical defaults.
    mitigation: Define survivorship rules per attribute (most-recent, highest-trust source, longest-non-null, weighted vote); record the chosen value AND the alternatives in customer_master_satellite for audit; route low-confidence conflicts to a manual-review queue with SLAs.
  - name: Loyalty fraud and points liability
    description: Stolen account credentials let fraudsters drain loyalty points; mis-issued promotional points inflate program liability under ASC 606. Both undermine program trust and accounting integrity.
    mitigation: Detect anomalous earn patterns (geo-spread, velocity, redemption immediately after high-value earn); freeze accounts on score breach (status=fraud_hold); reconcile points_ledger nightly to GL; require human approval for adjust transactions over a threshold.
  - name: Tier-design tradeoff — aspirational vs achievable
    description: Tiers too aggressive — most customers stay at the bottom and disengage. Tiers too soft — the program becomes a universal discount with no aspirational pull. Setting thresholds is part data, part brand strategy.
    mitigation: Simulate tier distributions on historical purchase data before changing thresholds; A/B test tier mechanics on a held-out cohort; track tier-progression rate and tier-downgrade rate as headline KPIs.
  - name: Activation destination explosion
    description: Modern CDPs send audiences to 30+ destinations (Meta, Google, TikTok, Pinterest, Snap, LinkedIn, Klaviyo, Braze, Iterable, Salesforce Marketing Cloud, paid search, paid social, in-store, call center). Each destination has its own schema, refresh cadence, and consent expectations.
    mitigation: Standardize on a destination contract (hashed-PII envelope + consent metadata); rate-limit per-destination API quotas; expose a single observability dashboard for destination delivery freshness and acceptance ratio.

