ingestionChallenges:
  - High-cardinality SKU × store × day prices — 10k SKUs × 200 stores × 90 days × 4 events/day approaches a billion price snapshots per year before compaction.
  - Effective-dated overlapping prices — regular and promo prices coexist; ingestion must resolve "what was the realized price?" via a price-resolution function rather than a simple last-write-wins.
  - POS price-paid drift versus catalog price — POS-side promo engines, manual overrides, and damaged-goods discounts produce realized prices the catalog never sent.
  - Competitive price feeds are noisy and partially matched — match_confidence is itself a column you must threshold and audit before feeding it into the index.
  - Markdown reason codes vary by source system and chain — Revionics, Blue Yonder, and manual all use different code tables; normalization matters for the regret-factor analysis.
  - EDI 879 latency is batch — price-change files land hours after the trading partner posted them, so reconciliation against POS-realized prices is back-dated and reopens prior days' fact rows.

integrationChallenges:
  - name: Resolving the realized price at the receipt
    description: Multiple systems own price — RMS owns regular, the price optimizer owns markdown, the promotion engine owns coupon-deduction, the loyalty engine owns member-exclusive. At POS scan time a price-resolution stack chooses the lowest legal price; the warehouse must reconstruct that decision.
    mitigation: Persist every effective-dated price event by source_system + price_type; on the warehouse side run a single price-resolution function (lowest legal price at time t) joined to POS to produce the realized_price; reconcile and reason-code the residual.
  - name: Cannibalization and halo measurement
    description: A promo on Coke 12-pack lifts Coke units but drops Pepsi 12-pack baseline (cannibalization) and may lift chip sales (halo). Naive lift = (promo_units / baseline_units) over-credits without isolating substitution.
    mitigation: Estimate cross-price elasticities at the cluster grain; include halo and cannibalization terms in the lift model; report Net Lift = Own Lift − Cannibalized Units + Halo Units.
  - name: EU Omnibus 30-day prior-low compliance
    description: EU Directive 2019/2161 (Omnibus) requires retailers to display the lowest price applied in the prior 30 days alongside any "sale" claim. Computing that price per SKU × store at promo go-live is a query, not a column.
    mitigation: Materialize a daily prior_30day_low view per SKU × store; expose it as a contract column on the price catalog feed to e-com and signage; audit promo creative against it pre-publish.
  - name: KVI classification drift
    description: KVI lists go stale — competitor index calculations against a stale KVI list mismeasure price position and over-protect SKUs that no longer drive traffic.
    mitigation: Refresh KVI classification monthly using a click-stream + receipt-attachment + competitor-coverage signal; persist class history so historical CPI remains comparable; flag re-classifications to category managers.
  - name: Competitor matching ambiguity
    description: Like-for-like SKU matching across retailers is fuzzy — different pack sizes, store-brand equivalents, regional variants. A wrongly matched competitor price inflates or deflates the CPI silently.
    mitigation: Store match_type and match_confidence on every competitive_price row; require ≥0.90 confidence for KVI-level CPI inputs; sample-audit weekly; rebuild match table after any merchandising hierarchy change.
  - name: Trade spend reconciliation
    description: Vendor-funded promotions land in the books months after promo close — reconciliation between planned trade dollars, claimed deductions, and finally settled invoices spans 60-180 days.
    mitigation: Carry actual_funding_minor as a late-binding column on promo_line; cohort the Promo ROI KPI by settlement_age_days; close prior periods on a 90-day rolling refresh rather than at month-end.
  - name: Markdown optimizer disagreement with category manager
    description: Revionics / Blue Yonder recommends a deeper-and-earlier first markdown; the category manager overrides for brand-perception reasons. The override is rarely logged with reasoning.
    mitigation: Record optimizer_recommended vs actual on every markdown row; require a reason_override field on overrides ≥10% deeper or earlier; track Regret Factor on overridden vs accepted recommendations.
  - name: Multi-channel price coherence (omni-channel)
    description: Web price = $4.99, in-store ticket = $5.49, marketplace listing = $4.79. Customers screenshot the lowest and ask for it everywhere; pricing systems were built per channel.
    mitigation: Treat channel as a dimension on price (in_store|web|app|marketplace) and run a daily coherence DQ check; expose policy variance allowances per category; alert on out-of-policy variance windows ≥24h.
  - name: Promo-calendar collisions across categories
    description: Beer promo and chips promo overlap. Coffee promo and breakfast cereal promo overlap. Without a category-clearance gate, in-store ad space and customer attention are over-allocated, dampening per-promo lift.
    mitigation: Promo planning system must publish a category-week heat map and a clearance gate before promo go-live; resolve high-overlap weeks via category-manager negotiation; persist gating decisions on promo header.

