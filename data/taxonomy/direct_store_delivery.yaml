ingestionChallenges:
  - Route telemetry from PeopleNet/Samsara/Geotab arrives at sub-second cadence per truck — a 500-truck fleet can emit 30M+ telemetry rows per day; landing zone must downsample for analytics while preserving raw for ELD audit.
  - EPOD signatures and store-door photos are binary blobs (200KB-2MB each); the metadata row lands in seconds via REST/MQTT but the blob hop (S3/Azure Blob) lags by minutes — joins must accept "metadata-arrived-but-blob-pending" state.
  - Driver-handheld sync windows are bursty — hundreds of devices uploading at end-of-shift create a spike that compresses 8 hours of route activity into a 30-minute window. The ingest must tolerate out-of-order events from devices that lost connectivity mid-route.
  - Settlement files arrive at end-of-route-day but the matching invoice records often land hours later from SAP S/4 SD — the reconciliation pipeline must accept late-binding adjustments without re-stating closed days.
  - EDI 894/895 from retailers carries varying GTIN coverage and frequent DUNS/GLN mismatches; parser must reconcile against an outlet master that itself drifts.
  - Telematics provider clock skew vs handheld clock vs ERP timestamp can disagree by tens of seconds; canonical event time must be derived (typically the ELD HOS timestamp wins).
  - Returns and swaps captured on the handheld can be reversed mid-day if the driver corrects an entry — change-data-capture must capture the full trail, not just the final state.

integrationChallenges:
  - name: Plan vs actual reconciliation across SAP DSD and Roadnet
    description: SAP DSD owns the master tour plan and the financial settlement. Roadnet Anywhere owns the daily optimized sequence and the live re-route. The two diverge multiple times per day as Roadnet re-sequences for traffic — without a continuous reconciliation, settlement charges fuel/miles against the wrong stops and breaks cost-per-stop rollups.
    mitigation: Persist both plan_route_sequence and actual_route_sequence keyed by (route_id, route_day, stop_id); compute drift metrics nightly (sequence_change_count, mile_overage_pct); push the canonical actual back to SAP DSD for settlement.
  - name: EPOD evidence linkage to retailer deduction
    description: Walmart issues a $4k case-shortage chargeback 30 days after delivery. Without an EPOD signature + photo + GLN-stamped delivery, the manufacturer has no evidence to dispute. Inter-system join from EDI 820 deduction → original EDI 894 invoice → on-device EPOD record breaks at any of three places.
    mitigation: Make epod_event a first-class table keyed by stop_id and order_id; backfill the edi_895_doc_id field at EPOD capture; carry the EPOD URI through to the deduction record so the deductions analyst clicks once for evidence.
  - name: Driver settlement variance attribution
    description: The driver's daily cash + check + EFT settlement runs short by $87. Was it under-collection at a stop, an unrecorded return, a mis-keyed price, or theft? Settlement variance is high-stakes (HR + finance) and the data flows are fragmented across handheld, route accounting, and POS at independent grocers running Epicor Eagle.
    mitigation: Tag every settlement variance line with (stop_id, order_line_id, expected_amount, actual_amount, source_system); build a settlement-variance dashboard with drill-down to the offending order line; require driver acknowledgement on the handheld for any variance > $25.
  - name: Presell vs deliver mode hand-off
    description: Many CPGs run a hybrid model — an account sales rep presells on Tuesday for a Wednesday delivery truck. The presell order in Salesforce CG Cloud / SAP CRM must reach Roadnet's route-load by Tuesday night, with adjustments for stock availability at the branch. A dropped hand-off ships the wrong product.
    mitigation: Define a single presell-to-deliver event contract (order_id, requested_delivery_date, branch_id, lines[]); make the route-load the system of record once cut; reject in-flight presell edits past the cut-off with a documented exception path.
  - name: Mobile sales force device sync gaps
    description: Honeywell/Zebra handhelds occasionally lose connectivity in dense store cellars or back rooms. Orders, EPODs, returns, and audits get queued on-device. When devices re-sync, conflicting state can land out-of-order — a stop marked "completed" then "skipped" then "completed" again.
    mitigation: Use last-write-wins on a vector-clock ordered field (device_local_seq + observed_at); persist all conflicting versions in an audit_log table; alert ops if reconciliation produces a paradox (e.g., EPOD timestamp before stop arrival).
  - name: Perfect-store credit pay-for-performance gating
    description: Driver/rep performance pay is tied to perfect_store_score, which is computed from photo audits + planogram compliance + freshness. Photo audits land 2-7 days late from AFS or merchandiser apps. Paying performance bonuses on a stale score over-pays; waiting for the audit delays pay and demotivates.
    mitigation: Compute a provisional perfect_store_score on the day-of (driver self-audit + handheld snapshot); reconcile to the audited score weekly; pay the lower of the two with a back-true-up at month-end if the audit lifts the score.
  - name: ELD/HOS compliance vs route plan
    description: A planned 11-hour route plan is legal under FMCSA 49 CFR §395 only if the driver started fresh with full HOS. Legacy planners don't know real-time HOS state from the ELD; an over-planned route forces an HOS violation or a mid-route swap.
    mitigation: Stream HOS state from PeopleNet/Samsara into the planner's pre-dispatch check; reject dispatch if (planned_drive_minutes > available_drive_minutes); alert the dispatcher when a driver crosses the 10-hour drive limit mid-route.
  - name: IFTA fuel-tax jurisdictional split
    description: A truck crossing 4 states in a route-day generates miles and fuel purchases under IFTA. Telematics reports GPS positions; fuel cards (WEX, Comdata) report purchases. Joining at jurisdiction grain for IFTA filing requires precise polyline-to-state intersection and signed-off mile splits.
    mitigation: Use the Trimble or HERE state-line shapefile to bucket telemetry GPS points into jurisdictions; reconcile with fuel-card transactions at the state grain; produce IFTA reports with an explicit unmatched-bucket so finance can audit.
  - name: Returns + swaps + spoils accounting
    description: A driver pulls 24 cases of expired SKU off the shelf and replaces with fresh. The transaction can be a "swap" (no cash) or a "return + sale" (creates a credit + new invoice). Different DSD platforms model this differently; downstream COGS and shrinkage allocation depend on which model fired.
    mitigation: Standardize on a single returns_event type with a `swap_flag` and explicit (returned_units, replaced_units, credit_amount_cents) triple; carry `swap_flag` through to settlement and COGS pipelines so each model can pick its accounting view.
  - name: Cooler/planogram compliance evidence
    description: Display compliance pay (cooler set, end-cap honored, share of shelf) requires photo + planogram match. Vendors AFS, Numerator, and merchandiser apps each ingest photos with different metadata (location, store_number, planogram_version). Joining at outlet × week × tactic is fragile.
    mitigation: Funnel all photo evidence into a unified compliance_event table (outlet_id, audit_date, evidence_uri, source); deterministic resolution rules (audit > photo > self-report); pay-for-performance gating reads the unified table only.

