ingestionChallenges:
  - Ad-event volumes can exceed millions of QPS; must downsample auctions and keep impressions/clicks/conversions at full fidelity.
  - Event ordering — bid wins arrive before the impression fires, and conversions can post-arrive days later.
  - Late-binding identity — User.eids[] resolves on the buyer side and rarely echoes back on the publisher feed.
  - Currency normalization — bids declare cur per BidRequest, but reporting wants USD at audit FX.
  - IVT classification (MRC GIVT vs SIVT) requires verification-vendor enrichment after the fact.
  - Multi-tenant publisher feeds change schema as bidders add OpenRTB extensions.
  - Consent strings (TCF v2.2 / GPP) must be parsed to determine which IDs are usable.

integrationChallenges:
  - ads.txt / app-ads.txt drift — declared sellers do not match SupplyChain object ("schain") nodes.
  - Rebroadcast/duplicate impression pixels — burl, nurl, and viewability all fire independently.
  - VAST wrapper chains (3+ deep) make creative attribution non-trivial.
  - Header bidding fans out to 10–30 bidders per Imp; each fires its own auctionEnd telemetry.
  - SDA / SKAN / Privacy Sandbox API parallel running with classic OpenRTB consent flows.
  - PMP deal IDs are case-sensitive across DSPs; conflicts require aliasing.
  - First-price vs second-price clearing semantics differ across SSPs and require normalization.
