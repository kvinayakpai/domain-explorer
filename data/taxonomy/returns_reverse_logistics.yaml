ingestionChallenges:
  - High-fan-out RMA → return_item explosion — a single multi-line order can generate one RMA with 12+ return_items; the disposition decision is per-item, but every customer-facing surface is per-RMA. Need separate streams keyed on (rma_id, return_item_id).
  - Disposition is late-bound — the RMA + return_item lands in the warehouse hours after the customer initiates the return online; the inspector's condition grade and the disposition decision can lag the RMA by 1-21 days. Lineage must accept revisions to disposition_id on a return_item without rewriting earlier events.
  - Cross-border RMAs span 3+ source systems — Loop or Narvar issues the RMA, ZigZag / ReBound runs the consolidation hub, the destination WMS (Manhattan / SAP) does receipt + QC. Correlating them requires an external_rma_ref that the merchant must mint and propagate.
  - Returnless refunds bypass the warehouse entirely — there is no return_item row, only a refund tied to an order_id and a reason_code. Reconciling these against the inventory ledger is impossible because the item is still in the customer's hands; the analytics must treat returnless refunds as a virtual disposition.
  - Refurb cycle outcomes need joining back days/weeks later — a returned phone may take 14 days at the CRC, post a refurb_outcome with a new condition grade, then re-enter sellable inventory under a new SKU (B-stock SKU). Lineage must link forward to the new SKU without breaking refurb-yield calculations.
  - Liquidation proceeds are pro-rated across hundreds of items — a lot sells for $4,200; that allocates back to ~150 return_items. The liquidation_lot_item bridge must materialize the allocation rule (by cogs / by retail / equal) and capture the rule version for replay.

integrationChallenges:
  - name: RMA ↔ refund tied to the wrong order line
    description: When a customer returns part of a multi-line order, the refund must be allocated to the specific line(s) returned, not the order header. Naive integrations refund-by-order, which over-refunds when the customer also got a discount on a non-returned line — and triggers chargebacks from the PSP for "amount exceeds capture".
    mitigation: Persist the (order_id, order_line_id) reference on every return_item and compute the refund_amount_minor by re-running the original allocation rule (discount + tax + shipping share); store the original_allocation_rule_version so replays are deterministic; emit a DQ alert when sum(refund_amount_minor for an RMA) > captured amount on the order.
  - name: Returnless refund evidence trail
    description: A returnless refund issues money without an item returning to the warehouse, so there is no physical evidence of the customer's claim. Without a structured signal trail, the program is wide-open to "I never got it" abuse, but heavy-handed verification kills conversion.
    mitigation: Persist a returnless_refund decision packet (image upload, reason code, customer history score, item value, return shipping cost saved) on the refund row; tie to fraud_signal_id when present; gate the path on a configurable item-value ceiling per category (per Newmine + internal model) and reconcile the per-period returnless-refund rate against margin impact.
  - name: Reason code reconciliation across platforms
    description: Loop, Narvar, Optoro, Happy Returns, and the merchant's POS each emit return reason codes on different taxonomies — "didn't fit" vs "size_too_small" vs "FIT_ISSUE_LARGE_TO_SMALL". Joining them downstream produces nonsense if you don't reconcile to a canonical taxonomy.
    mitigation: Maintain a `reason_code` master in the warehouse with deterministic alias maps from each platform; require all staging models to map at ingest; emit a DQ alert when an upstream platform emits a code not in the alias map (unmapped_reason_code metric).
  - name: Cross-border refund FX timing
    description: A US merchant refunds an EU customer 30 days after the original purchase. The original capture was in EUR at one rate; the refund is at today's rate. PSPs (Stripe, Adyen) handle this differently — some refund in the original capture currency, some at refund-day FX. Mis-tracked, this lands as a FX gain/loss the finance team can't explain.
    mitigation: Persist both `refund_amount_minor` (in transaction currency, what the customer received) and `refund_amount_book_minor` (in book currency at refund-day FX); store the PSP's FX-handling mode per refund; reconcile against the PSP's daily settlement file rather than the auth ledger.
  - name: Refurb routing without grading SLA
    description: When inspector grading at the CRC is slow, items pile up in pending-disposition status. The disposition decision then becomes time-pressured (route to liquidation rather than wait for refurb), eroding recovery yield. Manhattan and SAP S/4 Returns model "received but not graded" as the same state.
    mitigation: Introduce a separate `condition_grade` slot on `return_item` that is null until the inspector signs off, and a `disposition_id` that is null until the disposition_decided_ts arrives; SLA the grading lag (target ≤2 business days) and report breach as a KPI; auto-route to a deferred-decision lane rather than auto-liquidating.
  - name: Carrier-label cost not stamped on the RMA
    description: When the merchant prepays the return label, Happy Returns / Loop / ZigZag charges a label fee per shipment, plus a per-bar consolidation fee at Happy Returns. These are emitted on a weekly invoice, not in the per-RMA webhook, so per-RMA Cost to Process is wrong until the invoice reconciles.
    mitigation: Capture the label cost at issue time when the carrier API returns it; for vendors that bill weekly, run a settlement-allocation job that distributes the invoice line items back to carrier_label rows by tracking_number; expose both `provisional_label_cost_minor` and `settled_label_cost_minor` to make the lag visible.
  - name: Linking liquidation proceeds to original COGS
    description: A B-Stock lot of 200 items sells for $1,800. Recovery yield only makes sense if you can allocate the $1,800 back to the original 200 items' COGS — but the original COGS sits in the merch system, the lot in Optoro/B-Stock. Allocation rules (by cogs, by retail, equal) drive Recovery Value % swings of 5-15 percentage points.
    mitigation: Materialize the bridge `liquidation_lot_item` with explicit `allocated_cogs_minor` and `allocated_proceeds_minor` per item, computed by a documented allocation rule (default: weight by unit_cogs); persist the rule version + as-of timestamp on each bridge row; report the headline KPI with both unallocated and pro-rated views.
  - name: PII / chronic-returner shared-list contracts
    description: Newmine + Appriss Retail + The Retail Equation (and merchant-to-merchant ALTO-style sharing) require sharing customer hashed identifiers across retailers. Naive integration leaks raw email/phone and breaks GDPR Art. 6 / CCPA.
    mitigation: Tokenize `customer_ref_hash = SHA-256(email + tenant-salt)`; share only the hash + reason code categorical; persist DPA disclosure consent at the customer record level; honor the customer's right-to-erasure by emitting a tombstone event that invalidates the hash mapping downstream.
  - name: Scope-3 carbon attribution for the return leg
    description: ISO 14040 / 14067 require attributing reverse-leg emissions to the SKU and to the merchant's scope-3 ledger. Carriers (FedEx, UPS, USPS) publish per-shipment kg CO2e on different methodologies — some include last-mile only, some include sortation hub energy. Aggregating naively double-counts or under-counts.
    mitigation: Persist `scope3_kg_co2e` per `carrier_label` from the carrier API where available; for the rest, apply a EcoVadis-published default factor by service-level + distance; document the methodology version per carrier; report two numbers (carrier-published vs default-factor) so the divergence is auditable.
  - name: Restocking fee disclosure compliance
    description: US states (CA, NY, FL among others) and the EU's Consumer Rights Directive require restocking-fee terms to be visible at purchase. Merchants that apply fees not disclosed at checkout face refund-amount enforcement and class-action exposure.
    mitigation: Persist the policy version that governed the original sale on `sales_order` (or on the order's policy snapshot); evaluate restocking fee at refund time against THAT policy, not the current one; emit a DQ alert when a refund tries to apply a fee under a policy version that didn't include restocking-fee disclosure.

