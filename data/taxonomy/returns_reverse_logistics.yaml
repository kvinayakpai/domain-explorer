id: returns_reverse_logistics
name: Returns & Reverse Logistics
vertical: Retail
oneLiner: End-to-end management of customer returns and reverse-logistics flows — return authorization, fraud screening, restock vs refurb vs liquidate vs donate disposition, refund issuance, and the recovery / sustainability ledger that runs the program.

# Authoritative sources (mid-2026):
#   Optoro — reverse-logistics SaaS (Returns Optimization Platform, OptiTurn liquidation marketplace, BULQ B-stock).
#     https://www.optoro.com — disposition-engine + multi-channel recovery routing.
#   Loop Returns — direct-to-consumer returns + exchanges platform.
#     https://www.loopreturns.com — Shop Now / Bonus Credit / Workflows; Shopify Plus partner.
#   Happy Returns (PayPal, acquired 2021; spun out to UPS in 2023) — box-free return drop-offs at Return Bars + PayPal-funded refunds.
#     https://www.happyreturns.com — 10,000+ Return Bar locations across the US.
#   Returnly — PayPal-acquired (2021) returns + instant credit platform; product folded into Happy Returns + PayPal Returns Manager.
#     https://www.returnly.com
#   Narvar Return & Exchange — branded post-purchase platform including returns, exchanges, refunds.
#     https://www.narvar.com — Return & Exchange console + Narvar Concierge in-store drop-off.
#   SAP Returns Management — SAP S/4HANA Retail Returns Order + Customer Returns process.
#     https://help.sap.com/docs/SAP_S4HANA — return order types CRRE/CRSR, return delivery doc, customer return PGR.
#   Manhattan Active WMS — Returns + Quality Inspection module (formerly WMOS Returns).
#     https://www.manh.com — receiving lane for returns, disposition workflows, QC grading.
#   Salesforce OMS Returns — Salesforce Order Management Returns (formerly part of Commerce Cloud OMS).
#     https://help.salesforce.com — return order, RMA generation, refund orchestration.
#   ReBound (UPS) — global cross-border returns management.
#     https://www.reboundreturns.com — 150+ country returns routing; merchant of record return-leg consolidation.
#   ZigZag Global (Global Blue) — international returns network with carrier+consolidation.
#     https://www.zigzag.global — 220+ carriers across 170+ countries; returns-as-a-service.
#   Doddle — last-mile returns drop-off network + carrier-agnostic returns API.
#     https://www.doddle.com — print-in-store + paperless QR returns.
#   Newmine — return-reason intelligence + chronic-returner analytics + RAaaS (Return Analytics as a Service).
#     https://www.newmine.com — chronic-loss prevention from refund fraud + reason-code mining.
#
#   Liquidation / B-stock marketplaces:
#     B-Stock Solutions (https://www.bstock.com), Liquidation.com (Liquidity Services),
#     Direct Liquidation, BULQ (Optoro), eBay B-Stock private stores.
#
#   Donation / circular partners:
#     Good360 (https://good360.org), Goodwill, Salvation Army, Cradle-to-Cradle Certified
#     refurb partners, Renewable Computing Initiative resellers.
#
#   Standards & guidance:
#     GS1 EPCIS 2.0 — event-level traceability for returned items (object/transaction/transformation events).
#       https://www.gs1.org/standards/epcis
#     ASC X12 EDI 180 — Return Merchandise Authorization & Notification.
#       https://www.x12.org
#     ISO 14040 / ISO 14044 — life-cycle assessment for carbon footprint of returned-goods disposition.
#       https://www.iso.org/standard/37456.html
#     ISO 14067 — product carbon footprint quantification (used for kg CO2e per return).
#     FTC "Bots, Bills & Boxes" / state-level return policy disclosure rules — US returnless-refund guidance.
#     PCI DSS v4.0 — applies whenever a refund hits an original card PAN.
#     ASCM / CSCMP Reverse Logistics best-practice references.

personas:
  - { name: VP Reverse Logistics, title: VP, Reverse Logistics & Returns, level: VP }
  - { name: Returns Operations Manager, title: Director, Returns Operations, level: Director }
  - { name: Refurb Center Manager, title: Refurb / Customer Return Center Manager, level: Manager }
  - { name: Returns Fraud Analyst, title: Returns Fraud Analyst, level: IC }
  - { name: Sustainability / Circular Lead, title: Director, Circular Economy & Sustainability, level: Director }
  - { name: Returns CX Lead, title: Returns Customer Experience Lead, level: Manager }
  - { name: Recovery Manager, title: Recovery & Liquidation Manager, level: Manager }

decisions:
  - { id: rrl.d.keep_or_liquidate, statement: "For a received return, hold for re-stock vs route to refurb vs liquidate via B-Stock/Liquidation.com vs donate — choose the disposition lane that maximizes net recovery." }
  - { id: rrl.d.refund_without_return, statement: "Issue a returnless refund (keep-it / returnless-refund) versus require shipment back to a CRC — based on item value, return shipping cost, and customer risk profile." }
  - { id: rrl.d.fraud_block, statement: "Block, throttle, or step-up a customer return based on Newmine / internal chronic-returner score + Optoro flag + Loop / Narvar policy." }
  - { id: rrl.d.refurb_route, statement: "Route a returned item to refurb (full grading + clean + repackage) vs A-/B-/C-grade resale vs scrap — gated on COGS recovery and refurb yield expectations." }
  - { id: rrl.d.return_method_offer, statement: "Offer mail-return / in-store BORIS / Happy Returns Return Bar / Doddle QR drop-off / carrier pickup at checkout — per item category and customer geography." }
  - { id: rrl.d.cross_border_route, statement: "Route a cross-border return via ZigZag / ReBound consolidation hub vs direct international shipping vs in-country liquidation — per duties/tax recoverability." }
  - { id: rrl.d.restocking_fee_apply, statement: "Apply a restocking fee at refund time versus waive — driven by reason code, restock yield expectation, and customer LTV." }
  - { id: rrl.d.donation_vs_landfill, statement: "Donate (via Good360 / Goodwill) versus recycle versus landfill non-resellable returns — gated on tax-deduction value, partner availability, and ISO 14040 carbon impact." }
  - { id: rrl.d.policy_window_change, statement: "Tighten / loosen the return window (30 / 60 / 90 / 365 days) by category, customer tier, or holiday season — based on return rate and abuse trends." }
  - { id: rrl.d.return_carrier_change, statement: "Switch return-leg carrier (USPS / UPS / FedEx / regional / Happy Returns consolidation) for a lane based on rate, transit time, and recovery yield." }

kpis:
  - id: rrl.kpi.return_rate
    name: Return Rate %
    formula: count(returns) / count(orders)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [rrl.d.policy_window_change, rrl.d.return_method_offer]
  - id: rrl.kpi.refund_issue_time
    name: Refund Issue Time
    formula: avg(refund_issued_ts - return_received_ts)
    unit: hours
    direction: lower_is_better
    decisionsSupported: [rrl.d.return_method_offer]
  - id: rrl.kpi.restocking_fee_capture_pct
    name: Restocking Fee Capture %
    formula: sum(restocking_fee_collected_minor) / sum(restocking_fee_eligible_minor)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [rrl.d.restocking_fee_apply]
  - id: rrl.kpi.recovery_value_pct
    name: Recovery Value % (Recovery / Cost)
    formula: sum(recovered_value_minor) / sum(original_cogs_minor)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [rrl.d.keep_or_liquidate, rrl.d.refurb_route]
  - id: rrl.kpi.refurb_yield_pct
    name: Refurb Yield %
    formula: sum(units_refurbed_to_resellable) / sum(units_routed_to_refurb)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [rrl.d.refurb_route]
  - id: rrl.kpi.liquidation_yield_pct
    name: Liquidation Yield %
    formula: sum(liquidation_proceeds_minor) / sum(liquidation_cogs_minor)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [rrl.d.keep_or_liquidate]
  - id: rrl.kpi.returnless_refund_rate
    name: Returnless Refund Rate
    formula: count(returnless_refunds) / count(refunds)
    unit: "%"
    direction: target_band
    decisionsSupported: [rrl.d.refund_without_return]
  - id: rrl.kpi.return_fraud_rate
    name: Return Fraud Rate
    formula: count(returns_flagged_fraud) / count(returns)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [rrl.d.fraud_block]
  - id: rrl.kpi.cost_to_process_return
    name: Cost to Process Return
    formula: sum(processing_cost_minor) / count(returns_processed)
    unit: USD
    direction: lower_is_better
    decisionsSupported: [rrl.d.return_method_offer, rrl.d.return_carrier_change]
  - id: rrl.kpi.days_to_disposition
    name: Days to Disposition
    formula: avg(disposition_decided_ts - return_received_ts)
    unit: days
    direction: lower_is_better
    decisionsSupported: [rrl.d.keep_or_liquidate, rrl.d.refurb_route]
  - id: rrl.kpi.cross_border_return_rate
    name: Cross-Border Return Rate
    formula: count(returns_cross_border) / count(returns)
    unit: "%"
    direction: target_band
    decisionsSupported: [rrl.d.cross_border_route]
  - id: rrl.kpi.repeat_returner_rate
    name: Customer Repeat-Returner Rate
    formula: count(customers_with_3plus_returns_180d) / count(customers_with_returns_180d)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [rrl.d.fraud_block, rrl.d.policy_window_change]
  - id: rrl.kpi.net_cost_of_returns
    name: Net Cost of Returns
    formula: sum(refund_minor + processing_cost_minor + reverse_freight_minor - recovered_value_minor)
    unit: USD
    direction: lower_is_better
    decisionsSupported: [rrl.d.keep_or_liquidate, rrl.d.return_method_offer]
  - id: rrl.kpi.return_carbon_footprint_kg_co2e
    name: Return Carbon Footprint (kg CO2e per return)
    formula: sum(scope3_kg_co2e_return_leg + kg_co2e_disposition_lane) / count(returns)
    unit: kgCO2e/return
    direction: lower_is_better
    decisionsSupported: [rrl.d.donation_vs_landfill, rrl.d.cross_border_route]

dataModel:
  entities:
    - name: customer
      description: Buying customer issuing the return. PII-tokenized; raw demographics live in the CRM only.
      keys: [customer_id]
      attributes:
        - { name: customer_id, type: varchar(32), isPrimaryKey: true }
        - { name: customer_ref_hash, type: varchar(64), description: "SHA-256(loyalty_id + salt) — PII tokenized" }
        - { name: country_iso2, type: varchar(2) }
        - { name: loyalty_tier, type: varchar(16), description: "bronze|silver|gold|platinum|none" }
        - { name: lifetime_orders, type: integer }
        - { name: lifetime_returns, type: integer }
        - { name: chronic_returner_flag, type: boolean, description: "Newmine + internal model classification" }
        - { name: chronic_returner_score, type: "decimal(5,3)", description: "0..1 — chronic-returner / abuser score" }
        - { name: status, type: varchar(16), description: "active|restricted|blocked" }
        - { name: created_at, type: timestamp }

    - name: sales_order
      description: Original outbound sales order to which the return is attached. Joined for original COGS, channel, and ship-from node.
      keys: [order_id]
      attributes:
        - { name: order_id, type: varchar(32), isPrimaryKey: true }
        - { name: customer_id, type: varchar(32), isForeignKey: true, references: customer.customer_id }
        - { name: channel, type: varchar(16), description: "ecom|store|marketplace|wholesale" }
        - { name: order_ts, type: timestamp }
        - { name: ship_node, type: varchar(32) }
        - { name: subtotal_minor, type: bigint }
        - { name: shipping_minor, type: bigint }
        - { name: tax_minor, type: bigint }
        - { name: total_minor, type: bigint }
        - { name: currency, type: varchar(3) }

    - name: return_authorization
      description: RMA — Return Merchandise Authorization, issued before the customer ships back (or appears at a Return Bar / store). Maps to EDI 180.
      keys: [rma_id]
      attributes:
        - { name: rma_id, type: varchar(32), isPrimaryKey: true }
        - { name: order_id, type: varchar(32), isForeignKey: true, references: sales_order.order_id }
        - { name: customer_id, type: varchar(32), isForeignKey: true, references: customer.customer_id }
        - { name: issued_ts, type: timestamp }
        - { name: expires_ts, type: timestamp, description: "RMA window — typically 14-30 days" }
        - { name: return_method, type: varchar(32), description: "mail|boris_store|happy_returns_bar|doddle_qr|carrier_pickup|locker|returnless" }
        - { name: return_platform, type: varchar(32), description: "Loop|Narvar|Optoro|HappyReturns|ReBound|ZigZag|Doddle|in_house|Salesforce_OMS|SAP_S4_Returns|Manh_Active_WMS" }
        - { name: carrier, type: varchar(16), description: "USPS|UPS|FedEx|Hermes|EVRi|YunExpress|HappyReturns|n/a" }
        - { name: tracking_number, type: varchar(64) }
        - { name: cross_border, type: boolean }
        - { name: source_country_iso2, type: varchar(2) }
        - { name: destination_country_iso2, type: varchar(2) }
        - { name: rma_status, type: varchar(16), description: "issued|in_transit|received|cancelled|expired" }
        - { name: restocking_fee_eligible_minor, type: bigint }
        - { name: epcis_event_uri, type: text, description: "GS1 EPCIS 2.0 object event pointer for the inbound return" }

    - name: return_item
      description: One returned SKU / unit on an RMA. The grain of disposition, refurb-yield, and recovery analytics.
      keys: [return_item_id]
      attributes:
        - { name: return_item_id, type: varchar(32), isPrimaryKey: true }
        - { name: rma_id, type: varchar(32), isForeignKey: true, references: return_authorization.rma_id }
        - { name: order_id, type: varchar(32), isForeignKey: true, references: sales_order.order_id }
        - { name: sku_id, type: varchar(32) }
        - { name: gtin, type: varchar(14), description: "GS1 GTIN-14" }
        - { name: category, type: varchar(64) }
        - { name: quantity, type: integer }
        - { name: unit_cogs_minor, type: bigint }
        - { name: unit_retail_minor, type: bigint }
        - { name: reason_code_id, type: varchar(16), isForeignKey: true, references: reason_code.reason_code_id }
        - { name: condition_grade, type: varchar(8), description: "A|B|C|D|scrap — inspector grading at the CRC" }
        - { name: disposition_id, type: varchar(16), isForeignKey: true, references: disposition.disposition_id }
        - { name: disposition_decided_ts, type: timestamp }
        - { name: serial_number, type: varchar(64), description: "Where item-level traceability applies" }

    - name: reason_code
      description: Catalog of normalized return reasons. Newmine + Loop + Narvar + Optoro feeds reconciled into a single taxonomy.
      keys: [reason_code_id]
      attributes:
        - { name: reason_code_id, type: varchar(16), isPrimaryKey: true }
        - { name: reason_code, type: varchar(32) }
        - { name: reason_category, type: varchar(32), description: "fit|quality|wrong_item|damaged|changed_mind|late|gift|wardrobing|fraud_suspected|other" }
        - { name: customer_facing_text, type: varchar(255) }
        - { name: defect_attribution, type: varchar(32), description: "supplier|carrier|merchant|customer|unknown" }
        - { name: actionable, type: boolean, description: "Whether the reason can drive a corrective action (vs noise like changed_mind)" }
        - { name: severity, type: varchar(8), description: "low|medium|high|critical" }

    - name: disposition
      description: Catalog of disposition lanes (restock, refurb, liquidate, donate, recycle, scrap). Loaded from Optoro / Manhattan WMS / SAP S/4 Returns.
      keys: [disposition_id]
      attributes:
        - { name: disposition_id, type: varchar(16), isPrimaryKey: true }
        - { name: disposition_code, type: varchar(32), description: "restock_A|restock_open_box|refurb|b_stock_liquidation|donation|recycle|scrap|returnless" }
        - { name: disposition_name, type: varchar(64) }
        - { name: target_channel, type: varchar(32), description: "primary_inventory|open_box|b_stock_marketplace|donation_partner|recycler|landfill|n/a" }
        - { name: typical_recovery_pct, type: "decimal(5,3)", description: "Empirical fraction of original COGS recovered through this lane" }
        - { name: lane_owner, type: varchar(64), description: "Optoro|Manh_Active_WMS|SAP_S4_Returns|in_house_CRC|Good360|Liquidation_com|B-Stock|local_recycler" }

    - name: refund
      description: Money / credit issued back to the customer. May or may not be tied to a return_item (returnless refund).
      keys: [refund_id]
      attributes:
        - { name: refund_id, type: varchar(32), isPrimaryKey: true }
        - { name: rma_id, type: varchar(32) }
        - { name: order_id, type: varchar(32), isForeignKey: true, references: sales_order.order_id }
        - { name: customer_id, type: varchar(32), isForeignKey: true, references: customer.customer_id }
        - { name: refund_type, type: varchar(16), description: "original_tender|store_credit|exchange|gift_card|returnless" }
        - { name: refund_amount_minor, type: bigint }
        - { name: currency, type: varchar(3) }
        - { name: restocking_fee_collected_minor, type: bigint }
        - { name: issued_ts, type: timestamp }
        - { name: psp_refund_id, type: varchar(64), description: "PSP-side refund_id (Stripe re_*, PayPal txn id, Adyen pspReference)" }
        - { name: payment_rail, type: varchar(16), description: "card|ach|paypal|store_credit|gift_card|crypto" }
        - { name: status, type: varchar(16), description: "pending|issued|failed|reversed" }

    - name: refurb_outcome
      description: Refurb / Customer Return Center (CRC) outcome for items routed to refurb. One row per return_item per refurb attempt.
      keys: [refurb_outcome_id]
      attributes:
        - { name: refurb_outcome_id, type: varchar(32), isPrimaryKey: true }
        - { name: return_item_id, type: varchar(32), isForeignKey: true, references: return_item.return_item_id }
        - { name: crc_id, type: varchar(16) }
        - { name: started_ts, type: timestamp }
        - { name: completed_ts, type: timestamp }
        - { name: labor_minutes, type: integer }
        - { name: parts_cost_minor, type: bigint }
        - { name: outcome, type: varchar(32), description: "refurbed_A|refurbed_B|refurbed_open_box|scrapped|sent_to_liquidation|returned_to_vendor" }
        - { name: post_refurb_grade, type: varchar(8), description: "A|B|C|scrap" }
        - { name: post_refurb_resale_value_minor, type: bigint, description: "Estimated or realized resale value after refurb" }

    - name: liquidation_lot
      description: Multi-item lot sold through a B-Stock / Liquidation.com / BULQ private store. Carries proceeds + recovery yield.
      keys: [lot_id]
      attributes:
        - { name: lot_id, type: varchar(32), isPrimaryKey: true }
        - { name: marketplace, type: varchar(32), description: "B-Stock|Liquidation_com|BULQ|Direct_Liquidation|eBay_B-Stock|Optoro_OptiTurn" }
        - { name: lot_name, type: varchar(255) }
        - { name: item_count, type: integer }
        - { name: total_cogs_minor, type: bigint }
        - { name: starting_bid_minor, type: bigint }
        - { name: winning_bid_minor, type: bigint }
        - { name: proceeds_minor, type: bigint }
        - { name: currency, type: varchar(3) }
        - { name: listed_ts, type: timestamp }
        - { name: sold_ts, type: timestamp }
        - { name: buyer_country_iso2, type: varchar(2) }
        - { name: recovery_pct, type: "decimal(6,4)", description: "proceeds / cogs" }

    - name: liquidation_lot_item
      description: Bridge linking return_items to liquidation_lots (many return_items can land in one lot).
      keys: [lot_item_id]
      attributes:
        - { name: lot_item_id, type: varchar(32), isPrimaryKey: true }
        - { name: lot_id, type: varchar(32), isForeignKey: true, references: liquidation_lot.lot_id }
        - { name: return_item_id, type: varchar(32), isForeignKey: true, references: return_item.return_item_id }
        - { name: allocated_cogs_minor, type: bigint }
        - { name: allocated_proceeds_minor, type: bigint }

    - name: fraud_signal
      description: Per-return / per-customer fraud signal from Newmine, Appriss-style models, and in-house chronic-returner detection.
      keys: [fraud_signal_id]
      attributes:
        - { name: fraud_signal_id, type: varchar(32), isPrimaryKey: true }
        - { name: rma_id, type: varchar(32) }
        - { name: customer_id, type: varchar(32), isForeignKey: true, references: customer.customer_id }
        - { name: source, type: varchar(32), description: "Newmine|Appriss_Retail|internal_xgb|Loop_workflow|Narvar_rule|Optoro_flag" }
        - { name: signal_type, type: varchar(32), description: "wardrobing|serial_returner|wrong_item_swap|empty_box|receipt_fraud|cross_border_abuse|return_to_different_store|chronic_returner" }
        - { name: score, type: "decimal(5,3)", description: "0..1 risk score" }
        - { name: recommendation, type: varchar(16), description: "approve|verify|deny|stepup_required" }
        - { name: scored_at, type: timestamp }

    - name: carrier_label
      description: Reverse-leg shipping label minted by Loop / Happy Returns / Doddle / ZigZag / ReBound — one row per RMA.
      keys: [label_id]
      attributes:
        - { name: label_id, type: varchar(32), isPrimaryKey: true }
        - { name: rma_id, type: varchar(32), isForeignKey: true, references: return_authorization.rma_id }
        - { name: carrier, type: varchar(16) }
        - { name: service_level, type: varchar(32), description: "ground|expedited|consolidation|drop_off_qr|return_bar" }
        - { name: label_cost_minor, type: bigint }
        - { name: prepaid_by_merchant, type: boolean }
        - { name: created_ts, type: timestamp }
        - { name: scanned_ts, type: timestamp }
        - { name: delivered_ts, type: timestamp }
        - { name: status, type: varchar(16), description: "issued|in_transit|delivered|exception|void" }
        - { name: scope3_kg_co2e, type: "decimal(8,3)", description: "Reverse-leg emissions per ISO 14040 — published by carrier or estimated by EcoVadis" }

  relationships:
    - { from: sales_order, to: customer, kind: many_to_one }
    - { from: return_authorization, to: sales_order, kind: many_to_one }
    - { from: return_authorization, to: customer, kind: many_to_one }
    - { from: return_item, to: return_authorization, kind: many_to_one }
    - { from: return_item, to: reason_code, kind: many_to_one }
    - { from: return_item, to: disposition, kind: many_to_one }
    - { from: refund, to: sales_order, kind: many_to_one }
    - { from: refund, to: customer, kind: many_to_one }
    - { from: refurb_outcome, to: return_item, kind: many_to_one }
    - { from: liquidation_lot_item, to: liquidation_lot, kind: many_to_one }
    - { from: liquidation_lot_item, to: return_item, kind: many_to_one }
    - { from: fraud_signal, to: customer, kind: many_to_one }
    - { from: carrier_label, to: return_authorization, kind: many_to_one }

dataModelArtifacts:
  threeNF: modeling/ddl/returns_reverse_logistics_3nf.sql
  vault: modeling/ddl/returns_reverse_logistics_vault.sql
  dimensional: modeling/ddl/returns_reverse_logistics_dim.sql

