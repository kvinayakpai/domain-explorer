id: demand_planning
name: Demand Planning
vertical: CPG
oneLiner: Statistical + consensus forecasting feeding S&OP, replenishment, and capacity planning.

personas:
  - { name: VP Supply Chain, title: VP Supply Chain, level: VP }
  - { name: Demand Planner, title: Demand Planner, level: IC }
  - { name: S&OP Lead, title: S&OP Lead, level: Director }

decisions:
  - { id: dem.d.consensus, statement: Reconcile statistical baseline with sales overrides. }
  - { id: dem.d.safety_stock, statement: Set safety stock by SKU/location given service target. }
  - { id: dem.d.npi, statement: Phase in/out new products and cannibalization assumptions. }

kpis:
  - id: dem.kpi.mape
    name: Forecast Accuracy (MAPE)
    formula: mean(abs(actual - forecast)/actual)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [dem.d.consensus]
  - id: dem.kpi.bias
    name: Forecast Bias
    formula: mean(forecast - actual)
    unit: units
    direction: target_band
  - id: dem.kpi.fill_rate
    name: Fill Rate
    formula: lines_filled / lines_ordered
    unit: "%"
    direction: higher_is_better
  - id: dem.kpi.otif
    name: OTIF
    formula: orders_on_time_in_full / orders
    unit: "%"
    direction: higher_is_better
  - id: dem.kpi.inventory_days
    name: Inventory Days
    formula: avg_inventory / daily_cogs
    unit: days
    direction: lower_is_better
  - id: dem.kpi.safety_stock_days
    name: Safety Stock Days
    formula: safety_stock_units / daily_demand
    unit: days
    direction: target_band
    decisionsSupported: [dem.d.safety_stock]

dataModel:
  entities:
    - name: product
      keys: [product_id]
      attributes:
        - { name: product_id, type: varchar, isPrimaryKey: true }
        - { name: product_name, type: varchar }
        - { name: category_id, type: varchar, isForeignKey: true, references: product_category.category_id }
        - { name: uom, type: varchar(8) }
        - { name: is_active, type: boolean }
      relationships:
        - { to: actual_demand, kind: one_to_many, via: product_id }
        - { to: statistical_forecast, kind: one_to_many, via: product_id }
    - name: product_category
      keys: [category_id]
      attributes:
        - { name: category_id, type: varchar, isPrimaryKey: true }
        - { name: category_name, type: varchar }
        - { name: parent_category_id, type: varchar, isForeignKey: true, references: product_category.category_id }
    - name: location
      keys: [location_id]
      attributes:
        - { name: location_id, type: varchar, isPrimaryKey: true }
        - { name: location_name, type: varchar }
        - { name: location_type, type: varchar(16) }
        - { name: region_code, type: varchar(8) }
        - { name: parent_location_id, type: varchar, isForeignKey: true, references: location.location_id }
    - name: customer
      keys: [customer_id]
      attributes:
        - { name: customer_id, type: varchar, isPrimaryKey: true }
        - { name: customer_name, type: varchar }
        - { name: channel, type: varchar(16) }
        - { name: region_code, type: varchar(8) }
      relationships:
        - { to: sales_order, kind: one_to_many, via: customer_id }
    - name: product_customer_xref
      keys: [product_id, customer_id]
      attributes:
        - { name: product_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: product.product_id }
        - { name: customer_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: customer.customer_id }
        - { name: customer_sku, type: varchar }
    - name: calendar_period
      keys: [period_id]
      attributes:
        - { name: period_id, type: varchar, isPrimaryKey: true }
        - { name: period_start, type: date }
        - { name: period_end, type: date }
        - { name: period_type, type: varchar(8) }
    - name: statistical_forecast
      keys: [forecast_run_id, product_id, location_id, period_id]
      attributes:
        - { name: forecast_run_id, type: varchar, isPrimaryKey: true }
        - { name: product_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: product.product_id }
        - { name: location_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: location.location_id }
        - { name: period_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: calendar_period.period_id }
        - { name: forecast_qty, type: "decimal(14,2)" }
        - { name: model_code, type: varchar(16) }
        - { name: generated_at, type: timestamp }
    - name: consensus_forecast
      keys: [cycle_id, product_id, location_id, period_id]
      attributes:
        - { name: cycle_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: forecast_cycle.cycle_id }
        - { name: product_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: product.product_id }
        - { name: location_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: location.location_id }
        - { name: period_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: calendar_period.period_id }
        - { name: consensus_qty, type: "decimal(14,2)" }
        - { name: locked_at, type: timestamp }
        - { name: locked_by, type: varchar }
    - name: forecast_override
      keys: [override_id]
      attributes:
        - { name: override_id, type: varchar, isPrimaryKey: true }
        - { name: cycle_id, type: varchar, isForeignKey: true, references: forecast_cycle.cycle_id }
        - { name: product_id, type: varchar, isForeignKey: true, references: product.product_id }
        - { name: location_id, type: varchar, isForeignKey: true, references: location.location_id }
        - { name: period_id, type: varchar, isForeignKey: true, references: calendar_period.period_id }
        - { name: override_qty, type: "decimal(14,2)" }
        - { name: reason_code, type: varchar(16) }
        - { name: submitted_by, type: varchar }
        - { name: submitted_at, type: timestamp }
    - name: actual_demand
      keys: [product_id, location_id, period_id]
      attributes:
        - { name: product_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: product.product_id }
        - { name: location_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: location.location_id }
        - { name: period_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: calendar_period.period_id }
        - { name: actual_qty, type: "decimal(14,2)" }
    - name: sales_order
      keys: [order_id]
      attributes:
        - { name: order_id, type: varchar, isPrimaryKey: true }
        - { name: customer_id, type: varchar, isForeignKey: true, references: customer.customer_id }
        - { name: placed_at, type: timestamp }
        - { name: requested_delivery, type: date }
        - { name: status, type: varchar(16) }
      relationships:
        - { to: sales_order_line, kind: one_to_many, via: order_id }
        - { to: shipment, kind: one_to_many, via: order_id }
    - name: sales_order_line
      keys: [order_id, line_no]
      attributes:
        - { name: order_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: sales_order.order_id }
        - { name: line_no, type: smallint, isPrimaryKey: true }
        - { name: product_id, type: varchar, isForeignKey: true, references: product.product_id }
        - { name: location_id, type: varchar, isForeignKey: true, references: location.location_id }
        - { name: requested_qty, type: "decimal(14,2)" }
        - { name: promised_qty, type: "decimal(14,2)" }
        - { name: unit_price, type: "decimal(12,4)" }
    - name: shipment
      keys: [shipment_id]
      attributes:
        - { name: shipment_id, type: varchar, isPrimaryKey: true }
        - { name: order_id, type: varchar, isForeignKey: true, references: sales_order.order_id }
        - { name: shipped_at, type: timestamp }
        - { name: delivered_at, type: timestamp }
        - { name: carrier, type: varchar(32) }
      relationships:
        - { to: shipment_line, kind: one_to_many, via: shipment_id }
    - name: shipment_line
      keys: [shipment_id, line_no]
      attributes:
        - { name: shipment_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: shipment.shipment_id }
        - { name: line_no, type: smallint, isPrimaryKey: true }
        - { name: product_id, type: varchar, isForeignKey: true, references: product.product_id }
        - { name: shipped_qty, type: "decimal(14,2)" }
    - name: promotion_event
      keys: [promo_id]
      attributes:
        - { name: promo_id, type: varchar, isPrimaryKey: true }
        - { name: promo_name, type: varchar }
        - { name: customer_id, type: varchar, isForeignKey: true, references: customer.customer_id }
        - { name: valid_from, type: date }
        - { name: valid_to, type: date }
        - { name: expected_lift_pct, type: "decimal(6,2)" }
    - name: promotion_product
      keys: [promo_id, product_id]
      attributes:
        - { name: promo_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: promotion_event.promo_id }
        - { name: product_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: product.product_id }
    - name: safety_stock
      keys: [product_id, location_id, effective_from]
      attributes:
        - { name: product_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: product.product_id }
        - { name: location_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: location.location_id }
        - { name: effective_from, type: date, isPrimaryKey: true }
        - { name: safety_stock_units, type: "decimal(14,2)" }
        - { name: service_target_pct, type: "decimal(5,2)" }
    - name: npi_event
      keys: [npi_id]
      attributes:
        - { name: npi_id, type: varchar, isPrimaryKey: true }
        - { name: product_id, type: varchar, isForeignKey: true, references: product.product_id }
        - { name: launch_date, type: date }
        - { name: cannibalised_product_id, type: varchar, isForeignKey: true, references: product.product_id }
        - { name: cannibalisation_pct, type: "decimal(5,2)" }
    - name: forecast_cycle
      keys: [cycle_id]
      attributes:
        - { name: cycle_id, type: varchar, isPrimaryKey: true }
        - { name: cycle_name, type: varchar }
        - { name: cycle_start, type: date }
        - { name: cycle_close, type: date }
        - { name: status, type: varchar(16) }

dataModelArtifacts:
  threeNF: modeling/ddl/demand_planning_3nf.sql
  vault: modeling/ddl/demand_planning_vault.sql
  dimensional: modeling/ddl/demand_planning_dim.sql

sourceSystems:
  - { vendor: SAP, product: Integrated Business Planning, category: Demand Planning }
  - { vendor: Kinaxis, product: RapidResponse, category: Concurrent Planning }
  - { vendor: o9 Solutions, product: Digital Brain, category: Planning }
  - { vendor: Anaplan, product: Connected Planning, category: Planning }

connectors:
  - { type: SAP RFC/IDoc, protocol: RFC, auth: SAP user }
  - { type: REST, protocol: HTTPS, auth: OAuth2 }
  - { type: ETL files, protocol: SFTP, auth: SSH key }

ingestionChallenges:
  - Hierarchies (product, customer, location) reshuffle every quarter.
  - Promo lift overrides arrive in spreadsheets, not signed APIs.

integrationChallenges:
  - Multiple planning systems coexist; reconciliation needed at S&OP cycle.
  - Master data harmonization across ERPs in different regions.
