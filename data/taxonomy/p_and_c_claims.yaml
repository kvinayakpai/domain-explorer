id: p_and_c_claims
name: P&C Claims
vertical: Insurance
oneLiner: First-notice-of-loss through adjudication, payout, and recovery for property & casualty claims.

personas:
  - { name: Chief Claims Officer, title: Chief Claims Officer, level: C-suite }
  - { name: FNOL Manager, title: FNOL Operations Manager, level: Manager }
  - { name: Adjuster, title: Senior Claims Adjuster, level: IC }
  - { name: SIU Lead, title: Special Investigations Unit Lead, level: Director }

decisions:
  - { id: pcc.d.assign, statement: Auto-assign claim to adjuster vs SIU based on risk score. }
  - { id: pcc.d.reserve, statement: Set initial reserve amount given loss type and severity. }
  - { id: pcc.d.fast_track, statement: Fast-track low-complexity claims to settlement. }

kpis:
  - id: pcc.kpi.cycle_time
    name: Claim Cycle Time
    formula: avg(closed_ts - fnol_ts)
    unit: days
    direction: lower_is_better
    decisionsSupported: [pcc.d.fast_track]
  - id: pcc.kpi.leakage
    name: Claims Leakage
    formula: sum(avoidable_paid) / sum(paid)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [pcc.d.assign]
  - id: pcc.kpi.severity
    name: Severity
    formula: sum(paid) / count(claims)
    unit: USD
    direction: lower_is_better
  - id: pcc.kpi.frequency
    name: Frequency
    formula: count(claims) / earned_exposure
    unit: per 100 policies
    direction: lower_is_better
  - id: pcc.kpi.lae_ratio
    name: LAE Ratio
    formula: loss_adjustment_expense / paid_losses
    unit: "%"
    direction: lower_is_better
  - id: pcc.kpi.nps
    name: Claims NPS
    formula: promoters_pct - detractors_pct
    unit: NPS
    direction: higher_is_better

dataModel:
  entities:
    - name: policy
      keys: [policy_id]
      attributes:
        - { name: policy_id, type: varchar, isPrimaryKey: true }
        - { name: policyholder_id, type: varchar, isForeignKey: true, references: policyholder.policyholder_id }
        - { name: product_code, type: varchar(16) }
        - { name: effective_date, type: date }
        - { name: expiration_date, type: date }
        - { name: premium_amount, type: "decimal(14,2)" }
        - { name: state_iso, type: varchar(2) }
        - { name: is_active, type: boolean }
      relationships:
        - { to: claim, kind: one_to_many, via: policy_id }
        - { to: coverage, kind: one_to_many, via: policy_id }
    - name: policyholder
      keys: [policyholder_id]
      attributes:
        - { name: policyholder_id, type: varchar, isPrimaryKey: true }
        - { name: legal_name, type: varchar }
        - { name: party_type, type: varchar(16) }
        - { name: address_line1, type: varchar }
        - { name: city, type: varchar }
        - { name: state_iso, type: varchar(2) }
        - { name: postal_code, type: varchar(16) }
        - { name: country_iso2, type: varchar(2) }
      relationships:
        - { to: policy, kind: one_to_many, via: policyholder_id }
    - name: coverage
      keys: [coverage_id]
      attributes:
        - { name: coverage_id, type: varchar, isPrimaryKey: true }
        - { name: policy_id, type: varchar, isForeignKey: true, references: policy.policy_id }
        - { name: coverage_code, type: varchar(32) }
        - { name: limit_amount, type: "decimal(14,2)" }
        - { name: deductible, type: "decimal(14,2)" }
    - name: claim
      keys: [claim_id]
      attributes:
        - { name: claim_id, type: varchar, isPrimaryKey: true }
        - { name: policy_id, type: varchar, isForeignKey: true, references: policy.policy_id }
        - { name: fnol_ts, type: timestamp }
        - { name: loss_date, type: date }
        - { name: loss_type, type: varchar(32) }
        - { name: loss_state_iso, type: varchar(2) }
        - { name: severity, type: varchar(16) }
        - { name: status, type: varchar(16) }
        - { name: closed_ts, type: timestamp }
      relationships:
        - { to: claim_assignment, kind: one_to_many, via: claim_id }
        - { to: payout, kind: one_to_many, via: claim_id }
        - { to: reserve, kind: one_to_many, via: claim_id }
        - { to: claim_note, kind: one_to_many, via: claim_id }
    - name: claimant
      keys: [claimant_id]
      attributes:
        - { name: claimant_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: legal_name, type: varchar }
        - { name: relationship, type: varchar(32) }
    - name: adjuster
      keys: [adjuster_id]
      attributes:
        - { name: adjuster_id, type: varchar, isPrimaryKey: true }
        - { name: full_name, type: varchar }
        - { name: license_state_iso, type: varchar(2) }
        - { name: team, type: varchar(32) }
        - { name: is_siu, type: boolean }
      relationships:
        - { to: claim_assignment, kind: one_to_many, via: adjuster_id }
    - name: claim_assignment
      keys: [claim_id, adjuster_id, assigned_ts]
      attributes:
        - { name: claim_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: claim.claim_id }
        - { name: adjuster_id, type: varchar, isPrimaryKey: true, isForeignKey: true, references: adjuster.adjuster_id }
        - { name: assigned_ts, type: timestamp, isPrimaryKey: true }
    - name: claim_note
      keys: [note_id]
      attributes:
        - { name: note_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: author_id, type: varchar }
        - { name: note_ts, type: timestamp }
        - { name: note_text, type: text }
        - { name: note_type, type: varchar(16) }
    - name: reserve
      keys: [reserve_id]
      attributes:
        - { name: reserve_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: reserve_type, type: varchar(16) }
        - { name: amount, type: "decimal(14,2)" }
        - { name: set_ts, type: timestamp }
        - { name: set_by, type: varchar }
        - { name: is_current, type: boolean }
    - name: payout
      keys: [payout_id]
      attributes:
        - { name: payout_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: payee_party_id, type: varchar }
        - { name: payment_method, type: varchar(16) }
        - { name: amount, type: "decimal(14,2)" }
        - { name: issued_ts, type: timestamp }
        - { name: cleared_ts, type: timestamp }
    - name: recovery
      keys: [recovery_id]
      attributes:
        - { name: recovery_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: recovery_type, type: varchar(16) }
        - { name: amount, type: "decimal(14,2)" }
        - { name: received_ts, type: timestamp }
    - name: subrogation
      keys: [subro_id]
      attributes:
        - { name: subro_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: third_party, type: varchar }
        - { name: pursued_ts, type: timestamp }
        - { name: recovered_amount, type: "decimal(14,2)" }
        - { name: status, type: varchar(16) }
    - name: fraud_referral
      keys: [referral_id]
      attributes:
        - { name: referral_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: referred_ts, type: timestamp }
        - { name: risk_score, type: "decimal(5,2)" }
        - { name: disposition, type: varchar(16) }
    - name: litigation
      keys: [litigation_id]
      attributes:
        - { name: litigation_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: venue, type: varchar }
        - { name: filed_ts, type: timestamp }
        - { name: closed_ts, type: timestamp }
        - { name: outcome, type: varchar(32) }
    - name: fnol_intake
      keys: [intake_id]
      attributes:
        - { name: intake_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: channel, type: varchar(16) }
        - { name: received_ts, type: timestamp }
        - { name: artifact_count, type: integer }
    - name: claim_artifact
      keys: [artifact_id]
      attributes:
        - { name: artifact_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: artifact_type, type: varchar(16) }
        - { name: storage_uri, type: varchar }
        - { name: captured_ts, type: timestamp }
    - name: vendor
      keys: [vendor_id]
      attributes:
        - { name: vendor_id, type: varchar, isPrimaryKey: true }
        - { name: vendor_name, type: varchar }
        - { name: vendor_type, type: varchar(32) }
    - name: vendor_assignment
      keys: [vendor_assignment_id]
      attributes:
        - { name: vendor_assignment_id, type: varchar, isPrimaryKey: true }
        - { name: claim_id, type: varchar, isForeignKey: true, references: claim.claim_id }
        - { name: vendor_id, type: varchar, isForeignKey: true, references: vendor.vendor_id }
        - { name: assigned_ts, type: timestamp }
        - { name: fee_amount, type: "decimal(14,2)" }

dataModelArtifacts:
  threeNF: modeling/ddl/p_and_c_claims_3nf.sql
  vault: modeling/ddl/p_and_c_claims_vault.sql
  dimensional: modeling/ddl/p_and_c_claims_dim.sql

sourceSystems:
  - { vendor: Guidewire, product: ClaimCenter, category: Claims Platform }
  - { vendor: Duck Creek, product: Claims, category: Claims Platform }
  - { vendor: Salesforce, product: Financial Services Cloud, category: Customer 360 }

connectors:
  - { type: REST, protocol: HTTPS, auth: OAuth2 }
  - { type: JMS, protocol: JMS, auth: Mutual TLS }
  - { type: EDI, protocol: AS2, auth: PKI }
  - { type: Snowflake share, protocol: Snowflake, auth: IAM }

ingestionChallenges:
  - Unstructured FNOL artifacts (photos, voice, PDFs) requiring OCR/NLU.
  - Reserve revisions need bitemporal tracking (system vs business effective).

integrationChallenges:
  - Claims platform customizations vary by carrier; field mappings drift.
  - Strict regulatory reporting cadence (state DOIs, NAIC) on top of operational data.
