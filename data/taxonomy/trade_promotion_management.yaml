id: trade_promotion_management
name: Trade Promotion Management
vertical: CPG
oneLiner: Plan, fund, execute, measure, and settle the >$1T global trade-promotion spend that CPG manufacturers commit to retail partners — promo plans, retailer scan-data, deductions, and pay-for-performance ROI.

# Authoritative sources (as of mid-2026):
#   SAP TPM (S/4HANA CRM Trade Promotion Management)
#     https://help.sap.com/docs/SAP_S4HANA_CLOUD/trade-promotion-management
#     Promotion, Plan Account, Tactic, Funds, Settlement, Validation.
#   Exceedra (Telus / now part of Telus International) — TPx (TPM + TPO)
#     https://www.exceedra.com — Account Plan, Promotion, Funds, Lift Library.
#   AFS Technologies (now Salient/AFS) Retail Execution + TPM
#     https://www.afsi.com — DSD, AFS Customer Connect, TPM, Promotion ROI.
#   T-Pro Solutions — promo optimization (TPx)
#     https://www.tprosolutions.com — Predictive ROI, baseline science.
#   BluePlanner (Upclear) — Revenue Growth Management + TPM
#     https://www.upclear.com — TPM, TPO, Deduction, Live Trade Management.
#   Anaplan TPM (Trade Promotion Management on Anaplan platform)
#     https://www.anaplan.com — Connected Planning models for trade.
#   Accenture CAS (Consumer Goods Cloud / Salesforce Consumer Goods)
#     https://www.salesforce.com/products/consumer-goods/ — Retail Execution + TPM.
#   Vistex Solutions for Trade Promotion
#     https://www.vistex.com — pricing, rebates, deductions, settlements.
#   IRI / Circana (merged 2022) — syndicated POS and panel
#     https://www.circana.com — Unify scan + panel; Liquid Data.
#   NielsenIQ / Nielsen Connect — syndicated retail measurement
#     https://nielseniq.com — Connect Discover, Connect+ Retail.
#   Numerator — purchase panel & promo intel
#     https://www.numerator.com — Promo Insights, Receipt panel.
#   Retailer EDI feeds (X12)
#     EDI 852 — Product Activity Data (POS movement, on-hand inventory)
#     EDI 867 — Product Transfer & Resale Report (sell-through to consumer)
#     EDI 810 — Invoice (used for off-invoice claims)
#     EDI 820 — Payment Order / Remittance (used for deduction settlement)
#     X12 standards: https://www.x12.org/products/transaction-sets
#   GS1 — GTIN / GLN / GDSN for product + location identification
#     https://www.gs1.org
#   NRF AROTS — Association for Retail Open Trading Standards
#     Trade-promo data interchange profile.
#   BlueYonder ESL (Electronic Shelf Labels) — display compliance signals.
#   Salesforce CRM, SAP S/4HANA ERP — order, ship, invoice anchors for redemption.

personas:
  - { name: Trade Marketing Director, title: Director, Trade Marketing, level: Director }
  - { name: Customer Marketing Manager, title: Senior Manager, Customer Marketing, level: Manager }
  - { name: Trade Spend Analyst, title: Senior Analyst, Trade Spend Finance, level: IC }
  - { name: Key Account Manager, title: Director, National Accounts (Walmart/Kroger), level: Director }
  - { name: Deductions Manager, title: Manager, Deductions & Claims, level: Manager }
  - { name: Revenue Growth Manager, title: Director, Revenue Growth Management, level: Director }
  - { name: Finance Controller (Trade), title: Controller, Trade & Promotional Accounting, level: VP }
  - { name: VP Sales, title: VP Sales, North America, level: VP }

decisions:
  - { id: tpm.d.promo_calendar, statement: "Lock the next 13-week promo calendar across the top-20 accounts: which weeks get a feature, which get a TPR, which carry a display." }
  - { id: tpm.d.tactic_mix, statement: "For a given promotion, choose the tactic mix — off-invoice vs scan-down vs bill-back vs MCB — given account preference, deduction risk, and lift expectations." }
  - { id: tpm.d.discount_depth, statement: "Set the consumer discount depth (e.g. $0.50 off vs 2-for-$5) given baseline volume, expected lift curve, and competitive promo intensity." }
  - { id: tpm.d.fund_allocation, statement: "Allocate the annual trade fund across customers and brands — does Walmart get accrual-based or lump-sum, and how much shifts to Kroger if Albertsons under-spends?" }
  - { id: tpm.d.deduction_dispute, statement: "On every retailer deduction, decide: pay, dispute, or reclassify against a different promotion — the wrong call costs 30-90 days of cash." }
  - { id: tpm.d.forward_buy_cap, statement: "Set the forward-buy ceiling (cases per account per week of supply) so a deep promo doesn't drain post-event baseline volume." }
  - { id: tpm.d.display_compliance, statement: "Decide whether to credit a retailer for display execution given AFS/Numerator photo-audit evidence — withholding pay-for-performance damages the relationship; over-paying inflates trade rate." }
  - { id: tpm.d.promo_kill, statement: "Kill or pull-forward an in-flight promotion based on early-week scan data tracking below baseline lift expectation." }
  - { id: tpm.d.new_item_slot, statement: "For a new SKU launch, pick the slotting + intro promo bundle that maximizes 6-month repeat purchase under a fixed introductory budget." }
  - { id: tpm.d.cannibalization_guardrail, statement: "Approve a deep promotion on a hero SKU only if forecast cannibalization on the rest of the brand is below the guardrail (typically <15%)." }

kpis:
  - id: tpm.kpi.trade_spend_pct
    name: Trade Spend %
    formula: sum(trade_spend) / sum(gross_sales)
    unit: "%"
    direction: target_band
    decisionsSupported: [tpm.d.fund_allocation, tpm.d.tactic_mix]
  - id: tpm.kpi.promo_roi
    name: Promo ROI
    formula: (incremental_gross_profit - trade_spend) / trade_spend
    unit: ratio
    direction: higher_is_better
    decisionsSupported: [tpm.d.discount_depth, tpm.d.tactic_mix, tpm.d.promo_kill]
  - id: tpm.kpi.deduction_rate
    name: Deduction Rate
    formula: sum(open_deductions) / sum(invoiced_revenue)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [tpm.d.deduction_dispute]
  - id: tpm.kpi.net_promotion_effectiveness
    name: Net Promotion Effectiveness
    formula: incremental_units / promotional_units
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [tpm.d.discount_depth, tpm.d.tactic_mix]
  - id: tpm.kpi.trade_stock_build_pct
    name: Trade Stock Build %
    formula: (forward_buy_units - normal_purchase_units) / normal_purchase_units
    unit: "%"
    direction: target_band
    decisionsSupported: [tpm.d.forward_buy_cap]
  - id: tpm.kpi.incremental_lift
    name: Incremental Lift
    formula: (promo_period_units - baseline_units) / baseline_units
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [tpm.d.discount_depth, tpm.d.promo_kill]
  - id: tpm.kpi.baseline_volume
    name: Baseline Volume
    formula: sum(non_promo_units * weeks)
    unit: cases
    direction: target_band
    decisionsSupported: [tpm.d.cannibalization_guardrail]
  - id: tpm.kpi.forward_buy_inventory_weeks
    name: Forward-Buy Inventory (weeks of supply)
    formula: forward_buy_units / weekly_baseline_units
    unit: weeks
    direction: target_band
    decisionsSupported: [tpm.d.forward_buy_cap]
  - id: tpm.kpi.display_compliance_pct
    name: Display Compliance %
    formula: stores_with_compliant_display / stores_promised_display
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [tpm.d.display_compliance]
  - id: tpm.kpi.distribution_coverage
    name: Distribution Coverage (%ACV)
    formula: sum(acv_with_sku) / total_acv
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [tpm.d.new_item_slot]
  - id: tpm.kpi.on_shelf_availability_pct
    name: On-Shelf Availability %
    formula: stores_in_stock / stores_audited
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [tpm.d.display_compliance]
  - id: tpm.kpi.perfect_store_score
    name: Perfect Store Score
    formula: weighted_avg(distribution, share_of_shelf, planogram_compliance, price_compliance, promo_compliance)
    unit: index
    direction: higher_is_better
    decisionsSupported: [tpm.d.display_compliance]
  - id: tpm.kpi.retailer_scorecard
    name: Retailer Score-card (Joint Business Plan)
    formula: weighted(otif, fill_rate, deduction_rate, growth_pct, promo_compliance)
    unit: index
    direction: higher_is_better
    decisionsSupported: [tpm.d.fund_allocation]
  - id: tpm.kpi.pay_for_performance_pct
    name: Pay-for-Performance %
    formula: sum(performance_qualified_spend) / sum(committed_spend)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [tpm.d.display_compliance, tpm.d.deduction_dispute]

dataModel:
  entities:
    - name: account
      description: Retailer / customer hierarchy at headquarter level. Mirrors SAP CRM Account or Exceedra Account Plan node — keyed by account_id, with a banner / customer / division roll-up.
      keys: [account_id]
      attributes:
        - { name: account_id, type: varchar(32), isPrimaryKey: true }
        - { name: account_name, type: varchar(255), description: "e.g. Walmart, Kroger, Target — headquarter level" }
        - { name: parent_account_id, type: varchar(32), description: "Banner roll-up (e.g. Albertsons-Safeway umbrella)" }
        - { name: channel, type: varchar(32), description: "grocery|mass|club|drug|convenience|dollar|ecom|food_service" }
        - { name: country_iso2, type: varchar(2) }
        - { name: gln, type: varchar(13), description: "GS1 Global Location Number" }
        - { name: trade_terms_code, type: varchar(16), description: "Off-invoice / scan-down / mixed terms profile" }
        - { name: status, type: varchar(16) }
        - { name: created_at, type: timestamp }

    - name: customer_outlet
      description: Store-level outlet (one row per banner store). Bridge for retailer EDI 852 store-level signals and AFS retail-execution visit logs.
      keys: [outlet_id]
      attributes:
        - { name: outlet_id, type: varchar(32), isPrimaryKey: true }
        - { name: account_id, type: varchar(32), isForeignKey: true, references: account.account_id }
        - { name: store_number, type: varchar(16) }
        - { name: gln, type: varchar(13), description: "GS1 GLN for the store" }
        - { name: country_iso2, type: varchar(2) }
        - { name: state_region, type: varchar(8) }
        - { name: postal_code, type: varchar(16) }
        - { name: format, type: varchar(32), description: "supercenter|grocery|club|express|c-store" }
        - { name: lat, type: "decimal(9,6)" }
        - { name: lng, type: "decimal(9,6)" }
        - { name: opened_at, type: date }
        - { name: status, type: varchar(16) }

    - name: product
      description: Manufacturer SKU. Keyed by GTIN-14 with brand / sub-brand / pack / size / category metadata for promo planning.
      keys: [sku_id]
      attributes:
        - { name: sku_id, type: varchar(32), isPrimaryKey: true }
        - { name: gtin, type: varchar(14), description: "GS1 GTIN-14" }
        - { name: brand, type: varchar(64) }
        - { name: sub_brand, type: varchar(64) }
        - { name: category, type: varchar(64), description: "Snacks, Beverages, Personal Care, etc." }
        - { name: subcategory, type: varchar(64) }
        - { name: pack_size, type: varchar(32) }
        - { name: case_pack_qty, type: smallint }
        - { name: list_price_cents, type: bigint, description: "Wholesale list price (case) in minor units" }
        - { name: srp_cents, type: bigint, description: "Suggested retail price (each) in minor units" }
        - { name: cost_of_goods_cents, type: bigint }
        - { name: launch_date, type: date }
        - { name: status, type: varchar(16) }

    - name: promotion
      description: A planned trade promotion at the account × brand × time window grain. Container for one or more tactics.
      keys: [promotion_id]
      attributes:
        - { name: promotion_id, type: varchar(32), isPrimaryKey: true }
        - { name: account_id, type: varchar(32), isForeignKey: true, references: account.account_id }
        - { name: name, type: varchar(255), description: "e.g. Memorial Day Carbonated Soft Drinks Feature" }
        - { name: fiscal_year, type: smallint }
        - { name: fiscal_quarter, type: smallint }
        - { name: start_date, type: date, description: "ISO 8601" }
        - { name: end_date, type: date, description: "ISO 8601" }
        - { name: ship_start_date, type: date, description: "Earliest order date eligible for the promo" }
        - { name: ship_end_date, type: date }
        - { name: status, type: varchar(16), description: "draft|approved|active|closed|cancelled" }
        - { name: planned_spend_cents, type: bigint }
        - { name: planned_volume_units, type: bigint }
        - { name: planned_lift_pct, type: "decimal(5,2)" }
        - { name: forecast_roi, type: "decimal(6,2)" }
        - { name: created_by, type: varchar(64) }
        - { name: created_at, type: timestamp }
        - { name: approved_at, type: timestamp }

    - name: promo_tactic
      description: One tactical execution under a promotion (e.g. $1.00 off-invoice on a 12-pack for 4 weeks at Kroger). Multiple tactics may share a parent promotion.
      keys: [tactic_id]
      attributes:
        - { name: tactic_id, type: varchar(32), isPrimaryKey: true }
        - { name: promotion_id, type: varchar(32), isForeignKey: true, references: promotion.promotion_id }
        - { name: sku_id, type: varchar(32), isForeignKey: true, references: product.sku_id }
        - { name: tactic_type, type: varchar(32), description: "off_invoice|scan_down|bill_back|mcb|edlp|trade_allowance|display|feature|tpr|coupon|bogo" }
        - { name: discount_per_unit_cents, type: bigint, description: "Manufacturer-funded discount per unit" }
        - { name: consumer_price_cents, type: bigint, description: "Promoted retail price per unit" }
        - { name: srp_cents, type: bigint }
        - { name: planned_units, type: bigint }
        - { name: planned_spend_cents, type: bigint }
        - { name: actual_units, type: bigint }
        - { name: actual_spend_cents, type: bigint }
        - { name: lift_expected_pct, type: "decimal(5,2)" }
        - { name: feature_type, type: varchar(16), description: "ad_block|insert|email|in_app|none" }
        - { name: display_type, type: varchar(16), description: "endcap|aisle_violator|pallet_drop|cooler|none" }
        - { name: tpr_only, type: boolean, description: "Temporary Price Reduction with no feature/display" }
        - { name: settlement_method, type: varchar(16), description: "off_invoice|deduction|check|emc|edi820" }

    - name: deduction
      description: A retailer-issued chargeback claim against a manufacturer invoice. Lifecycle: open → matched → disputed | paid | written-off. Often arrives via EDI 812/820 or as a remittance line item.
      keys: [deduction_id]
      attributes:
        - { name: deduction_id, type: varchar(32), isPrimaryKey: true }
        - { name: account_id, type: varchar(32), isForeignKey: true, references: account.account_id }
        - { name: invoice_id, type: varchar(64), description: "Originating manufacturer invoice (EDI 810)" }
        - { name: claim_number, type: varchar(64), description: "Retailer-issued claim reference" }
        - { name: tactic_id, type: varchar(32), isForeignKey: true, references: promo_tactic.tactic_id, description: "Matched tactic if reconciled" }
        - { name: deduction_type, type: varchar(32), description: "promo|shortage|damages|pricing|compliance|slotting|mcb|other" }
        - { name: amount_cents, type: bigint }
        - { name: open_amount_cents, type: bigint }
        - { name: opened_date, type: date }
        - { name: aging_days, type: integer }
        - { name: status, type: varchar(16), description: "open|matched|disputed|paid|written_off|chargeback_lost" }
        - { name: dispute_reason, type: varchar(64) }
        - { name: resolution_date, type: date }
        - { name: validation_evidence_uri, type: text, description: "Pointer to scan-data export or photo audit used as evidence" }

    - name: baseline_forecast
      description: Statistical baseline volume estimate per account × SKU × week — what would have sold without the promo. Outputs from the IRI/Circana/NielsenIQ baseline model or in-house TPO.
      keys: [baseline_id]
      attributes:
        - { name: baseline_id, type: varchar(32), isPrimaryKey: true }
        - { name: account_id, type: varchar(32), isForeignKey: true, references: account.account_id }
        - { name: sku_id, type: varchar(32), isForeignKey: true, references: product.sku_id }
        - { name: week_start_date, type: date }
        - { name: baseline_units, type: bigint }
        - { name: baseline_dollars_cents, type: bigint }
        - { name: model_name, type: varchar(64), description: "circana_unify|niq_baseline|tpro_predictive|inhouse_glm" }
        - { name: model_version, type: varchar(16) }
        - { name: confidence_band_low, type: bigint }
        - { name: confidence_band_high, type: bigint }
        - { name: generated_at, type: timestamp }

    - name: lift_observation
      description: Observed (post-event) incremental lift for a specific tactic week. Closes the loop on plan vs actual ROI.
      keys: [lift_observation_id]
      attributes:
        - { name: lift_observation_id, type: varchar(32), isPrimaryKey: true }
        - { name: tactic_id, type: varchar(32), isForeignKey: true, references: promo_tactic.tactic_id }
        - { name: account_id, type: varchar(32), isForeignKey: true, references: account.account_id }
        - { name: sku_id, type: varchar(32), isForeignKey: true, references: product.sku_id }
        - { name: week_start_date, type: date }
        - { name: actual_units, type: bigint }
        - { name: baseline_units, type: bigint }
        - { name: incremental_units, type: bigint, description: "actual - baseline" }
        - { name: lift_pct, type: "decimal(6,2)" }
        - { name: cannibalization_units, type: bigint, description: "Loss on related SKUs attributable to this promo" }
        - { name: halo_units, type: bigint, description: "Gain on related SKUs attributable to this promo" }
        - { name: incremental_gross_profit_cents, type: bigint }
        - { name: actual_roi, type: "decimal(6,2)" }
        - { name: source, type: varchar(32), description: "circana|niq|numerator|inhouse|retailer_scan" }

    - name: retailer_scan_data
      description: Weekly retailer POS scan and on-hand inventory feed. Sourced from EDI 852 (Product Activity Data) and EDI 867 (Product Transfer & Resale). The grain is account × outlet × SKU × week.
      keys: [scan_id]
      attributes:
        - { name: scan_id, type: varchar(40), isPrimaryKey: true }
        - { name: account_id, type: varchar(32), isForeignKey: true, references: account.account_id }
        - { name: outlet_id, type: varchar(32), isForeignKey: true, references: customer_outlet.outlet_id }
        - { name: sku_id, type: varchar(32), isForeignKey: true, references: product.sku_id }
        - { name: gtin, type: varchar(14) }
        - { name: week_start_date, type: date }
        - { name: units_sold, type: bigint }
        - { name: dollars_sold_cents, type: bigint }
        - { name: avg_retail_price_cents, type: bigint }
        - { name: on_hand_units, type: integer }
        - { name: on_promo_flag, type: boolean }
        - { name: feature_flag, type: boolean }
        - { name: display_flag, type: boolean }
        - { name: tpr_flag, type: boolean }
        - { name: source_doc, type: varchar(8), description: "EDI 852|EDI 867|niq|circana|numerator|first_party" }
        - { name: ingested_at, type: timestamp }

    - name: trade_fund
      description: Annual trade-spend fund pool by customer × brand × tactic-class. Drives accrual accounting and pay-for-performance gating.
      keys: [fund_id]
      attributes:
        - { name: fund_id, type: varchar(32), isPrimaryKey: true }
        - { name: account_id, type: varchar(32), isForeignKey: true, references: account.account_id }
        - { name: brand, type: varchar(64) }
        - { name: fiscal_year, type: smallint }
        - { name: fund_type, type: varchar(16), description: "accrual|lump_sum|pay_for_performance|mcb_pool" }
        - { name: planned_amount_cents, type: bigint }
        - { name: committed_amount_cents, type: bigint }
        - { name: spent_amount_cents, type: bigint }
        - { name: balance_cents, type: bigint }
        - { name: status, type: varchar(16) }

  relationships:
    - { from: customer_outlet, to: account, kind: many_to_one }
    - { from: promotion, to: account, kind: many_to_one }
    - { from: promo_tactic, to: promotion, kind: many_to_one }
    - { from: promo_tactic, to: product, kind: many_to_one }
    - { from: deduction, to: account, kind: many_to_one }
    - { from: deduction, to: promo_tactic, kind: many_to_one }
    - { from: baseline_forecast, to: account, kind: many_to_one }
    - { from: baseline_forecast, to: product, kind: many_to_one }
    - { from: lift_observation, to: promo_tactic, kind: many_to_one }
    - { from: lift_observation, to: account, kind: many_to_one }
    - { from: lift_observation, to: product, kind: many_to_one }
    - { from: retailer_scan_data, to: account, kind: many_to_one }
    - { from: retailer_scan_data, to: customer_outlet, kind: many_to_one }
    - { from: retailer_scan_data, to: product, kind: many_to_one }
    - { from: trade_fund, to: account, kind: many_to_one }

