connectors:
  - { type: SAP RFC/BAPI, protocol: RFC, auth: SAP user, typicalSources: [SAP TPM, SAP S/4HANA] }
  - { type: SAP IDoc, protocol: RFC/file, auth: SAP user, typicalSources: [SAP TPM] }
  - { type: REST/JSON, protocol: HTTPS, auth: OAuth2, typicalSources: [Exceedra, BluePlanner, Anaplan, Salesforce CG Cloud] }
  - { type: AS2 EDI X12 (852/867/810/820), protocol: AS2, auth: PKI, typicalSources: [Walmart Retail Link, Kroger 84.51, Target Partners Online] }
  - { type: SFTP file feeds, protocol: SFTP, auth: SSH key, typicalSources: [Circana Unify exports, NielsenIQ Connect drops, retailer DSR files] }
  - { type: Circana Liquid Data API, protocol: HTTPS REST, auth: OAuth2 + API key, typicalSources: [Circana] }
  - { type: NielsenIQ Connect API, protocol: HTTPS REST, auth: OAuth2, typicalSources: [NielsenIQ Connect] }
  - { type: Numerator Insights API, protocol: HTTPS REST, auth: API key, typicalSources: [Numerator] }
  - { type: Salesforce Bulk API + CDC, protocol: HTTPS, auth: OAuth2 + JWT, typicalSources: [Salesforce CG Cloud, Sales Cloud] }
  - { type: BlueYonder ESL telemetry stream, protocol: MQTT/HTTPS, auth: TLS + cred, typicalSources: [BlueYonder ESL] }
  - { type: Vistex deduction match webhook, protocol: HTTPS, auth: HMAC, typicalSources: [Vistex] }

ingestionChallenges:
  - Retailer EDI 852/867 feeds arrive on different cadences (Walmart daily, Kroger weekly, regional grocers monthly), with varying GTIN coverage and frequent late files; parser must reconcile partial weeks back-fill.
  - GTIN-to-internal-SKU mapping is brittle — a single product re-pack creates a new GTIN that the master data team often back-dates by weeks, leaving scan rows orphaned in staging.
  - Syndicated panels (Circana, NielsenIQ) ship attributes like baseline volume and any-promo flag at distinct geographies (Total US Food, Walmart-excl, Convenience+) that must be re-aggregated, not unioned.
  - Deductions arrive as freeform remittance lines on EDI 820 / cheque stubs; OCR + NLP extraction creates probabilistic claim → tactic links, requiring an analyst-in-the-loop matching workflow.
  - Promo plan version churn is high (deal sheets revised 4-7 times before lock); changefeed must capture each version and not just the latest, or post-event ROI compares against the wrong baseline.
  - Retail-execution photo audits (AFS, Numerator) can land 2-7 days after the promo week ends — display-compliance KPIs must be late-binding and re-publish when audit data lands.

integrationChallenges:
  - name: Promo plan vs ERP redemption reconciliation
    description: A planned tactic in SAP TPM commits funds, but actual redemption (off-invoice deduction, scan-down credit, MCB cheque) lands in SAP S/4HANA SD/FI as separate document flows — deductions, credit memos, and bill-back invoices. Reconciling plan to actual at the tactic grain requires 4-6 join hops with frequent cardinality blowups.
    mitigation: Persist a tactic_id on every redemption document at point-of-creation (custom field in SAP CRM → SD); build a deterministic match pipeline with confidence scores and an explicit unmatched-bucket so finance can audit drift.
  - name: Baseline volume model conflict
    description: Three or more baseline models (Circana, NielsenIQ, in-house TPO) disagree by 5-30% on the no-promo counterfactual. The choice of baseline drives whether a promo "made ROI" or didn't — a political minefield between marketing and finance.
    mitigation: Persist all baseline models side-by-side with model_name + model_version; require a single canonical baseline policy per account × category, locked annually with sign-off; expose baseline diff in the post-event analytics layer so disagreement is visible, not hidden.
  - name: Retailer scan-data scope mismatch
    description: Retailer EDI 852 covers a subset of stores and SKUs. Circana / NielsenIQ panels project to total category but at higher latency (8 weeks). Manufacturers must blend both — the 852 for early signal, the panel for the truth — without double-counting.
    mitigation: Tag every scan_data row with source_doc (EDI 852 / Circana / NielsenIQ) and projection_factor; downstream lift_observation always uses panel data for closeout but allows EDI for in-flight monitoring.
  - name: Deduction back-charge attribution
    description: Walmart issues a single $400k deduction lump that covers 80 SKUs across 12 weeks; the manufacturer's TPM has those tactics across 4 promotions. Auto-matching is heuristic; unmatched residual goes to the catch-all "unmapped trade" bucket and inflates trade rate.
    mitigation: Use a probabilistic matcher (BluePlanner Live Trade Management or Vistex Match Engine) with proposed allocations, plus an analyst-review queue; log every (deduction, tactic, weight) tuple so post-mortem is auditable.
  - name: Forward-buy distortion of baseline
    description: A deep promo causes the retailer to forward-buy 10 weeks of inventory; subsequent baseline weeks show artificially depressed volume because shelves are still draining the forward-buy. A naive baseline model interprets this as decay and lowers future plan targets.
    mitigation: Tag inventory weeks downstream of a known promo as "forward-buy adjusted"; re-train baselines on a pre-promo window only; surface trade_stock_build_pct as a guardrail KPI on every plan.
  - name: Pay-for-performance evidence chain
    description: Retailers increasingly require proof of compliance (display photos, scan flags) before paying performance funds. Manufacturer evidence is fragmented across AFS rep visits, Numerator photo crowdsourcing, and self-reported compliance — joining at outlet × week × tactic is fragile.
    mitigation: Standardize on a single compliance event log (outlet_id, tactic_id, week_start, evidence_uri, source) with deterministic resolution rules (audit > photo > self-report); pay-for-performance gating reads the unified table only.
  - name: New-item slotting and intro-promo coupling
    description: A new SKU's slotting fee, intro promo discount, and post-launch repeat-purchase forecast are tightly coupled but live in three systems (slotting in CRM/CG Cloud, promo in TPM, repeat in panel data). Decisions get made on month-old snapshots.
    mitigation: Build a launch-tactic master that joins slotting fee + intro tactic + first 12 weeks of scan + Numerator first-time buyer panel into one fact (fct_new_item_launch); refresh weekly during the launch window.
  - name: Cannibalization and halo within a promo
    description: A 2-for-$5 promo on Brand A 12-pack drives volume at Brand A but cannibalizes Brand A 6-pack and halos Brand B salty-snack pairing. Lift attributable to the tactic depends on which related SKUs are in scope.
    mitigation: Define a brand_basket per promo; compute lift, cannibalization, and halo at basket grain; surface all three on the same dashboard so the marketing team can't quietly omit cannibalization.
  - name: Trade-deal grandfathering on price changes
    description: When wholesale list price changes mid-flight, off-invoice deals committed at the old price create deduction disputes for weeks. Historical price tape must be queryable at deal-creation time, not as-of-now.
    mitigation: Implement bi-temporal pricing (effective_from, recorded_at); deal calculations bind to the price as recorded at deal-creation time; audit log carries both the old and new price for every disputed deduction.

