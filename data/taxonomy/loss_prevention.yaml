ingestionChallenges:
  - High-cardinality POS exception streams — ~0.5% exception rate on a 500k-transaction/day chain produces millions of exception rows per week before dedup.
  - Late-binding incidents — an incident is often built days later from CCTV review + audit trail; the exception row predates the incident by 7-30 days and must be back-filled.
  - Video evidence segregation — investigators reference cold-storage CCTV clips by URI but the bytes must never land in the warehouse; lineage tooling must track the reference without copying.
  - Multi-source exception dedup — NCR Voyix LP and Oracle XBR can both flag the same transaction; ingestion needs a (transaction_id, exception_type) idempotency key.
  - PII-restricted columns — employee_id, suspect demographics, plates, customer phone numbers must be hash-tokenized at ingest; raw PII stays in encrypted case-management only.
  - Cross-retailer ORC linking via Auror / ALTO needs durable suspect_ref_hash with the same salt across chains within an ALTO disclosure; salt rotation breaks lineage.

integrationChallenges:
  - name: PII redaction in incident reports
    description: Incident write-ups and exception video clips routinely contain shopper names, employee SSN-stems, partial plates, and demographic descriptors. Pushing those into a data warehouse violates GDPR Art. 5, CCPA/CPRA, and most state LP statutes; pushing them into BI tools puts everyone in scope of PCI DSS v4.0 for residual card data.
    mitigation: Tokenize at the connector boundary — replace name+dob+plate with deterministic SHA-256(value + tenant salt) hashes; quarantine raw PII in an encrypted case-management bucket with separate IAM; document the salt rotation policy and broadcast invalidation events to downstream ORC link tables.
  - name: Video vs structured-data fusion
    description: An exception is one row; the actual proof is 90 seconds of CCTV from three camera angles. Investigators need to jump from the warehouse row to the clip without the warehouse ever holding video bytes.
    mitigation: Persist `video_segment_ref` as a signed URI to a cold-storage object (Sensormatic/RetailNext/Honeywell), with a short-lived presigned-URL minter behind an LP-only IAM role; never replicate video into the lake; capture audit logs of every clip view for chain-of-custody.
  - name: Multi-store retailer data sharing for ORC tracking
    description: Auror and ALTO Alliance only work if retailers share suspect / vehicle / incident data across chains — but every retailer has its own privacy policy and legal-disclosure rules. Naive replication risks breach of contract and statutory privacy violations.
    mitigation: Share only deterministic hashes (suspect_ref_hash, vehicle_ref_hash) plus categorical incident metadata via the ALTO standard; require contractual ALTO disclosure consent at the case level before any cross-retailer link is materialized; persist `alto_packet_id` so any case can be unshared on request.
  - name: Exception score drift between vendors
    description: NCR Voyix LP, Oracle XBR, Profitect, and Aptos LP all output an exception score on different scales (0-100 vs 0-1 vs "low/medium/high"). Downstream alert thresholds and the false-positive KPI become meaningless when the scales drift.
    mitigation: Normalize to a 0..1 score at staging with documented per-source calibration curves; persist both raw_score and normalized score for audit; recompute calibration quarterly against confirmed-incident outcomes.
  - name: Sweethearting attribution to employees
    description: Sweethearting (cashier discounting goods for friends) requires linking a register operator to an exception pattern over weeks — but employees swap registers, share logins in violation of policy, and shift mid-transaction. Naive employee-attribution wrongly accuses associates.
    mitigation: Require register-session login events (start_session, end_session) joined to register_id + timestamp before attributing exceptions to employee_id; emit a "session-collision" DQ alert when overlapping sessions on the same register; never escalate to investigation on attribution alone — require corroborating signals.
  - name: Refund fraud signal isolation
    description: Appriss Retail returns a score and recommendation per return attempt; using that score downstream means a refund denial can be revisited with the model evidence. But Appriss output is contractually restricted from being used for non-LP purposes.
    mitigation: Store Appriss scores in a separate `fraud_score` table with row-level security; expose only the binary recommendation (approve/verify/deny) to non-LP marts; encode use-purpose tags on each query to satisfy the Appriss DPA.
  - name: ORC ring linkage without re-identification
    description: Linking a new suspect to an existing ORC ring requires comparing biometric / behavioral / vehicle / location features across incidents — but storing those features creates a re-identification database under GDPR Art. 9.
    mitigation: Use locality-sensitive-hashing (MinHash, SimHash) on tokenized features so two records can be probabilistically matched without round-tripping raw attributes; persist match_confidence and prohibit cross-attribute joins outside the case-management workflow.
  - name: Reconciling exceptions to physical inventory shrink
    description: Exceptions and incidents are signals; shrink is the ledger truth that appears only at physical count (quarterly or annual). Bridging the two requires reason-coding incidents to a shrink category (theft, error, damage, fraud) so the known/unknown shrink split can be improved over time.
    mitigation: Maintain a controlled `shrink_reason_taxonomy` and post-count reconciliation job that maps closed_recovered + closed_prosecuted + closed_writeoff incidents to known_shrink_minor on the next shrink_snapshot; report Known Shrink % uplift as the program's headline KPI.
  - name: Chain-of-custody for prosecution-grade evidence
    description: Prosecution-bound cases require tamper-evident chain-of-custody on every evidence artifact (video, receipt, statement). A standard data lake's mutability breaks chain-of-custody.
    mitigation: Persist evidence artifacts in WORM (write-once-read-many) storage with cryptographic hash anchored in a tamper-evident ledger; emit OpenLineage events on every read; surface chain-of-custody attestations via `investigation.case_packet_uri` rather than copying artifacts to BI.

