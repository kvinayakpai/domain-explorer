id: agentic_commerce
name: Agentic Commerce
vertical: CrossCutting
oneLiner: Discovery, authorization, payment, and fulfillment of transactions where AI agents act on behalf of human principals across merchants, payment networks, and open agent protocols.

# Authoritative sources (as of mid-2026):
#   AP2 — Agentic Payments Protocol (Google, Visa, Mastercard, Amex et al.)
#     https://ap2-protocol.org — IntentMandate, CartMandate, PaymentMandate.
#   Visa Agent Toolkit / Visa Trusted Agent Protocol (VAP)
#     https://developer.visa.com/agentic — agent identity, scoped delegation,
#     cardholder-of-record passthrough, dispute carry-back.
#   Mastercard Agent Pay
#     https://developer.mastercard.com/agent-pay — Authorization Tokens for Agents,
#     network-issued agent identity (AAID), risk signals.
#   Stripe Agentic Commerce SDK + Stripe MCP server
#     https://docs.stripe.com/agents — checkout sessions with agent context,
#     SetupIntents bound to delegation grants, refund-by-agent.
#   Anthropic Model Context Protocol (MCP)
#     https://modelcontextprotocol.io — JSON-RPC 2.0 server contract; Shopify MCP,
#     official Stripe MCP, Square MCP, PayPal MCP.
#   Skyfire — agent-native payment infrastructure
#     https://skyfire.xyz — KYA (Know-Your-Agent), per-call payment tokens.
#   Crossmint — wallets + checkout for agents
#     https://docs.crossmint.com/agents — headless checkout, fiat + stables.
#   Klarna Agent SDK; OpenAI Operator API; Google Gemini Buy-for-Me; Amazon Buy-for-Me.
#   OAuth 2.1 (draft-ietf-oauth-v2-1) + RFC 9396 Rich Authorization Requests
#     — scoped delegation grants ({"type":"agentic_purchase","max_amount":...,"merchant":...}).
#   W3C Web Payments — Payment Request API + agent-aware Secure Payment Confirmation.
#   ISO 20022 (still applies to underlying rails) and PCI DSS v4.0 for token vaults.

personas:
  - { name: Head of Agentic Commerce, title: VP, Head of Agentic Commerce, level: VP }
  - { name: Agent Trust & Safety Lead, title: Director, Agent Trust & Safety, level: Director }
  - { name: Payments Risk Officer, title: Senior Director, Agent Payments Risk, level: Director }
  - { name: Agent Experience PM, title: Principal PM, Agent Experience, level: Manager }
  - { name: Merchant Agent Integration Engineer, title: Staff Engineer, Merchant Agent Integration, level: IC }
  - { name: Chief Privacy Officer, title: Chief Privacy Officer, level: C-suite }
  - { name: Open Agent Standards Architect, title: Principal Architect, Open Agent Standards, level: IC }

decisions:
  - { id: ac.d.stepup_threshold, statement: "Should we accept agent-initiated purchases above $X without step-up authentication of the human principal?" }
  - { id: ac.d.intent_attribution, statement: "How do we attribute conversion when an agent acts on a human's stated intent days earlier — does the credit go to the agent, the principal, or the prior referrer?" }
  - { id: ac.d.merchant_tiering, statement: "Which merchants get our agent-aware checkout rails versus being treated as legacy headless web targets?" }
  - { id: ac.d.agent_block, statement: "Block, throttle, or pass an inbound agent based on its KYA score and recent dispute history." }
  - { id: ac.d.delegation_scope, statement: "Approve a delegation grant scope (RFC 9396 authorization_details) for a new agent — what max amount, merchant set, expiry?" }
  - { id: ac.d.refund_route, statement: "When a purchased item is wrong but the agent session has expired, should we refund to the original method or hold for reorder?" }
  - { id: ac.d.dispute_carryback, statement: "Carry a chargeback back to the agent operator (per Visa AP2 carry-back) or absorb on-network." }
  - { id: ac.d.mcp_publish, statement: "Publish a product catalog over an MCP server vs leave agents to scrape the storefront." }
  - { id: ac.d.cart_takeover, statement: "Allow an agent to take over a human cart mid-session, or require a fresh intent." }
  - { id: ac.d.identity_proof, statement: "Require attested agent identity (signed JWT from operator) versus accept self-asserted user agent string." }

kpis:
  - id: ac.kpi.agent_attributable_gmv_pct
    name: Agent-Attributable GMV %
    formula: sum(agent_attributable_gmv) / sum(total_gmv)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [ac.d.merchant_tiering, ac.d.mcp_publish]
  - id: ac.kpi.agent_conversion_rate
    name: Agent Conversion Rate
    formula: agent_purchases / agent_intent_events
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [ac.d.intent_attribution, ac.d.cart_takeover]
  - id: ac.kpi.agent_chargeback_rate
    name: Agent-Initiated Chargeback Rate
    formula: agent_chargebacks / agent_transactions
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [ac.d.stepup_threshold, ac.d.dispute_carryback]
  - id: ac.kpi.intent_to_purchase_p50
    name: Intent-to-Purchase Latency (P50)
    formula: percentile(purchase_ts - intent_ts, 0.50)
    unit: seconds
    direction: lower_is_better
    decisionsSupported: [ac.d.cart_takeover]
  - id: ac.kpi.intent_to_purchase_p95
    name: Intent-to-Purchase Latency (P95)
    formula: percentile(purchase_ts - intent_ts, 0.95)
    unit: seconds
    direction: lower_is_better
    decisionsSupported: [ac.d.cart_takeover]
  - id: ac.kpi.stepup_rate
    name: Step-Up Auth Rate
    formula: stepup_required / agent_authorizations
    unit: "%"
    direction: target_band
    decisionsSupported: [ac.d.stepup_threshold]
  - id: ac.kpi.auth_refresh_rate
    name: Agent Authorization Refresh Rate
    formula: refreshed_grants / agent_grants_total
    unit: "%"
    direction: target_band
    decisionsSupported: [ac.d.delegation_scope]
  - id: ac.kpi.agent_id_verification_pass
    name: Agent Identity Verification Pass Rate
    formula: agent_id_verified / agent_auth_attempts
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [ac.d.identity_proof, ac.d.agent_block]
  - id: ac.kpi.cross_agent_trust_score
    name: Cross-Agent Trust Score (median)
    formula: median(kya_trust_score)
    unit: index
    direction: higher_is_better
    decisionsSupported: [ac.d.agent_block]
  - id: ac.kpi.refund_rate_agent
    name: Refund Rate on Agent Purchases
    formula: agent_refunds / agent_purchases
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [ac.d.refund_route]
  - id: ac.kpi.human_override_rate
    name: Human Override Rate
    formula: human_overrides / agent_proposed_purchases
    unit: "%"
    direction: target_band
    decisionsSupported: [ac.d.stepup_threshold]
  - id: ac.kpi.catalog_mcp_discoverability
    name: Catalog Discoverability via MCP
    formula: products_listed_via_mcp / products_listed_total
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [ac.d.mcp_publish]
  - id: ac.kpi.agent_affinity
    name: Agent Affinity (returning agents per merchant)
    formula: distinct_agents_repeat_30d / distinct_agents_30d
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [ac.d.merchant_tiering]
  - id: ac.kpi.tool_call_cost
    name: Mean Tool-Call Cost per Conversion
    formula: sum(tool_call_cost) / count(agent_purchases)
    unit: USD
    direction: lower_is_better

dataModel:
  entities:
    - name: agent
      description: Autonomous AI agent that may transact on behalf of a principal. Identified by AAID (Agent Authorization ID) per AP2 / Mastercard Agent Pay registry.
      keys: [agent_id]
      attributes:
        - { name: agent_id, type: varchar(64), isPrimaryKey: true }
        - { name: aaid, type: varchar(64), description: "Network-issued Agent Authorization ID (AP2 §4.2 / Mastercard Agent Pay)" }
        - { name: operator_org, type: varchar(255), description: "Operator: anthropic|openai|google|amazon|klarna|merchant_internal" }
        - { name: agent_kind, type: varchar(32), description: "shopping_assistant|task_agent|browser_agent|chat_agent|workflow_agent" }
        - { name: model_family, type: varchar(64), description: "claude-opus-4|gpt-4o|gemini-2-ultra|...; recorded for risk attribution" }
        - { name: kya_status, type: varchar(16), description: "Know-Your-Agent: verified|self_asserted|denied" }
        - { name: kya_trust_score, type: "decimal(5,2)", description: "Skyfire/Visa-derived trust index 0..100" }
        - { name: created_at, type: timestamp }
        - { name: status, type: varchar(16), description: "active|paused|blocked|retired" }

    - name: principal
      description: Human user on whose behalf an agent acts. The cardholder-of-record per Visa Trusted Agent Protocol passthrough.
      keys: [principal_id]
      attributes:
        - { name: principal_id, type: varchar(64), isPrimaryKey: true }
        - { name: external_user_ref, type: varchar(128), description: "Pseudonymous user ref from issuer/wallet" }
        - { name: country_iso2, type: varchar(2) }
        - { name: kyc_level, type: varchar(8), description: "L0|L1|L2|L3 per FATF tiering" }
        - { name: created_at, type: timestamp }
        - { name: stepup_capable, type: boolean, description: "WebAuthn / SPC / push step-up enrolled" }
        - { name: status, type: varchar(16) }

    - name: merchant
      description: Merchant / seller, optionally agent-aware (publishes MCP server, accepts AP2 PaymentMandate).
      keys: [merchant_id]
      attributes:
        - { name: merchant_id, type: varchar(64), isPrimaryKey: true }
        - { name: legal_name, type: varchar(255) }
        - { name: domain, type: varchar(255) }
        - { name: country_iso2, type: varchar(2) }
        - { name: mcc, type: varchar(4), description: "ISO 18245 Merchant Category Code" }
        - { name: agent_aware_tier, type: varchar(16), description: "tier1_native|tier2_mcp|tier3_legacy" }
        - { name: mcp_endpoint, type: text, description: "JSON-RPC 2.0 MCP server URL" }
        - { name: ap2_endpoint, type: text, description: "AP2 mandate verification endpoint" }
        - { name: created_at, type: timestamp }

    - name: authorization_grant
      description: OAuth 2.1 + RFC 9396 Rich Authorization Request issued by the principal authorizing an agent for a scoped purchase set. AP2 IntentMandate maps onto this.
      keys: [grant_id]
      attributes:
        - { name: grant_id, type: varchar(64), isPrimaryKey: true }
        - { name: principal_id, type: varchar(64), isForeignKey: true, references: principal.principal_id }
        - { name: agent_id, type: varchar(64), isForeignKey: true, references: agent.agent_id }
        - { name: rar_type, type: varchar(64), description: "RFC 9396 authorization_details.type — agentic_purchase | recurring_purchase | refund" }
        - { name: max_amount_minor, type: bigint, description: "Cap in ISO 4217 minor units" }
        - { name: max_amount_currency, type: varchar(3) }
        - { name: merchant_scope, type: text, description: "JSON: allowed merchant_ids or domain wildcards" }
        - { name: category_scope, type: text, description: "JSON: MCC/ISO category constraints" }
        - { name: per_txn_cap_minor, type: bigint }
        - { name: scope_expires_at, type: timestamp }
        - { name: stepup_required_above_minor, type: bigint }
        - { name: issued_at, type: timestamp }
        - { name: revoked_at, type: timestamp }
        - { name: status, type: varchar(16), description: "active|expired|revoked|exhausted" }

    - name: agent_session
      description: Bounded interaction window during which an agent operates under a grant. Maps to AP2 session and to MCP tool-call session.
      keys: [session_id]
      attributes:
        - { name: session_id, type: varchar(64), isPrimaryKey: true }
        - { name: agent_id, type: varchar(64), isForeignKey: true, references: agent.agent_id }
        - { name: principal_id, type: varchar(64), isForeignKey: true, references: principal.principal_id }
        - { name: grant_id, type: varchar(64), isForeignKey: true, references: authorization_grant.grant_id }
        - { name: started_at, type: timestamp }
        - { name: ended_at, type: timestamp }
        - { name: client_signature, type: text, description: "Signed JWT from operator attesting session origin" }
        - { name: principal_present, type: boolean, description: "Was the human in the loop at session start?" }

    - name: intent_event
      description: Stated intent from principal-to-agent ("buy me running shoes under $120 by Friday"). AP2 IntentMandate. The grain of agentic conversion attribution.
      keys: [intent_id]
      attributes:
        - { name: intent_id, type: varchar(64), isPrimaryKey: true }
        - { name: session_id, type: varchar(64), isForeignKey: true, references: agent_session.session_id }
        - { name: principal_id, type: varchar(64), isForeignKey: true, references: principal.principal_id }
        - { name: agent_id, type: varchar(64), isForeignKey: true, references: agent.agent_id }
        - { name: intent_text_hash, type: varchar(128), description: "SHA-256 of normalized intent text (PII not persisted)" }
        - { name: category_hint, type: varchar(64) }
        - { name: budget_min_minor, type: bigint }
        - { name: budget_max_minor, type: bigint }
        - { name: budget_currency, type: varchar(3) }
        - { name: deadline_ts, type: timestamp }
        - { name: state, type: varchar(16), description: "received|searching|cart_built|awaiting_auth|fulfilled|abandoned|expired" }
        - { name: created_at, type: timestamp }
        - { name: resolved_at, type: timestamp }

    - name: tool_call
      description: One MCP tool invocation made by the agent in service of an intent. Recorded for trace, billing, audit.
      keys: [tool_call_id]
      attributes:
        - { name: tool_call_id, type: varchar(64), isPrimaryKey: true }
        - { name: session_id, type: varchar(64), isForeignKey: true, references: agent_session.session_id }
        - { name: intent_id, type: varchar(64), isForeignKey: true, references: intent_event.intent_id }
        - { name: server_name, type: varchar(64), description: "stripe-mcp|shopify-mcp|merchant-mcp|search-mcp" }
        - { name: tool_name, type: varchar(128) }
        - { name: started_at, type: timestamp }
        - { name: latency_ms, type: integer }
        - { name: cost_usd, type: "decimal(10,6)", description: "Per-call cost — Skyfire/Crossmint per-call payment" }
        - { name: status, type: varchar(16), description: "ok|error|timeout|rate_limited|denied" }
        - { name: input_size_bytes, type: integer }
        - { name: output_size_bytes, type: integer }

    - name: cart
      description: AP2 CartMandate — items the agent intends to purchase, signed for principal review.
      keys: [cart_id]
      attributes:
        - { name: cart_id, type: varchar(64), isPrimaryKey: true }
        - { name: intent_id, type: varchar(64), isForeignKey: true, references: intent_event.intent_id }
        - { name: merchant_id, type: varchar(64), isForeignKey: true, references: merchant.merchant_id }
        - { name: subtotal_minor, type: bigint }
        - { name: tax_minor, type: bigint }
        - { name: shipping_minor, type: bigint }
        - { name: total_minor, type: bigint }
        - { name: currency, type: varchar(3) }
        - { name: line_count, type: smallint }
        - { name: signed_payload_hash, type: varchar(128), description: "SHA-256 of the canonical AP2 CartMandate JSON" }
        - { name: signature_alg, type: varchar(16), description: "ES256|RS256" }
        - { name: built_at, type: timestamp }
        - { name: confirmed_by_principal, type: boolean }
        - { name: confirmation_ts, type: timestamp }

    - name: agent_transaction
      description: Authorization+capture record for an agent-initiated payment. AP2 PaymentMandate execution.
      keys: [agent_txn_id]
      attributes:
        - { name: agent_txn_id, type: varchar(64), isPrimaryKey: true }
        - { name: cart_id, type: varchar(64), isForeignKey: true, references: cart.cart_id }
        - { name: grant_id, type: varchar(64), isForeignKey: true, references: authorization_grant.grant_id }
        - { name: agent_id, type: varchar(64), isForeignKey: true, references: agent.agent_id }
        - { name: principal_id, type: varchar(64), isForeignKey: true, references: principal.principal_id }
        - { name: merchant_id, type: varchar(64), isForeignKey: true, references: merchant.merchant_id }
        - { name: psp, type: varchar(32), description: "stripe|adyen|braintree|skyfire|crossmint|klarna" }
        - { name: rail, type: varchar(16), description: "card|ach|sepa|stable_usd|wire" }
        - { name: scheme, type: varchar(16), description: "Visa|Mastercard|Amex|Discover|JCB|n/a" }
        - { name: agent_indicator, type: varchar(16), description: "Visa AGI / Mastercard AAI flag carried in auth message" }
        - { name: amount_minor, type: bigint }
        - { name: currency, type: varchar(3) }
        - { name: stepup_method, type: varchar(16), description: "none|webauthn|spc|push|sms|email_otp" }
        - { name: status, type: varchar(16), description: "authorized|captured|declined|reversed|refunded|disputed" }
        - { name: authorized_at, type: timestamp }
        - { name: captured_at, type: timestamp }
        - { name: decline_reason, type: varchar(64) }
        - { name: latency_ms, type: integer, description: "End-to-end auth latency including network hop" }

    - name: attribution_link
      description: Conversion attribution edge from intent to transaction; supports multi-touch & delayed-credit models.
      keys: [attribution_id]
      attributes:
        - { name: attribution_id, type: varchar(64), isPrimaryKey: true }
        - { name: intent_id, type: varchar(64), isForeignKey: true, references: intent_event.intent_id }
        - { name: agent_txn_id, type: varchar(64), isForeignKey: true, references: agent_transaction.agent_txn_id }
        - { name: model, type: varchar(32), description: "first_touch|last_touch|linear|time_decay|ml_uplift" }
        - { name: weight, type: "decimal(5,4)", description: "0..1 share of the conversion credit" }
        - { name: lookback_seconds, type: integer }
        - { name: created_at, type: timestamp }

    - name: trust_score_event
      description: KYA / Skyfire trust-score datapoint, time-stamped, append-only.
      keys: [trust_event_id]
      attributes:
        - { name: trust_event_id, type: varchar(64), isPrimaryKey: true }
        - { name: agent_id, type: varchar(64), isForeignKey: true, references: agent.agent_id }
        - { name: source, type: varchar(32), description: "skyfire|visa_kya|mastercard_aai|merchant_local" }
        - { name: score, type: "decimal(5,2)" }
        - { name: signal_summary, type: text }
        - { name: observed_at, type: timestamp }

    - name: dispute
      description: Chargeback / dispute on an agent transaction. Includes carry-back flag per Visa AP2 §7.
      keys: [dispute_id]
      attributes:
        - { name: dispute_id, type: varchar(64), isPrimaryKey: true }
        - { name: agent_txn_id, type: varchar(64), isForeignKey: true, references: agent_transaction.agent_txn_id }
        - { name: reason_code, type: varchar(8), description: "Visa/Mastercard reason code" }
        - { name: opened_at, type: timestamp }
        - { name: resolved_at, type: timestamp }
        - { name: amount_minor, type: bigint }
        - { name: currency, type: varchar(3) }
        - { name: outcome, type: varchar(16), description: "won|lost|withdrawn|carried_back" }
        - { name: carryback_to_operator, type: boolean, description: "AP2 carry-back to agent operator" }

  relationships:
    - { from: agent_session, to: agent, kind: many_to_one }
    - { from: agent_session, to: principal, kind: many_to_one }
    - { from: agent_session, to: authorization_grant, kind: many_to_one }
    - { from: authorization_grant, to: principal, kind: many_to_one }
    - { from: authorization_grant, to: agent, kind: many_to_one }
    - { from: intent_event, to: agent_session, kind: many_to_one }
    - { from: tool_call, to: agent_session, kind: many_to_one }
    - { from: tool_call, to: intent_event, kind: many_to_one }
    - { from: cart, to: intent_event, kind: many_to_one }
    - { from: cart, to: merchant, kind: many_to_one }
    - { from: agent_transaction, to: cart, kind: many_to_one }
    - { from: agent_transaction, to: authorization_grant, kind: many_to_one }
    - { from: agent_transaction, to: merchant, kind: many_to_one }
    - { from: attribution_link, to: intent_event, kind: many_to_one }
    - { from: attribution_link, to: agent_transaction, kind: many_to_one }
    - { from: trust_score_event, to: agent, kind: many_to_one }
    - { from: dispute, to: agent_transaction, kind: many_to_one }

dataModelArtifacts:
  threeNF: modeling/ddl/agentic_commerce_3nf.sql
  vault: modeling/ddl/agentic_commerce_vault.sql
  dimensional: modeling/ddl/agentic_commerce_dim.sql

