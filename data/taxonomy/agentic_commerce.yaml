connectors:
  - { type: Stripe Agentic SDK REST, protocol: HTTPS JSON, auth: Bearer + agent JWT }
  - { type: Stripe MCP (JSON-RPC 2.0), protocol: HTTPS / stdio, auth: OAuth2 + MCP capability tokens }
  - { type: Visa AP2 endpoint, protocol: HTTPS JSON, auth: mTLS + signed mandates }
  - { type: Mastercard Agent Pay API, protocol: HTTPS JSON, auth: OAuth2 + mTLS }
  - { type: Skyfire payment-token API, protocol: HTTPS, auth: API key + agent attestation }
  - { type: MCP server (generic), protocol: JSON-RPC 2.0 over HTTPS or stdio, auth: OAuth2 + capability token }
  - { type: OAuth 2.1 / RFC 9396 RAR, protocol: HTTPS, auth: PKCE + DPoP }
  - { type: Webhook (transaction events), protocol: HTTPS, auth: HMAC signed }
  - { type: Crossmint checkout webhook, protocol: HTTPS, auth: HMAC + agent header }
  - { type: Operator JWT attestation header, protocol: HTTPS, auth: signed JWT (ES256) }

ingestionChallenges:
  - High-cardinality intent events — millions of agent intents per day across operators, with bursty windows tied to chat traffic spikes.
  - Agent session windowing is non-trivial; sessions span multiple MCP servers and may pause/resume across hours.
  - Tool-call traces are deeply nested — each agent purchase can fan out to 30–200 tool calls across MCP servers.
  - MCP server log volume is enormous and unstructured; ingest must extract method/params/result without persisting principal-level PII.
  - Dual-rail event streams (operator API webhooks + network agent-indicator messages) require correlation by signed mandate hash.
  - Late-binding refunds and disputes arrive days/weeks after the agent session has closed — the intent-to-purchase attribution must accept revisions.
  - Operator clock skew across Anthropic/OpenAI/Google/Amazon means session timestamps disagree by up to seconds; canonical time must be derived.

integrationChallenges:
  - name: Agent identity is not the human
    description: The cardholder of record is the principal, but the actor at the API is the agent. Standard fraud rules trained on human behavior misfire because tool-call cadence, IP, and device signals look bot-like by design.
    mitigation: Adopt AP2 IntentMandate signature + AAID (Agent Authorization ID) + Visa AGI / Mastercard AAI auth-message flags; build agent-aware fraud features (KYA score, operator reputation, signed delegation chain).
  - name: Refund authorization when the agent is gone
    description: The original agent session ends within hours, but refund eligibility lasts months. Without durable consent, customer service has no on-file authority to refund-via-agent or push the refund to a different rail.
    mitigation: Mint a long-lived refund-only RAR grant at purchase time; persist principal-side refund consent in a wallet artifact (Visa Trusted Agent Refund Token).
  - name: Cross-platform agent identity
    description: An agent run by Anthropic today might be repurposed by another operator tomorrow. There is no universal agent registry — KYA scores diverge across networks.
    mitigation: Track operator+model+version triple; require attested operator JWT; cross-publish trust signals via AP2 §6 signal exchange where contractually permitted.
  - name: Real-time vs cached agent trust
    description: A sub-200ms checkout path can't fetch fresh KYA on every transaction; cached scores risk authorizing a recently-blacklisted agent.
    mitigation: Cache KYA score with TTL ≤ 60s; subscribe to real-time revocation streams (Skyfire deny-list webhooks, Visa AAID revocation feed); apply step-up rather than block on stale-score uncertainty.
  - name: PII propagation through agents
    description: Agents can echo principal PII into prompts, tool calls, and merchant payloads, often unintentionally. GDPR Art. 5 data minimization is hard to enforce when an LLM is the routing layer.
    mitigation: Tokenize PII before tool-call entry; enforce schema-level redaction at the MCP server boundary; log only hashes of intent text; require operators to declare PII handling under DPA addenda.
  - name: Intent-to-conversion windowing
    description: A principal expresses intent on Monday; the agent transacts on Friday. Standard last-click attribution erases the agent's role, but pure first-touch over-credits a vague intent.
    mitigation: Implement multi-touch attribution at the intent-grain (intent_id), not the session-grain; default to time-decay with an operator-tunable half-life.
  - name: Step-up auth UX across operators
    description: Each operator surfaces step-up differently — chat modal, push notification, browser hand-off. Inconsistent UX kills conversion and confuses fraud telemetry.
    mitigation: Adopt W3C Secure Payment Confirmation (SPC) where supported; use FIDO2/WebAuthn assertions carried in AP2 PaymentMandate; document per-operator fallback ladders.
  - name: Dispute carry-back attribution
    description: When a chargeback lands, was it the merchant's fault, the agent's misinterpretation, or the principal changing their mind? Visa AP2 §7 introduces carry-back-to-operator but requires evidence of agent fault.
    mitigation: Capture the signed CartMandate + IntentMandate at dispute time; preserve tool_call trace; arbitration follows AP2 evidence specification.
  - name: Catalog freshness for MCP
    description: Agents shop a stale MCP-published catalog and select OOS or wrong-priced items, generating refunds and trust loss.
    mitigation: Cache TTL ≤ 60s on MCP product responses; expose inventory and price as separate fast-path resources; reject stale CartMandates at checkout.

