id: procurement_spend_analytics
name: Procurement & Spend Analytics
vertical: Manufacturing
oneLiner: Source-to-pay (S2P), spend cube analytics, supplier risk and ESG scoring, contract compliance, and Scope 3 emissions attribution across direct and indirect procurement categories in a multi-ERP, multi-currency manufacturing enterprise.

# Authoritative sources (as of mid-2026):
#   UNSPSC — United Nations Standard Products and Services Code (v26.x)
#     https://www.unspsc.org — canonical category taxonomy for spend cubing.
#   ISO 20400 — Sustainable procurement guidance (2017).
#     https://www.iso.org/standard/63026.html — establishes the obligations on
#     procurement for environmental / social / governance integration.
#   GHG Protocol — Corporate Value Chain (Scope 3) Standard (WRI/WBCSD).
#     https://ghgprotocol.org — defines the 15 Scope 3 categories;
#     procurement owns Category 1 (Purchased Goods & Services) and
#     Category 2 (Capital Goods).
#   ISO 14064-1 — GHG quantification and reporting at the organization level.
#     https://www.iso.org/standard/66453.html
#   CSRD / ESRS — EU Corporate Sustainability Reporting Directive (2024 phase-in).
#     ESRS E1 (Climate) — disclosure of Scope 1/2/3 emissions by category.
#   CDP — Supply Chain disclosure (formerly Carbon Disclosure Project).
#     https://www.cdp.net — supplier-level GHG and water-risk surveys.
#   EU Corporate Sustainability Due Diligence Directive (CSDDD, 2024).
#   SBTi — Science-Based Targets initiative, Net-Zero Standard for Corporates.
#   Open Peppol BIS Billing 3.0 — pan-European e-invoicing.
#     https://docs.peppol.eu/poacc/billing/3.0/
#   EDI X12 850 (Purchase Order), 855 (PO Ack), 856 (ASN), 810 (Invoice),
#   820 (Remittance Advice), 832 (Price Catalog).
#   ISO 20022 (rails for payment of invoices — credit transfer pacs.008).
#   Dun & Bradstreet DUNS — universal supplier identifier (9-digit).
#   LEI — Legal Entity Identifier (ISO 17442) for cross-border supplier KYC.
#   NAICS / SIC codes — for supplier classification in NA reporting.
#   ECCN / ITAR / EAR — export-controlled item flags carried on supplier master.
#
# Vendors:
#   SAP Ariba — Ariba Network, Sourcing, Contracts, SLP (Supplier Lifecycle &
#     Performance), Spend Analysis, Buying & Invoicing. https://www.ariba.com
#   Coupa Business Spend Management Platform — Procure, Sourcing, Contracts,
#     Risk Assess (third-party risk), Travel & Expense. https://www.coupa.com
#   Jaggaer ONE — sourcing, contracts, supplier management, advanced sourcing
#     optimization. https://www.jaggaer.com
#   Ivalua Source-to-Pay — sourcing, contracts, supplier 360, AP automation.
#     https://www.ivalua.com
#   GEP SMART (and GEP NEXXE for supply-chain). https://www.gepworldwide.com
#   Oracle Fusion Cloud Procurement, Oracle Sourcing, Oracle Contracts.
#     https://www.oracle.com/scm/procurement/
#   Workday Strategic Sourcing (formerly Scout RFP).
#     https://www.workday.com/en-us/products/strategic-sourcing/overview.html
#   Tradeshift — supplier network and e-invoicing.
#     https://tradeshift.com
#   Basware — AP automation, e-invoicing receipt.
#     https://www.basware.com
#   Zycus — source-to-pay, AI-led negotiation.
#     https://www.zycus.com
#   EcoVadis — supplier sustainability ratings (E/S/G + Ethics + Sustainable
#     Procurement scorecards). https://ecovadis.com
#   Sievo — pure-play spend analytics and emissions attribution.
#     https://sievo.com
#   Spendkey — managed spend-analytics.
#     https://www.spendkey.com
#   Resilinc — supplier risk monitoring (multi-tier, geopolitical).
#     https://www.resilinc.com
#   Riskmethods (now Sphera SCRM) — supply chain risk.
#     https://sphera.com
#   Everstream Analytics — supplier risk.
#   Dun & Bradstreet — D-U-N-S, Paydex, financial-distress signals.
#     https://www.dnb.com
#   RiskRecon (Mastercard) and BitSight — supplier cyber-rating.
#   CDP Supply Chain, MSCI ESG, S&P Global Sustainable1 — sustainability data.
#   ERP: SAP S/4HANA MM/FI, Oracle Cloud ERP, Microsoft Dynamics 365 F&O,
#     Infor CloudSuite, Workday Financials.

personas:
  - { name: Chief Procurement Officer, title: Chief Procurement Officer, level: C-suite }
  - { name: Category Manager (Indirect), title: Category Manager, Indirect Spend, level: Manager }
  - { name: Category Manager (Direct), title: Category Manager, Direct Materials, level: Manager }
  - { name: Sourcing Director, title: Director, Strategic Sourcing, level: Director }
  - { name: Sustainability Procurement Lead, title: Senior Director, Sustainable Procurement & Scope 3, level: Director }
  - { name: Spend Analyst, title: Senior Spend Analyst, level: IC }
  - { name: Supplier Risk Manager, title: Director, Supplier Risk & Resilience, level: Director }
  - { name: Contract Manager, title: Senior Contract Manager, level: IC }
  - { name: AP Operations Lead, title: Senior Manager, Accounts Payable Operations, level: Manager }

decisions:
  - { id: psa.d.consolidate_suppliers, statement: "For a category with N qualified suppliers, should we consolidate spend onto the top K — and which suppliers get culled given price, risk, ESG, and diversity considerations?" }
  - { id: psa.d.negotiate_now, statement: "Trigger a renegotiation now (spike in commodity index, supplier paydex drop, contract approaching tail) or wait until the next contracted price-review window?" }
  - { id: psa.d.terminate_supplier, statement: "Terminate a supplier (single-source risk, repeated quality NCs, EcoVadis below threshold, sanctions exposure) or place on watchlist with a corrective action plan?" }
  - { id: psa.d.renegotiate_payment_terms, statement: "Push payment terms from Net-30 to Net-60 on a supplier (working-capital win) versus accept early-pay discount (Net-10 1.5%) — model the WACC trade-off." }
  - { id: psa.d.tail_spend_strategy, statement: "How do we tackle the tail (bottom 80% of suppliers, 5% of spend)? Catalog/punchout consolidation, P-card, marketplace (Amazon Business), or auto-PO via rules?" }
  - { id: psa.d.scope3_supplier_engagement, statement: "Which suppliers do we engage for primary Scope 3 data (CDP Supply Chain survey, SBTi commitment) versus accept industry-average emissions factors?" }
  - { id: psa.d.maverick_spend_response, statement: "When a buyer transacts off-contract (maverick spend), do we block, route to manager approval, or absorb and convert to a future PO?" }
  - { id: psa.d.contract_renewal, statement: "Auto-renew, renegotiate, RFP, or terminate at contract expiry given realized savings, compliance, and risk performance?" }
  - { id: psa.d.diversify_geography, statement: "Dual-source or near-shore a critical supplier currently concentrated in a single geopolitically exposed region (Resilinc red-flag)?" }
  - { id: psa.d.invoice_match_threshold, statement: "Where should the 3-way-match tolerance sit for low-value invoices — auto-pay <$2,500 with 2-way match versus require receipt?" }

kpis:
  - id: psa.kpi.spend_under_mgmt
    name: Total Spend Under Management
    formula: sum(spend_with_active_contract_or_strategic_sourced) / sum(total_spend)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [psa.d.consolidate_suppliers, psa.d.tail_spend_strategy]
  - id: psa.kpi.savings_realized_pct
    name: Savings Realized %
    formula: sum(savings_realized) / sum(savings_committed)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [psa.d.negotiate_now, psa.d.contract_renewal]
  - id: psa.kpi.maverick_spend_pct
    name: Maverick Spend %
    formula: sum(off_contract_spend) / sum(total_addressable_spend)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [psa.d.maverick_spend_response, psa.d.tail_spend_strategy]
  - id: psa.kpi.contract_compliance_pct
    name: Contract Compliance %
    formula: sum(spend_on_contracted_terms) / sum(spend_with_active_contract)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [psa.d.maverick_spend_response, psa.d.contract_renewal]
  - id: psa.kpi.supplier_risk_score
    name: Supplier Risk Score (weighted)
    formula: weighted(financial, geographic, cyber, compliance, sustainability) per supplier
    unit: index
    direction: lower_is_better
    decisionsSupported: [psa.d.terminate_supplier, psa.d.diversify_geography]
  - id: psa.kpi.supplier_diversity_pct
    name: Supplier Diversity %
    formula: sum(spend_with_diverse_suppliers) / sum(total_addressable_spend)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [psa.d.consolidate_suppliers]
  - id: psa.kpi.scope3_intensity
    name: Scope 3 Emissions kg CO2e per $ spent (Category 1+2)
    formula: sum(supplier_scope3_kgco2e) / sum(spend_usd)
    unit: kgCO2e/USD
    direction: lower_is_better
    decisionsSupported: [psa.d.scope3_supplier_engagement, psa.d.consolidate_suppliers]
  - id: psa.kpi.touchless_po_pct
    name: Touchless PO %
    formula: count(po_no_human_intervention) / count(total_po)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [psa.d.tail_spend_strategy]
  - id: psa.kpi.po_cycle_time
    name: PO Cycle Time (requisition → PO issued)
    formula: avg(po_issued_ts - req_submitted_ts)
    unit: hours
    direction: lower_is_better
    decisionsSupported: [psa.d.tail_spend_strategy]
  - id: psa.kpi.ap_aging_over_60
    name: AP Aging > 60 days %
    formula: sum(open_ap_amount where age_days > 60) / sum(open_ap_amount)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [psa.d.invoice_match_threshold]
  - id: psa.kpi.invoice_match_rate
    name: Three-Way Invoice Match Rate
    formula: count(invoices_matched_3way) / count(invoices_total)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [psa.d.invoice_match_threshold]
  - id: psa.kpi.sustainable_spend_pct
    name: Sustainable Spend %
    formula: sum(spend_with_ecovadis_silver_or_better) / sum(total_addressable_spend)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [psa.d.scope3_supplier_engagement, psa.d.consolidate_suppliers]
  - id: psa.kpi.critical_supplier_concentration
    name: Critical Supplier Concentration (top-1 share)
    formula: max(supplier_spend) / sum(category_spend) for category in critical_categories
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [psa.d.diversify_geography, psa.d.terminate_supplier]
  - id: psa.kpi.buying_channel_mix
    name: Buying Channel Mix — Catalog / Punchout / Free-text %
    formula: count(po_lines by channel) / count(po_lines_total)
    unit: "%"
    direction: target_band
    decisionsSupported: [psa.d.tail_spend_strategy]
  - id: psa.kpi.tail_spend_pct
    name: Tail Spend %
    formula: sum(spend_in_bottom_80pct_suppliers) / sum(total_spend)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [psa.d.tail_spend_strategy, psa.d.consolidate_suppliers]

dataModel:
  entities:
    - name: supplier
      description: Vendor / supplier master record. Canonical key joins on D&B DUNS (9-digit) and LEI (ISO 17442). Source of truth for risk, sustainability, diversity, and tax flags.
      keys: [supplier_id]
      attributes:
        - { name: supplier_id, type: varchar(64), isPrimaryKey: true }
        - { name: duns_number, type: varchar(9), description: "Dun & Bradstreet 9-digit DUNS" }
        - { name: lei, type: varchar(20), description: "ISO 17442 Legal Entity Identifier" }
        - { name: legal_name, type: varchar(255) }
        - { name: parent_duns, type: varchar(9), description: "Ultimate parent DUNS for corporate-family roll-up" }
        - { name: tax_id, type: varchar(64), description: "VAT / EIN / GSTIN per country" }
        - { name: country_iso2, type: varchar(2) }
        - { name: region, type: varchar(32), description: "NA|EMEA|APAC|LATAM|MEA" }
        - { name: industry_naics, type: varchar(6) }
        - { name: industry_sic, type: varchar(4) }
        - { name: diversity_flags, type: text, description: "JSON: MBE|WBE|VBE|LGBTBE|SDB|HUBZone (NMSDC/WBENC/NVOIC certs)" }
        - { name: ecovadis_score, type: smallint, description: "EcoVadis 0..100; Bronze>=45 Silver>=58 Gold>=68 Platinum>=78" }
        - { name: ecovadis_medal, type: varchar(8), description: "none|bronze|silver|gold|platinum" }
        - { name: cdp_climate_score, type: varchar(2), description: "CDP A..D-" }
        - { name: sbti_committed, type: boolean, description: "Has the supplier publicly committed to SBTi targets?" }
        - { name: paydex_score, type: smallint, description: "D&B Paydex 0..100 (payment behavior)" }
        - { name: failure_score, type: smallint, description: "D&B Failure Score percentile" }
        - { name: cyber_score, type: smallint, description: "BitSight/RiskRecon composite cyber score 250..900" }
        - { name: critical_flag, type: boolean, description: "Single-source or business-critical supplier" }
        - { name: sanctions_flag, type: boolean, description: "Listed on OFAC/UN/EU sanctions" }
        - { name: status, type: varchar(16), description: "active|onboarding|blocked|terminated|watchlist" }
        - { name: onboarded_at, type: timestamp }
        - { name: last_assessment_at, type: timestamp }

    - name: category_taxonomy
      description: UNSPSC-anchored canonical category hierarchy used for spend cubing. Segment(2)→Family(2)→Class(2)→Commodity(2). Optionally cross-mapped to internal category trees.
      keys: [category_code]
      attributes:
        - { name: category_code, type: varchar(8), isPrimaryKey: true, description: "UNSPSC 8-digit code" }
        - { name: segment_code, type: varchar(2) }
        - { name: family_code, type: varchar(4) }
        - { name: class_code, type: varchar(6) }
        - { name: commodity_code, type: varchar(8) }
        - { name: segment_name, type: varchar(128) }
        - { name: family_name, type: varchar(128) }
        - { name: class_name, type: varchar(128) }
        - { name: commodity_name, type: varchar(128) }
        - { name: direct_or_indirect, type: varchar(8), description: "direct|indirect" }
        - { name: capex_or_opex, type: varchar(5), description: "capex|opex" }
        - { name: internal_category_id, type: varchar(64), description: "Tenant-specific category cross-walk" }
        - { name: scope3_category, type: smallint, description: "GHG Protocol Scope 3 category 1..15" }

    - name: contract
      description: Master / framework agreement covering negotiated terms for a supplier-category pair. Includes price schedules, volume bands, rebate triggers, sustainability clauses.
      keys: [contract_id]
      attributes:
        - { name: contract_id, type: varchar(64), isPrimaryKey: true }
        - { name: supplier_id, type: varchar(64), isForeignKey: true, references: supplier.supplier_id }
        - { name: contract_type, type: varchar(32), description: "framework|spot|MSA|SOW|catalog|rebate|service_agreement" }
        - { name: parent_contract_id, type: varchar(64), description: "FK for SOW under MSA" }
        - { name: title, type: varchar(255) }
        - { name: effective_date, type: date }
        - { name: expiry_date, type: date }
        - { name: auto_renew, type: boolean }
        - { name: notice_period_days, type: smallint }
        - { name: total_commit_amount, type: "decimal(18,2)" }
        - { name: total_commit_currency, type: varchar(3) }
        - { name: payment_terms, type: varchar(16), description: "NET30|NET45|NET60|2_10_NET30|..." }
        - { name: incoterms, type: varchar(8), description: "ICC Incoterms 2020 — DDP|FOB|EXW|..." }
        - { name: rebate_pct, type: "decimal(5,4)" }
        - { name: rebate_trigger_amount, type: "decimal(18,2)" }
        - { name: sustainability_clauses, type: text, description: "JSON: scope3_disclosure_required|ecovadis_min|net_zero_2050|..." }
        - { name: kpi_clauses, type: text, description: "JSON: OTIF target, defect ppm, NCMR cap, ..." }
        - { name: contract_value_realized, type: "decimal(18,2)" }
        - { name: status, type: varchar(16), description: "draft|active|expired|terminated|renewed" }
        - { name: owner_buyer, type: varchar(64) }
        - { name: meta_extracted_at, type: timestamp, description: "When LLM-extracted metadata was last refreshed" }

    - name: purchase_order
      description: Approved buying instrument issued to a supplier. PO header level — line items live in a separate fact for spend cubing.
      keys: [po_id]
      attributes:
        - { name: po_id, type: varchar(64), isPrimaryKey: true }
        - { name: po_number, type: varchar(32) }
        - { name: supplier_id, type: varchar(64), isForeignKey: true, references: supplier.supplier_id }
        - { name: contract_id, type: varchar(64), isForeignKey: true, references: contract.contract_id }
        - { name: requester_user_id, type: varchar(64) }
        - { name: buyer_user_id, type: varchar(64) }
        - { name: cost_center, type: varchar(32) }
        - { name: gl_account, type: varchar(16) }
        - { name: legal_entity, type: varchar(32) }
        - { name: plant_id, type: varchar(32), description: "Receiving plant for direct materials" }
        - { name: requisition_id, type: varchar(64) }
        - { name: requisition_ts, type: timestamp }
        - { name: po_issued_ts, type: timestamp }
        - { name: buying_channel, type: varchar(16), description: "catalog|punchout|free_text|marketplace|pcard|auto" }
        - { name: total_amount, type: "decimal(18,2)" }
        - { name: total_currency, type: varchar(3) }
        - { name: total_amount_base_usd, type: "decimal(18,2)", description: "Converted at PO date FX" }
        - { name: payment_terms, type: varchar(16) }
        - { name: incoterms, type: varchar(8) }
        - { name: status, type: varchar(16), description: "draft|approved|sent|partially_received|received|invoiced|closed|cancelled" }
        - { name: touchless, type: boolean, description: "Issued with zero human-approval steps" }
        - { name: maverick_flag, type: boolean, description: "Off-contract for a covered category" }
        - { name: edi_855_received, type: boolean }
        - { name: category_code, type: varchar(8), isForeignKey: true, references: category_taxonomy.category_code }

    - name: po_line
      description: One PO line per item / service. The spend-cube fact at the highest natural grain. Carries quantity, unit price, line value, and category cross-walk.
      keys: [po_line_id]
      attributes:
        - { name: po_line_id, type: varchar(64), isPrimaryKey: true }
        - { name: po_id, type: varchar(64), isForeignKey: true, references: purchase_order.po_id }
        - { name: line_number, type: smallint }
        - { name: item_id, type: varchar(64) }
        - { name: item_description, type: varchar(255) }
        - { name: category_code, type: varchar(8), isForeignKey: true, references: category_taxonomy.category_code }
        - { name: quantity, type: "decimal(15,4)" }
        - { name: uom, type: varchar(8), description: "UN/CEFACT recommendation 20 unit codes" }
        - { name: unit_price, type: "decimal(18,6)" }
        - { name: line_amount, type: "decimal(18,2)" }
        - { name: line_currency, type: varchar(3) }
        - { name: line_amount_base_usd, type: "decimal(18,2)" }
        - { name: requested_delivery_date, type: date }
        - { name: tax_amount, type: "decimal(18,2)" }
        - { name: discount_pct, type: "decimal(5,4)" }
        - { name: scope3_kgco2e, type: "decimal(18,4)", description: "Attributed Scope 3 Category 1/2 emissions for the line" }

    - name: receipt
      description: Goods or services receipt against a PO line. Anchors the three-way match.
      keys: [receipt_id]
      attributes:
        - { name: receipt_id, type: varchar(64), isPrimaryKey: true }
        - { name: po_id, type: varchar(64), isForeignKey: true, references: purchase_order.po_id }
        - { name: po_line_id, type: varchar(64), isForeignKey: true, references: po_line.po_line_id }
        - { name: receipt_ts, type: timestamp }
        - { name: quantity_received, type: "decimal(15,4)" }
        - { name: receiver_user_id, type: varchar(64) }
        - { name: plant_id, type: varchar(32) }
        - { name: gr_document_no, type: varchar(32), description: "ERP goods-receipt document number" }
        - { name: status, type: varchar(16), description: "draft|posted|reversed" }

    - name: invoice
      description: AP invoice raised by a supplier. Settled via three-way (PO+receipt) or two-way match. Carries Peppol/EDI 810 metadata.
      keys: [invoice_id]
      attributes:
        - { name: invoice_id, type: varchar(64), isPrimaryKey: true }
        - { name: supplier_id, type: varchar(64), isForeignKey: true, references: supplier.supplier_id }
        - { name: invoice_number, type: varchar(64) }
        - { name: po_id, type: varchar(64), isForeignKey: true, references: purchase_order.po_id }
        - { name: invoice_date, type: date }
        - { name: due_date, type: date }
        - { name: received_ts, type: timestamp }
        - { name: total_amount, type: "decimal(18,2)" }
        - { name: total_currency, type: varchar(3) }
        - { name: total_amount_base_usd, type: "decimal(18,2)" }
        - { name: tax_amount, type: "decimal(18,2)" }
        - { name: match_type, type: varchar(8), description: "two_way|three_way|exception|none" }
        - { name: matched, type: boolean, description: "Auto-cleared without exception" }
        - { name: paid_ts, type: timestamp }
        - { name: paid_amount, type: "decimal(18,2)" }
        - { name: early_pay_discount_taken, type: boolean }
        - { name: aging_days, type: smallint, description: "Now - due_date for unpaid; paid_ts - due_date otherwise" }
        - { name: peppol_message_id, type: varchar(128), description: "Open Peppol BIS 3.0 envelope ID for e-invoices" }
        - { name: edi_810_doc_no, type: varchar(32) }
        - { name: status, type: varchar(16), description: "received|matched|approved|on_hold|paid|disputed|void" }

    - name: supplier_risk_assessment
      description: Snapshot of a supplier risk evaluation across financial, operational, geographic, cyber, compliance, and sustainability dimensions. Sourced from Resilinc, D&B, BitSight, EcoVadis, internal questionnaire.
      keys: [assessment_id]
      attributes:
        - { name: assessment_id, type: varchar(64), isPrimaryKey: true }
        - { name: supplier_id, type: varchar(64), isForeignKey: true, references: supplier.supplier_id }
        - { name: assessment_ts, type: timestamp }
        - { name: source, type: varchar(32), description: "resilinc|dnb|bitsight|ecovadis|riskmethods|internal_questionnaire" }
        - { name: overall_score, type: "decimal(5,2)", description: "0..100 normalized (lower = riskier)" }
        - { name: financial_score, type: smallint }
        - { name: operational_score, type: smallint }
        - { name: geographic_score, type: smallint }
        - { name: cyber_score, type: smallint }
        - { name: compliance_score, type: smallint }
        - { name: sustainability_score, type: smallint }
        - { name: tier, type: varchar(8), description: "low|medium|high|critical" }
        - { name: mitigation_action, type: text }
        - { name: assessor_user_id, type: varchar(64) }
        - { name: valid_until, type: date }

    - name: emissions_factor
      description: Reference emissions factor used to attribute Scope 3 Category 1/2 emissions. Spend-based (kgCO2e per USD) and hybrid factors per UNSPSC commodity and country.
      keys: [emissions_factor_id]
      attributes:
        - { name: emissions_factor_id, type: varchar(64), isPrimaryKey: true }
        - { name: source, type: varchar(32), description: "exiobase|usio|ecoinvent|cdp_supplier|primary_supplier_data" }
        - { name: vintage_year, type: smallint }
        - { name: category_code, type: varchar(8), isForeignKey: true, references: category_taxonomy.category_code }
        - { name: country_iso2, type: varchar(2) }
        - { name: factor_kgco2e_per_usd, type: "decimal(18,6)" }
        - { name: factor_kgco2e_per_unit, type: "decimal(18,6)", description: "Activity-based factor where unit data is available" }
        - { name: unit, type: varchar(16), description: "kg|liter|kWh|piece|m2|..." }
        - { name: ghg_scope3_category, type: smallint, description: "1..15 per WBCSD/WRI Scope 3 Standard" }
        - { name: uncertainty_pct, type: "decimal(5,2)" }
        - { name: last_updated, type: timestamp }

