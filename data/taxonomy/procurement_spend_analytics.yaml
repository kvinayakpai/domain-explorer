ingestionChallenges:
  - High supplier-master churn — daily creates, merges (D&B parent re-roll), name changes, and tax-ID corrections produce a steady stream of CDC events that downstream spend cubes must absorb without restating closed periods.
  - PO-line cardinality blow-up — a Fortune-500 manufacturer issues 5-20M PO lines/year; spend-cube refreshes must process this incrementally with watermark logic.
  - Multi-ERP and multi-instance — global enterprises consolidate spend across multiple SAP instances + Oracle + Microsoft + acquired-co ERPs, each with its own GL chart, cost-center taxonomy, and FX rates.
  - Long-tail free-text PO line descriptions — 30-50% of indirect PO lines have free-text descriptions only; ML categorization (UNSPSC) is required at ingest and must produce a confidence per line.
  - Sustainability disclosure cadence mismatch — CDP and EcoVadis refresh annually; CO2e factors (EXIOBASE, USEEIO) vintage 2-3 years; reconciling to current-quarter spend requires explicit factor_vintage tracking.
  - Late-arriving invoices — invoices land 30-90 days after the PO is closed; AP aging KPIs must accept the late binding and revise prior-period accruals.
  - Tax-line normalization — VAT in EU, GST/HST in CA, sales tax in US, plus reverse-charge cases — invoice tax decomposition must reconcile to the line+header before any landed-cost analysis.

integrationChallenges:
  - name: Spend cube normalization across taxonomies (UNSPSC vs custom)
    description: Each ERP carries its own category tree (SAP material group, Oracle item category, custom indirect tree). Spend cubes can only aggregate cleanly when every line is mapped to a canonical UNSPSC commodity. Free-text lines need ML categorization; mapped trees drift over time.
    mitigation: Stand up a category cross-walk service backed by UNSPSC v26+ as the canonical key; train a free-text classifier on labeled supplier+line-description pairs; track classification_confidence per line and route low-confidence lines to a category steward queue.
  - name: Supplier deduplication (D&B DUNS as the spine)
    description: A single legal entity surfaces as 5-50 different supplier_id records across ERPs and S2P tools — variant legal names, addresses, tax-ID transcription errors, M&A roll-ups. Risk and sustainability scores attach to the parent corporate family but spend transacts against the local subsidiary.
    mitigation: Use D&B DUNS + LEI as canonical join keys; build a parent_duns roll-up; expose a supplier_corporate_family bridge so spend aggregates at corporate-family while POs and invoices remain at local-entity grain.
  - name: Scope 3 emissions attribution to suppliers
    description: GHG Protocol Scope 3 Category 1 (purchased goods & services) requires emissions per dollar of spend. Pure spend-based factors (EXIOBASE, USEEIO) are coarse; activity-based factors (kg, liter, kWh) require unit conversion; primary supplier data (CDP) covers <15% of suppliers by count but often the majority of spend.
    mitigation: Hybrid hierarchy at line level — prefer primary supplier disclosure, fall back to activity-based factors, then spend-based factors; track uncertainty_pct on every attribution; allocate parent-supplier emissions to child-spend pro-rata; reconcile annually to CSRD ESRS E1 disclosures.
  - name: Contract metadata extraction
    description: Negotiated terms (payment terms, rebate triggers, sustainability clauses, KPI commitments) often live in PDF/Word contracts, not structured contract systems. Without machine-readable metadata, contract-compliance KPIs cannot be computed.
    mitigation: LLM-based clause extraction (Coupa CLM, Ironclad, Icertis, or in-house) populating contract.kpi_clauses and contract.sustainability_clauses JSON; track meta_extracted_at watermark; require human sign-off on extracted terms with high $ exposure.
  - name: Multi-currency aggregation and FX timing
    description: A global spend cube must aggregate transactions in 30+ currencies. Using transaction-date FX vs. period-end FX changes reported spend by 2-5%. Hedge accounting and translation gains/losses must not be double-counted.
    mitigation: Persist both line_amount_base_usd at PO-date FX and a period-end re-translation for reporting; expose the FX policy explicitly on every fact; align with corporate Treasury's ASC 830 / IAS 21 stance.
  - name: Three-way match exceptions at scale
    description: 10-25% of invoices fail automated 3-way match — over-receipts, price variances, missing PO, wrong UoM. Manual exception resolution is the largest AP cost driver.
    mitigation: Tiered tolerance bands ($ and % thresholds) configured per category and supplier; auto-clear within tolerance; route exceptions to AP exception queue with provenance (which leg failed); track exception_resolution_aging as a KPI.
  - name: Supplier risk signal correlation across sources
    description: Resilinc flags a fire at a tier-2 supplier; D&B drops the parent's Paydex; BitSight downgrades cyber; EcoVadis is silent. The signals correlate but arrive on different schedules, in different scales, with different supplier identifiers.
    mitigation: Normalize each source's score to 0..100; weighted composite risk_score using configurable weights per category criticality; align all sources to supplier.duns_number first, with name+country fuzzy match as fallback; alert on supplier_risk_score crossing a delta threshold rather than absolute level.
  - name: Maverick spend detection and routing
    description: Buyers transact off-contract via P-card, free-text PO, or marketplace — bypassing negotiated rates and category controls. Detection requires reverse joining transaction to category and checking for a covering contract.
    mitigation: Materialized maverick flag on po_line set at ingest by joining (supplier_id, category_code, transaction_date) to active contract scope; weekly maverick-spend dashboard per category manager; configurable thresholds for buyer manager approval.
  - name: Sustainable procurement clause enforcement
    description: ISO 20400 expects sustainability clauses to flow from policy through contract to operational measurement. In practice, signed clauses don't propagate to spend cubes — buyers can't see whether they're transacting with EcoVadis Silver+ suppliers.
    mitigation: Expose supplier.ecovadis_medal on the buying UX; auto-block PO submission for categories with sustainability_clauses requiring Silver+ if supplier doesn't qualify; report sustainable_spend_pct against board commitment.

