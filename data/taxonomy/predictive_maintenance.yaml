id: predictive_maintenance
name: Predictive Maintenance
vertical: Manufacturing
oneLiner: Sensor-driven prediction of equipment failure, remaining useful life (RUL), and optimal maintenance intervention using time-series analytics, anomaly detection, and condition-based monitoring across plant assets.

# Authoritative sources (as of mid-2026):
#   ISO 13374 — Condition monitoring and diagnostics of machine systems.
#     Six-block model: Data Acquisition, Manipulation, State Detection,
#     Health Assessment, Prognostic Assessment, Advisory Generation.
#   ISO 14224 — Petroleum/petrochemical/natural-gas industries — collection
#     and exchange of reliability and maintenance data for equipment.
#     The canonical reliability data dictionary (failure modes, failure
#     mechanisms, time-to-failure semantics).
#   ISA-95 — Enterprise-control system integration. Defines L0-L4 boundaries
#     and the Equipment Hierarchy (Enterprise → Site → Area → Work Center
#     → Work Unit → Equipment Module).
#   IEC 61508 — Functional safety of electrical/electronic/programmable
#     electronic safety-related systems. Drives SIL ratings for protective
#     trips that PdM advisories interact with.
#   IEC 62443 — OT cybersecurity. Bears on edge↔cloud bridging.
#   OPC UA (IEC 62541) — the de-facto OT-IT bridge protocol.
#   OPC UA Information Model PA-DIM — Process Automation Device Information Model.
#   MQTT v5 (OASIS) and Sparkplug B — high-throughput sensor telemetry.
#   MIMOSA OSA-CBM / OSA-EAI — Open System Architecture for Condition-Based
#     Maintenance / Enterprise Application Integration. Reference data models
#     and message contracts for PdM.
#   NASA C-MAPSS dataset (Saxena et al., 2008) — turbofan RUL benchmark;
#     defines the canonical Health Index and EOL signal patterns.
#   PHM Society Data Challenges (2008-2025) — published failure-mode catalogs
#     for bearings, gearboxes, batteries, semiconductor tools.
#   Vendors:
#     PTC ThingWorx (Industrial IoT platform), https://www.ptc.com/en/products/thingworx
#     Siemens MindSphere / Industrial Edge, https://siemens.mindsphere.io
#     GE Digital Predix / APM (Asset Performance Management),
#       https://www.ge.com/digital/applications/asset-performance-management
#     Aveva PI System (OSIsoft historian), https://www.aveva.com/en/products/pi-system/
#     IBM Maximo Application Suite — APM + EAM, https://www.ibm.com/products/maximo
#     Honeywell Forge for Industrial, https://www.honeywell.com/us/en/forge
#     AspenTech Aspen Mtell — prescriptive PdM,
#       https://www.aspentech.com/en/products/asset-performance-management/aspen-mtell
#     Augury Machine Health, https://www.augury.com
#     Uptake (formerly Caterpillar partnership), https://www.uptake.com
#     SparkCognition SparkPredict, https://www.sparkcognition.com
#     Senseye Predictive Maintenance (Siemens acquisition, 2022),
#       https://www.senseye.io
#     SKF @ptitude / Observer, Emerson AMS Machine Works (vibration analytics)
#     Rockwell FactoryTalk Analytics for Devices, Schneider EcoStruxure APM
#   Standards bodies / academic:
#     ISO TC 108 (Mechanical vibration & shock).
#     SAE JA1011/JA1012 (Reliability-Centered Maintenance).

personas:
  - { name: Maintenance Director, title: Director, Plant Maintenance & Reliability, level: Director }
  - { name: Reliability Engineer, title: Senior Reliability Engineer, level: IC }
  - { name: Vibration Analyst, title: ISO 18436-2 Cat-III Vibration Analyst, level: IC }
  - { name: Plant Manager, title: Plant Manager, level: Director }
  - { name: Data Scientist (Time Series), title: Principal Data Scientist, Industrial AI, level: IC }
  - { name: Asset Manager, title: VP, Asset Management, level: VP }
  - { name: Maintenance Planner/Scheduler, title: Maintenance Planner/Scheduler, level: IC }
  - { name: Operations Excellence Lead, title: Senior Director, Operational Excellence, level: Director }

decisions:
  - { id: pm.d.intervention_now, statement: "Should we pull the line down now for intervention, run until the next planned shutdown, or push to the following window?" }
  - { id: pm.d.alert_threshold, statement: "Where should the anomaly-detection threshold sit — favoring recall (more false positives) or precision (more missed failures)?" }
  - { id: pm.d.cbm_vs_tbm, statement: "Should this asset class move from time-based (calendar) maintenance to condition-based maintenance, or remain on PM intervals?" }
  - { id: pm.d.sensor_retrofit, statement: "Is this fleet worth retrofitting with wireless vibration / ultrasound / thermal sensors, or is the existing PLC/historian data sufficient?" }
  - { id: pm.d.spares_stocking, statement: "Given a predicted failure window, do we expedite spare-parts procurement, draw from regional stock, or accept extended downtime?" }
  - { id: pm.d.work_order_priority, statement: "When the RUL-based queue conflicts with the human planner's queue, which work orders get crew assignment first?" }
  - { id: pm.d.model_retrain, statement: "Trigger model retraining now (sensor drift detected, label sparsity has improved, or operating regime shifted) or hold?" }
  - { id: pm.d.edge_vs_cloud, statement: "Run this anomaly detector at the edge (sub-100ms latency, but limited features) or in the cloud (richer features, but historian round-trip)?" }
  - { id: pm.d.failure_mode_action, statement: "For this predicted failure mode (bearing inner-race vs. outer-race, gear pitting, lubrication starvation), which prescriptive action — lubricate, align, replace, derate?" }
  - { id: pm.d.advisory_publish, statement: "Should the model's advisory go straight to the CMMS work-order queue, route through a human reliability engineer first, or auto-trigger a safety trip per IEC 61508 SIL classification?" }

kpis:
  - id: pm.kpi.mtbf
    name: Mean Time Between Failures (MTBF)
    formula: sum(operating_hours_between_failures) / count(failure_events)
    unit: hours
    direction: higher_is_better
    decisionsSupported: [pm.d.cbm_vs_tbm, pm.d.intervention_now]
  - id: pm.kpi.mttr
    name: Mean Time To Repair (MTTR)
    formula: sum(repair_minutes) / count(repair_events)
    unit: minutes
    direction: lower_is_better
    decisionsSupported: [pm.d.spares_stocking, pm.d.work_order_priority]
  - id: pm.kpi.oee
    name: Overall Equipment Effectiveness (OEE)
    formula: availability * performance * quality
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pm.d.cbm_vs_tbm, pm.d.intervention_now]
  - id: pm.kpi.asset_availability
    name: Asset Availability %
    formula: (scheduled_runtime - unplanned_downtime) / scheduled_runtime
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pm.d.intervention_now, pm.d.cbm_vs_tbm]
  - id: pm.kpi.predictive_precision
    name: Predictive Accuracy — Precision
    formula: true_positives / (true_positives + false_positives)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pm.d.alert_threshold, pm.d.model_retrain]
  - id: pm.kpi.predictive_recall
    name: Predictive Accuracy — Recall (% Failures Predicted)
    formula: true_positives / (true_positives + false_negatives)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pm.d.alert_threshold, pm.d.model_retrain]
  - id: pm.kpi.lead_time_to_failure
    name: Lead Time to Failure (P-F interval realized)
    formula: avg(failure_ts - prediction_ts) where alert_was_correct
    unit: hours
    direction: higher_is_better
    decisionsSupported: [pm.d.spares_stocking, pm.d.intervention_now]
  - id: pm.kpi.planned_vs_unplanned_pct
    name: Planned vs Unplanned Maintenance %
    formula: planned_wo_count / (planned_wo_count + unplanned_wo_count)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pm.d.cbm_vs_tbm, pm.d.work_order_priority]
  - id: pm.kpi.maint_cost_per_operating_hour
    name: Maintenance Cost per Operating Hour
    formula: sum(maintenance_cost) / sum(operating_hours)
    unit: USD/hour
    direction: lower_is_better
    decisionsSupported: [pm.d.cbm_vs_tbm, pm.d.sensor_retrofit]
  - id: pm.kpi.spare_stockout_rate
    name: Spare-Part Stockout Rate
    formula: stockout_events / parts_demand_events
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [pm.d.spares_stocking]
  - id: pm.kpi.false_positive_rate
    name: False-Positive Rate
    formula: false_positives / (false_positives + true_negatives)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [pm.d.alert_threshold, pm.d.advisory_publish]
  - id: pm.kpi.rul_prediction_error
    name: RUL Prediction Error %
    formula: mean(abs(rul_pred - rul_actual) / rul_actual)
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [pm.d.model_retrain, pm.d.intervention_now]
  - id: pm.kpi.pct_failures_predicted
    name: % of Failures Predicted (advance-warning coverage)
    formula: predicted_failure_events / total_failure_events
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pm.d.alert_threshold, pm.d.model_retrain]
  - id: pm.kpi.production_loss_avoided_pct
    name: % Production Loss Avoided
    formula: avoided_production_loss_units / (avoided_production_loss_units + actual_production_loss_units)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pm.d.intervention_now, pm.d.advisory_publish]

dataModel:
  entities:
    - name: asset
      description: Physical plant asset under maintenance — pump, motor, compressor, turbine, gearbox, conveyor. Keyed by tag-id in the ISA-95 equipment hierarchy. Per ISO 14224 §6 the canonical reliability unit.
      keys: [asset_id]
      attributes:
        - { name: asset_id, type: varchar(64), isPrimaryKey: true }
        - { name: tag_id, type: varchar(128), description: "ISA-95 equipment hierarchical tag e.g. Site.Area.Line.Pump-101" }
        - { name: asset_class, type: varchar(64), description: "pump|motor|compressor|turbine|gearbox|conveyor|HVAC|valve|heat_exchanger" }
        - { name: manufacturer, type: varchar(128), description: "OEM — SKF, Siemens, ABB, Emerson, Atlas Copco, Caterpillar, ..." }
        - { name: model_number, type: varchar(128) }
        - { name: serial_number, type: varchar(128) }
        - { name: site_id, type: varchar(64), description: "ISA-95 Site" }
        - { name: area_id, type: varchar(64), description: "ISA-95 Area" }
        - { name: line_id, type: varchar(64), description: "ISA-95 Line / Work Center" }
        - { name: criticality, type: varchar(8), description: "A|B|C — RCM (SAE JA1011) criticality classification" }
        - { name: install_date, type: date }
        - { name: design_life_hours, type: integer }
        - { name: rated_kw, type: "decimal(10,2)" }
        - { name: status, type: varchar(16), description: "running|stopped|standby|maintenance|decommissioned" }

    - name: sensor
      description: Telemetry channel attached to an asset. Vibration (accelerometer), temperature (RTD/thermocouple), pressure, flow, current, oil-particle, ultrasound, acoustic emission, etc.
      keys: [sensor_id]
      attributes:
        - { name: sensor_id, type: varchar(64), isPrimaryKey: true }
        - { name: asset_id, type: varchar(64), isForeignKey: true, references: asset.asset_id }
        - { name: sensor_type, type: varchar(32), description: "vibration_accel|vibration_velocity|temp_rtd|temp_thermo|pressure|flow|current|voltage|oil_particle|ultrasound|acoustic" }
        - { name: measurement_location, type: varchar(64), description: "DE bearing|NDE bearing|casing axial|casing radial|stator winding|lube inlet" }
        - { name: unit, type: varchar(16), description: "g|mm/s|degC|bar|m3/h|A|V|ppm|dB" }
        - { name: sampling_hz, type: "decimal(10,2)", description: "Sampling rate in Hz" }
        - { name: range_min, type: "decimal(15,6)" }
        - { name: range_max, type: "decimal(15,6)" }
        - { name: alarm_low, type: "decimal(15,6)", description: "ISO 10816 / 20816 vibration severity zone B/C/D thresholds where applicable" }
        - { name: alarm_high, type: "decimal(15,6)" }
        - { name: install_date, type: date }
        - { name: status, type: varchar(16), description: "active|drifted|failed|removed" }

    - name: sensor_reading
      description: Time-stamped scalar sample from a sensor. The high-cardinality fact at minute or sub-minute grain.
      keys: [reading_id]
      attributes:
        - { name: reading_id, type: bigint, isPrimaryKey: true }
        - { name: sensor_id, type: varchar(64), isForeignKey: true, references: sensor.sensor_id }
        - { name: asset_id, type: varchar(64), isForeignKey: true, references: asset.asset_id }
        - { name: reading_ts, type: timestamp }
        - { name: value, type: "decimal(15,6)" }
        - { name: quality_code, type: smallint, description: "OPC-UA StatusCode (192=Good, 64=Uncertain, 0=Bad)" }
        - { name: is_anomaly, type: boolean, description: "Local-threshold or model-flagged anomaly" }
        - { name: ingestion_ts, type: timestamp, description: "Watermark for late-arriving data" }

    - name: failure_mode
      description: Catalogued failure mode per ISO 14224 Annex B / vendor FMEA library. e.g. bearing inner-race fault, gear pitting, lubrication starvation.
      keys: [failure_mode_id]
      attributes:
        - { name: failure_mode_id, type: varchar(32), isPrimaryKey: true }
        - { name: fault_code, type: varchar(16), description: "ISO 14224 failure code — BRD|GBR|VIB|OVH|..." }
        - { name: description, type: varchar(255) }
        - { name: applicable_asset_class, type: varchar(64) }
        - { name: characteristic_frequency_hz, type: "decimal(10,2)", description: "Bearing BPFO/BPFI/BSF/FTF or gear mesh frequency where applicable" }
        - { name: typical_p_f_interval_hours, type: integer, description: "Time from potential-failure detectable to functional failure (RCM P-F curve)" }
        - { name: severity_tier, type: varchar(8), description: "S1|S2|S3 — IEC 61508-aligned" }

    - name: failure_event
      description: Observed equipment failure. The label class for supervised models. Sparse — failures are rare.
      keys: [failure_event_id]
      attributes:
        - { name: failure_event_id, type: varchar(64), isPrimaryKey: true }
        - { name: asset_id, type: varchar(64), isForeignKey: true, references: asset.asset_id }
        - { name: failure_mode_id, type: varchar(32), isForeignKey: true, references: failure_mode.failure_mode_id }
        - { name: failure_ts, type: timestamp }
        - { name: detected_by, type: varchar(16), description: "model_alert|operator|inspection|protective_trip|catastrophic" }
        - { name: downtime_minutes, type: integer }
        - { name: production_loss_units, type: bigint }
        - { name: root_cause, type: text }
        - { name: corrective_action, type: text }
        - { name: cost_usd, type: "decimal(15,2)", description: "Total cost: labor + parts + downtime impact" }

    - name: work_order
      description: CMMS-issued maintenance order — preventive (TBM), condition-based (CBM/PdM-triggered), corrective (post-failure). Per ISO 14224 §8.
      keys: [work_order_id]
      attributes:
        - { name: work_order_id, type: varchar(64), isPrimaryKey: true }
        - { name: asset_id, type: varchar(64), isForeignKey: true, references: asset.asset_id }
        - { name: wo_type, type: varchar(16), description: "preventive|corrective|predictive|inspection|emergency" }
        - { name: wo_priority, type: smallint, description: "1..5 (1=emergency)" }
        - { name: triggered_by_prediction_id, type: varchar(64), description: "FK to prediction if PdM-triggered" }
        - { name: scheduled_start, type: timestamp }
        - { name: actual_start, type: timestamp }
        - { name: actual_end, type: timestamp }
        - { name: labor_hours, type: "decimal(8,2)" }
        - { name: parts_cost_usd, type: "decimal(15,2)" }
        - { name: labor_cost_usd, type: "decimal(15,2)" }
        - { name: status, type: varchar(16), description: "open|in_progress|completed|cancelled|rejected" }
        - { name: failure_event_id, type: varchar(64), description: "FK if WO closed a failure" }
        - { name: crew_id, type: varchar(64) }

    - name: prediction
      description: One PdM model output — anomaly score, RUL estimate, or failure-mode classification — at a point in time for an asset.
      keys: [prediction_id]
      attributes:
        - { name: prediction_id, type: varchar(64), isPrimaryKey: true }
        - { name: asset_id, type: varchar(64), isForeignKey: true, references: asset.asset_id }
        - { name: model_id, type: varchar(64) }
        - { name: model_version, type: varchar(32) }
        - { name: prediction_ts, type: timestamp }
        - { name: prediction_type, type: varchar(16), description: "anomaly_score|rul|fault_class|health_index" }
        - { name: anomaly_score, type: "decimal(8,4)", description: "Normalized 0..1 anomaly score (autoencoder reconstruction error / isolation forest / etc.)" }
        - { name: rul_hours, type: integer, description: "Remaining Useful Life estimate in hours" }
        - { name: rul_confidence_lower, type: integer }
        - { name: rul_confidence_upper, type: integer }
        - { name: predicted_failure_mode_id, type: varchar(32), description: "FK to failure_mode for classification outputs" }
        - { name: severity, type: varchar(8), description: "info|warning|alarm|critical" }
        - { name: feature_snapshot_hash, type: varchar(64), description: "SHA-256 of normalized feature vector used at inference" }

    - name: maintenance_plan
      description: Plan rules — interval-based (calendar/runtime), condition-based (sensor threshold), or predictive (model-driven) — that define when work orders auto-generate.
      keys: [plan_id]
      attributes:
        - { name: plan_id, type: varchar(64), isPrimaryKey: true }
        - { name: asset_id, type: varchar(64), isForeignKey: true, references: asset.asset_id }
        - { name: plan_type, type: varchar(16), description: "calendar|runtime|condition|predictive" }
        - { name: interval_value, type: integer }
        - { name: interval_unit, type: varchar(16), description: "days|operating_hours|cycles" }
        - { name: trigger_condition, type: text, description: "JSON expression for condition/predictive plans" }
        - { name: job_plan_template, type: varchar(64), description: "Reference to CMMS job plan / SOP" }
        - { name: active, type: boolean }
        - { name: created_at, type: timestamp }

    - name: model_version
      description: Trained model artifact reference. Tracks model lineage and rollback. Required by IEC 61508 traceability and AI governance.
      keys: [model_version_id]
      attributes:
        - { name: model_version_id, type: varchar(64), isPrimaryKey: true }
        - { name: model_id, type: varchar(64) }
        - { name: algorithm, type: varchar(64), description: "autoencoder|isolation_forest|xgboost|lstm|transformer|prophet|arima" }
        - { name: trained_on_from_ts, type: timestamp }
        - { name: trained_on_to_ts, type: timestamp }
        - { name: holdout_precision, type: "decimal(5,4)" }
        - { name: holdout_recall, type: "decimal(5,4)" }
        - { name: holdout_rul_mape, type: "decimal(5,4)" }
        - { name: deployed_at, type: timestamp }
        - { name: deprecated_at, type: timestamp }
        - { name: champion, type: boolean }

  relationships:
    - { from: sensor, to: asset, kind: many_to_one }
    - { from: sensor_reading, to: sensor, kind: many_to_one }
    - { from: sensor_reading, to: asset, kind: many_to_one }
    - { from: failure_event, to: asset, kind: many_to_one }
    - { from: failure_event, to: failure_mode, kind: many_to_one }
    - { from: work_order, to: asset, kind: many_to_one }
    - { from: work_order, to: failure_event, kind: many_to_one }
    - { from: prediction, to: asset, kind: many_to_one }
    - { from: prediction, to: failure_mode, kind: many_to_one }
    - { from: maintenance_plan, to: asset, kind: many_to_one }

