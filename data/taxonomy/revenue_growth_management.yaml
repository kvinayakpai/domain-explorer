ingestionChallenges:
  - Price waterfall reconciliation across systems — list price lives in SAP CCM, deal terms in Vistex/Pricefx, scan-down redemption in EDI 820 remittance, MCB cheques in Model N. The list-to-net waterfall must be re-built every period from 5-7 system flows with frequent reclassifications.
  - Mix-attribution math is fragile — the standard volume × price × mix variance decomposition double-counts when SKUs cross PPA tiers mid-period; the canonical attribution requires holding plan_share and actual_share at the segment grain and re-running residuals.
  - Syndicated data lag — Circana / NielsenIQ panel data for mix and pack-share metrics arrives at 4-8 week latency; in-market mix decisions get made on stale snapshots unless retailer scan + EDI 852 feeds are blended in.
  - GTM (go-to-market) cost allocation — slotting fees, marketing development funds, and innovation launch budgets are committed years up-front but expensed against in-period revenue, creating a moving-target gross-to-net waterfall that finance and commercial argue about.
  - Bi-temporal price history — a list price change announced May 1 effective June 1 creates the question "what was the list price for a June-shipped, May-deal-approved transaction?" The warehouse must persist both effective_from and recorded_at.
  - Pack-master volatility — a single SKU re-pack (12-pack → 12-pack-with-bonus-can) generates a new GTIN that the master data team back-dates by weeks, leaving net revenue rows orphaned in staging.

integrationChallenges:
  - name: Price-waterfall reconciliation across systems
    description: List price (SAP CCM), deal terms (Vistex / Pricefx), scan-down redemption (EDI 820 remittance), MCB cheques (Model N), slotting amortization (Finance), and currency revaluation (Treasury) must all reconcile to a single list-to-net number per account × pack × period. The gap between planned, accrued, and settled spans 60-180 days and is the largest controllable margin leak in CPG.
    mitigation: Persist a deal_id on every settlement document at point-of-creation (Vistex Match Engine, SAP CCM); build a deterministic match pipeline producing list-to-net at the SKU × account × period grain with confidence scores and an explicit "unmatched bucket" so finance can audit drift; reconcile on a 90-day rolling refresh.
  - name: Mix-attribution math
    description: The volume × price × mix variance decomposition (the heart of RGM analytics) breaks when SKUs change PPA tier mid-period, when a new pack launches, or when channel ladder shifts. Naive subtraction produces residuals that get parked in "other" and are unintelligible to the CCO.
    mitigation: Compute mix variance at the segment_id grain (channel × tier × category); hold plan_share and actual_share as time-stamped policy; rebuild waterfall daily; surface the residual as an explicit "unattributed mix" bucket with a drill-through to the offending SKUs.
  - name: Syndicated data lag — mix decisions on stale snapshots
    description: Circana and NielsenIQ project pack-share and channel-mix at total-category level with 4-8 week latency. In-flight RGM decisions (mid-quarter mix steer, channel ladder adjustment) get made against month-old data, undermining the value of the syndicated investment.
    mitigation: Blend retailer EDI 852 scan feeds (2-5 day latency) for in-flight monitoring with syndicated panels (8-week truth) for closeout; tag every mix observation with source and projection_factor; downstream mix_variance always uses panel for closeout, EDI for in-flight.
  - name: GTM cost allocation across periods
    description: Slotting fees are paid up-front but earned across the SKU's first 12 months on shelf; marketing development funds are committed annually but spent monthly; innovation launch budgets span 24 months. Allocating these to net revenue at the SKU × period grain is judgement-heavy.
    mitigation: Define a gross-to-net waterfall taxonomy (IFRS 15 variable consideration model) with stable amortization rules per cost class; record allocation_method on every GTN line; lock the policy annually and surface deviations on the controller dashboard.
  - name: Bi-temporal pricing for deal-time vs ship-time
    description: A deal approved May 15 references the list price effective at deal-creation time; a shipment May 28 references the list-price effective at ship time. If list price changes May 25, the realized net revenue depends on which price the system bound to. Misaligned binding creates retailer deduction disputes.
    mitigation: Implement bi-temporal price storage (effective_from, recorded_at); deal calculations bind to the price as recorded at deal-creation time; ship-time calculations bind to ship-time effective price; the price_event log carries both old and new for audit; expose binding policy as a contract column on every deal.
  - name: Pack-master volatility — new GTINs, late back-dating
    description: A 12-pack with a "20% extra free" promo gets a new GTIN; the master data team back-dates the GTIN by weeks; sales rows on the new GTIN sit in staging unjoined to the pack-tier hierarchy and disappear from Mix Index dashboards.
    mitigation: Run a daily orphan-row report on sales_transaction.pack_id IS NULL; stand up a master-data SLA on GS1 GDSN ingest; treat back-dated GTINs as a tracked event class (gtin_repack_event) with explicit fall-through rules.
  - name: Channel ladder breakage
    description: A club-exclusive 24-count value pack at $X is fine in isolation, but a customer who screenshots the club price and shows it at a grocery checkout creates a per-unit price comparison that breaks the channel ladder. The data sees one pack two prices; the customer experiences one product at two prices.
    mitigation: Treat channel × pack as the price-policy grain; daily coherence DQ check that no channel's per-unit equivalent drops below another's by more than the policy band; alert on out-of-policy variance windows ≥24h.
  - name: Counterfactual baselines disagree
    description: Periscope GLM, Circana Unify baseline, NielsenIQ baseline, and in-house ML disagree by 5-30% on what a no-promo counterfactual looked like. Promo Effectiveness Index swings dramatically depending on which baseline the dashboard chose — a political minefield between finance and commercial.
    mitigation: Persist all baselines side-by-side with model_name + model_version; require a single canonical baseline policy per account × category locked annually with CCO sign-off; expose baseline diff on the closeout layer so disagreement is visible, not hidden.
  - name: Innovation cannibalization vs incrementality
    description: A new pack introduction (the value 18-count) cannibalizes the mainstream 12-pack and the entry 6-pack. Innovation Sales % over-credits if it ignores cannibalization; under-credits if it folds in cannibalization broadly across unrelated SKUs.
    mitigation: Define a cannibalization basket per innovation SKU at launch (default: same brand + adjacent pack tiers); compute Innovation Sales % net of basket cannibalization; require the launch business case to declare the basket and the cannibalization tolerance up-front.

