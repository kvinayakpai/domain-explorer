id: omnichannel_oms
name: Omnichannel Order Management
vertical: Retail
oneLiner: Distributed order orchestration across stores, DCs, and digital — sourcing rules, available-to-promise, BOPIS / ship-from-store / curbside, and end-to-end order lifecycle from capture to settle.

# Authoritative sources (mid-2026):
#   Manhattan Active Omni / Manhattan Active Order Management
#     https://www.manh.com/products/active-omni — distributed order management,
#     enterprise inventory visibility, store fulfillment, customer engagement.
#   IBM Sterling Order Management (Sterling OMS)
#     https://www.ibm.com/products/order-management — global inventory visibility,
#     business rule framework, omnichannel store fulfillment, supplier integration.
#   Salesforce Order Management (Commerce Cloud OMS)
#     https://www.salesforce.com/products/order-management — order routing, BOPIS,
#     returns, payment capture from B2C Commerce.
#   Shopify Order Management + Shopify Fulfillment Network
#     https://shopify.dev/docs/api/admin/order — fulfillment orders, inventory
#     locations, AssignedFulfillmentOrder grain.
#   Oracle Retail Order Management System Cloud Service (ROMS / OROMS)
#     https://www.oracle.com/retail/order-management/ — sourcing engine,
#     fulfillment broker, returns and exchanges.
#   Kibo Order Management (Kibo OMS)
#     https://kibocommerce.com/order-management/ — fulfiller workflows,
#     ATP cache, real-time sourcing.
#   Fluent Commerce — Fluent Order Management
#     https://fluentcommerce.com/products/fluent-order-management — event-sourced
#     orders, rules-based orchestration on top of GraphQL.
#   Deck Commerce OMS — DTC-focused.
#     https://deckcommerce.com — multi-channel order routing, inventory aggregation.
#   Aptos OMS / Aptos ONE
#     https://www.aptos.com/products/order-management — store-of-record, endless aisle.
#   Logiwa WMS+OMS for DTC fulfillment
#     https://www.logiwa.com — cloud WMS with embedded OMS for high-velocity DTC.
#   Manhattan WMS / JDA (Blue Yonder) WMS — paired warehouse execution.
#   NCR Voyix and Toshiba TCx Elevate — POS endpoints feeding order capture.
#   Carrier APIs: FedEx Web Services, UPS Developer Kit, USPS Web Tools, DHL XML PI.
#   Standards: GS1 GTIN/GLN/SSCC; EDI 940 (Warehouse Shipping Order),
#     EDI 943 (Warehouse Stock Transfer Shipment Advice),
#     EDI 944 (Warehouse Stock Transfer Receipt Advice),
#     EDI 945 (Warehouse Shipping Advice),
#     EDI 846 (Inventory Inquiry/Advice),
#     EDI 856 (Advance Ship Notice).
#   OASIS OData v4 + JSON:API for retail inventory APIs.

personas:
  - { name: Head of Omnichannel, title: VP, Head of Omnichannel & Unified Commerce, level: VP }
  - { name: OMS Product Manager, title: Director, Order Management Platform PM, level: Director }
  - { name: Fulfillment Operations Director, title: Director, Distributed Fulfillment Operations, level: Director }
  - { name: Store Ops Lead, title: Director, Store Fulfillment & BOPIS Operations, level: Director }
  - { name: Customer Experience Lead, title: Senior Director, Order Experience & Promise, level: Director }
  - { name: Inventory Visibility Manager, title: Manager, Enterprise Inventory Visibility, level: Manager }
  - { name: Returns Lead, title: Director, Returns & Reverse Logistics, level: Director }

decisions:
  - { id: oms.d.sourcing_rule, statement: "When an order line drops, which node (store, DC, vendor drop-ship, dark store) sources it — by lowest cost-to-serve, fastest promise, or store-clearance pull?" }
  - { id: oms.d.atp_safety_stock, statement: "Reserve a per-node safety buffer on the ATP feed to insulate online from store walk-in cannibalization, or expose unified ATP and accept some risk?" }
  - { id: oms.d.split_shipment, statement: "Allow a single order to split across multiple ship-from nodes to keep a promise date, or hold for a single-shipment fulfillment to lower cost?" }
  - { id: oms.d.promise_window, statement: "Quote a tight delivery promise (3-day) at checkout and risk SLA breach, or quote a wide window (5-7 day) and lose conversion to faster competitors?" }
  - { id: oms.d.cancel_or_substitute, statement: "When an in-flight order has an inventory miss at the sourcing node, cancel the line, substitute a like SKU, or re-source from a higher-cost node?" }
  - { id: oms.d.store_capacity, statement: "Throttle BOPIS / ship-from-store volume per store based on labor capacity, or accept all orders and risk pick-time SLA breach?" }
  - { id: oms.d.return_reroute, statement: "Route a return to the nearest store for restock-and-resell, central returns hub for triage, or directly to vendor for credit?" }
  - { id: oms.d.endless_aisle, statement: "Enable endless-aisle ordering at the POS so a store associate can promise a SKU not in that store from the enterprise inventory pool?" }
  - { id: oms.d.dark_store_designation, statement: "Designate which under-performing stores convert to dark-store / micro-fulfillment-center mode, taking them off retail traffic but adding fulfillment capacity?" }
  - { id: oms.d.carrier_selection, statement: "Pick the carrier and service level for each parcel — cheapest within promise, fastest, lowest-emission, or contract-volume-optimal?" }

kpis:
  - id: oms.kpi.order_cycle_time
    name: Order Cycle Time
    formula: avg(shipped_ts - order_capture_ts)
    unit: hours
    direction: lower_is_better
    decisionsSupported: [oms.d.sourcing_rule, oms.d.split_shipment, oms.d.store_capacity]
  - id: oms.kpi.pick_accuracy
    name: Pick Accuracy
    formula: lines_picked_correctly / total_lines_picked
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [oms.d.cancel_or_substitute, oms.d.store_capacity]
  - id: oms.kpi.bopis_lead_time
    name: BOPIS Lead Time (Order-to-Ready)
    formula: avg(ready_for_pickup_ts - order_capture_ts)
    unit: minutes
    direction: lower_is_better
    decisionsSupported: [oms.d.store_capacity, oms.d.sourcing_rule]
  - id: oms.kpi.ship_from_store_mix
    name: Ship-from-Store Mix %
    formula: store_sourced_lines / total_sourced_lines
    unit: "%"
    direction: target_band
    decisionsSupported: [oms.d.sourcing_rule, oms.d.dark_store_designation]
  - id: oms.kpi.atp_accuracy
    name: ATP Accuracy
    formula: 1 - mean_abs_error(atp_promised, atp_actual_at_pick)
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [oms.d.atp_safety_stock, oms.d.endless_aisle]
  - id: oms.kpi.inventory_visibility_unified_pct
    name: Inventory Visibility (% Unified)
    formula: skus_with_unified_position / total_skus
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [oms.d.atp_safety_stock, oms.d.endless_aisle]
  - id: oms.kpi.order_split_rate
    name: Order Split Rate
    formula: orders_with_multiple_shipments / total_multi_line_orders
    unit: "%"
    direction: target_band
    decisionsSupported: [oms.d.split_shipment, oms.d.sourcing_rule]
  - id: oms.kpi.cost_to_serve_per_channel
    name: Cost-to-Serve per Channel
    formula: sum(fulfillment_cost) / count(orders) by channel
    unit: USD
    direction: lower_is_better
    decisionsSupported: [oms.d.sourcing_rule, oms.d.carrier_selection, oms.d.dark_store_designation]
  - id: oms.kpi.on_time_delivery
    name: On-Time Delivery %
    formula: orders_delivered_by_promise / orders_delivered
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [oms.d.promise_window, oms.d.carrier_selection]
  - id: oms.kpi.promise_vs_actual_gap
    name: Promise vs Actual Gap
    formula: avg(actual_delivery_ts - promised_delivery_ts)
    unit: hours
    direction: lower_is_better
    decisionsSupported: [oms.d.promise_window]
  - id: oms.kpi.cancellation_rate
    name: Cancellation Rate
    formula: cancelled_lines / accepted_lines
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [oms.d.cancel_or_substitute, oms.d.atp_safety_stock]
  - id: oms.kpi.substitution_rate
    name: Substitution Rate
    formula: substituted_lines / cancelled_lines
    unit: "%"
    direction: target_band
    decisionsSupported: [oms.d.cancel_or_substitute]
  - id: oms.kpi.return_cycle_time
    name: Return Cycle Time
    formula: avg(refund_issued_ts - return_initiated_ts)
    unit: days
    direction: lower_is_better
    decisionsSupported: [oms.d.return_reroute]
  - id: oms.kpi.first_pick_fill_rate
    name: First-Pick Fill Rate
    formula: lines_filled_first_attempt / lines_picked
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [oms.d.sourcing_rule, oms.d.atp_safety_stock]

dataModel:
  entities:
    - name: customer
      description: Unified customer (golden record) collapsed across .com, store loyalty, and call-center identifiers. Drives the Visa/Mastercard cardholder linkage on returns + the loyalty linkage on BOPIS.
      keys: [customer_id]
      attributes:
        - { name: customer_id, type: varchar(32), isPrimaryKey: true }
        - { name: golden_record_id, type: varchar(32), description: "Cross-channel master ID stitched by Customer Identity Resolution" }
        - { name: email_hash, type: varchar(64) }
        - { name: phone_hash, type: varchar(64) }
        - { name: loyalty_id, type: varchar(32) }
        - { name: home_country_iso2, type: varchar(2) }
        - { name: created_at, type: timestamp }
        - { name: status, type: varchar(16), description: "active|merged|suppressed" }

    - name: location
      description: Any node that can hold inventory or fulfill an order — store, DC, dark store, vendor drop-ship, partner forward-stocking.
      keys: [location_id]
      attributes:
        - { name: location_id, type: varchar(16), isPrimaryKey: true }
        - { name: gln, type: varchar(13), description: "GS1 Global Location Number" }
        - { name: name, type: varchar(255) }
        - { name: location_type, type: varchar(16), description: "store|dc|dark_store|drop_ship|partner|locker" }
        - { name: country_iso2, type: varchar(2) }
        - { name: region, type: varchar(64) }
        - { name: timezone, type: varchar(32) }
        - { name: lat, type: "decimal(9,6)" }
        - { name: lon, type: "decimal(9,6)" }
        - { name: bopis_enabled, type: boolean }
        - { name: ship_from_enabled, type: boolean }
        - { name: pick_capacity_per_hour, type: integer, description: "labor-derived hourly pick budget" }
        - { name: status, type: varchar(16) }

    - name: product
      description: SKU master mirrored from RMS; carries the GTIN-14 used for ATP keys. Distinct from the merchandising anchor's product to keep OMS deployable standalone.
      keys: [product_id]
      attributes:
        - { name: product_id, type: varchar(32), isPrimaryKey: true }
        - { name: gtin, type: varchar(14), description: "GS1 GTIN-14" }
        - { name: sku, type: varchar(32) }
        - { name: name, type: varchar(255) }
        - { name: category_id, type: varchar(32) }
        - { name: hazmat_flag, type: boolean, description: "Restricts carrier choice + parcel routing" }
        - { name: weight_grams, type: integer }
        - { name: dimensional_weight_grams, type: integer }
        - { name: pack_type, type: varchar(16), description: "each|inner|case" }
        - { name: status, type: varchar(16) }

    - name: inventory_position
      description: Effective-dated quantity at a location × product, separated by state (on_hand, allocated, in_transit, reserved). The atomic input to ATP.
      keys: [position_id]
      attributes:
        - { name: position_id, type: varchar(32), isPrimaryKey: true }
        - { name: location_id, type: varchar(16), isForeignKey: true, references: location.location_id }
        - { name: product_id, type: varchar(32), isForeignKey: true, references: product.product_id }
        - { name: on_hand_units, type: integer }
        - { name: allocated_units, type: integer, description: "Reserved against open allocations" }
        - { name: in_transit_units, type: integer, description: "Inbound from another node" }
        - { name: reserved_safety_units, type: integer, description: "Safety stock the ATP engine refuses to promise" }
        - { name: atp_units, type: integer, description: "Available-To-Promise = on_hand - allocated - reserved_safety" }
        - { name: source_system, type: varchar(32), description: "Manhattan|Sterling|SFOMS|Shopify|RMS|Kibo|Fluent|WMS" }
        - { name: as_of_ts, type: timestamp, description: "EDI 846 / inventory snapshot timestamp" }
        - { name: refresh_lag_seconds, type: integer, description: "Lag from source change to OMS visibility" }

    - name: order
      description: Order header — channel of capture, customer, payment summary, and lifecycle state. Created by .com checkout, store POS endless-aisle, call-center, marketplace, or kiosk.
      keys: [order_id]
      attributes:
        - { name: order_id, type: varchar(32), isPrimaryKey: true }
        - { name: customer_id, type: varchar(32), isForeignKey: true, references: customer.customer_id }
        - { name: capture_channel, type: varchar(16), description: "web|app|store_pos|kiosk|call_center|marketplace|agent" }
        - { name: capture_location_id, type: varchar(16), description: "Store ID for endless-aisle / kiosk; null for web" }
        - { name: order_total_minor, type: bigint }
        - { name: currency, type: varchar(3) }
        - { name: tax_minor, type: bigint }
        - { name: shipping_minor, type: bigint }
        - { name: discount_minor, type: bigint }
        - { name: payment_status, type: varchar(16), description: "authorized|captured|partial|refunded|voided" }
        - { name: order_status, type: varchar(16), description: "captured|sourced|in_fulfillment|partial_shipped|shipped|delivered|picked_up|cancelled|returned" }
        - { name: promise_delivery_ts, type: timestamp, description: "Quoted at checkout per Manhattan Active Promise / Sterling OPP" }
        - { name: captured_at, type: timestamp }
        - { name: closed_at, type: timestamp }

    - name: order_line
      description: One SKU on an order — the fulfillment grain. Each line carries its own sourcing decision, promise, and lifecycle.
      keys: [order_line_id]
      attributes:
        - { name: order_line_id, type: varchar(32), isPrimaryKey: true }
        - { name: order_id, type: varchar(32), isForeignKey: true, references: order.order_id }
        - { name: product_id, type: varchar(32), isForeignKey: true, references: product.product_id }
        - { name: line_number, type: smallint }
        - { name: quantity, type: integer }
        - { name: unit_price_minor, type: bigint }
        - { name: line_total_minor, type: bigint }
        - { name: fulfillment_method, type: varchar(16), description: "ship_to_home|bopis|sfs|curbside|delivery|drop_ship|same_day" }
        - { name: requested_location_id, type: varchar(16), description: "Customer-chosen pickup store for BOPIS" }
        - { name: line_status, type: varchar(16), description: "open|sourced|allocated|picked|packed|shipped|delivered|picked_up|cancelled|substituted|returned" }
        - { name: substitution_for_line_id, type: varchar(32), description: "If this line is the substitute for an out-of-stock original" }

    - name: sourcing_rule
      description: Configurable rule fragment used by the distributed-order broker. Order lines are scored against rules to pick a fulfillment node.
      keys: [rule_id]
      attributes:
        - { name: rule_id, type: varchar(32), isPrimaryKey: true }
        - { name: rule_name, type: varchar(128) }
        - { name: priority, type: smallint, description: "Lower = evaluated first" }
        - { name: condition_json, type: text, description: "Manhattan/Sterling/Fluent rule DSL — channel, region, weight, hazmat, etc." }
        - { name: cost_weight, type: "decimal(5,4)" }
        - { name: speed_weight, type: "decimal(5,4)" }
        - { name: capacity_weight, type: "decimal(5,4)" }
        - { name: clearance_pull_weight, type: "decimal(5,4)", description: "Bias to drain stores with surplus aging stock" }
        - { name: effective_from, type: timestamp }
        - { name: effective_to, type: timestamp }
        - { name: status, type: varchar(16) }

    - name: allocation
      description: Concrete decision binding an order_line to a fulfillment node + inventory position. Issued by the Distributed Order Management broker after sourcing rules score the candidates.
      keys: [allocation_id]
      attributes:
        - { name: allocation_id, type: varchar(32), isPrimaryKey: true }
        - { name: order_line_id, type: varchar(32), isForeignKey: true, references: order_line.order_line_id }
        - { name: location_id, type: varchar(16), isForeignKey: true, references: location.location_id }
        - { name: rule_id, type: varchar(32), description: "Winning sourcing_rule.rule_id" }
        - { name: allocated_quantity, type: integer }
        - { name: estimated_cost_minor, type: bigint, description: "Predicted cost-to-serve at allocation time" }
        - { name: estimated_ready_ts, type: timestamp, description: "BOPIS ready-for-pickup or ship-from-store ship-by" }
        - { name: estimated_delivery_ts, type: timestamp }
        - { name: status, type: varchar(16), description: "issued|accepted|rejected|reallocated|completed" }
        - { name: allocated_at, type: timestamp }

    - name: fulfillment_event
      description: One state-transition or workflow event in the lifecycle of an allocation — pick_started, pick_complete, pack, ship, deliver, fail, reallocate. Event-sourced (Fluent Commerce style).
      keys: [event_id]
      attributes:
        - { name: event_id, type: varchar(32), isPrimaryKey: true }
        - { name: allocation_id, type: varchar(32), isForeignKey: true, references: allocation.allocation_id }
        - { name: order_line_id, type: varchar(32), isForeignKey: true, references: order_line.order_line_id }
        - { name: location_id, type: varchar(16), isForeignKey: true, references: location.location_id }
        - { name: event_type, type: varchar(32), description: "pick_started|pick_complete|substitution|short_pick|pack|label|ship|in_transit|out_for_delivery|delivered|pickup_ready|pickup_complete|cancel|reallocate|return_initiated|return_received|refund_issued" }
        - { name: occurred_at, type: timestamp }
        - { name: actor_role, type: varchar(16), description: "system|store_associate|warehouse_picker|carrier|customer" }
        - { name: actor_id, type: varchar(32) }
        - { name: payload_json, type: text }

    - name: shipment
      description: Physical parcel handed to a carrier. Many-to-one with allocation when split across boxes; one-to-one with the EDI 945 ship advice.
      keys: [shipment_id]
      attributes:
        - { name: shipment_id, type: varchar(32), isPrimaryKey: true }
        - { name: allocation_id, type: varchar(32), isForeignKey: true, references: allocation.allocation_id }
        - { name: tracking_number, type: varchar(64) }
        - { name: carrier, type: varchar(16), description: "fedex|ups|usps|dhl|store_courier|ontrac|lasership|same_day" }
        - { name: service_level, type: varchar(32), description: "ground|2day|next_day|same_day|economy|home_delivery" }
        - { name: ship_from_location_id, type: varchar(16) }
        - { name: ship_to_postal, type: varchar(16) }
        - { name: ship_to_country_iso2, type: varchar(2) }
        - { name: weight_grams, type: integer }
        - { name: cost_minor, type: bigint }
        - { name: shipped_at, type: timestamp }
        - { name: delivered_at, type: timestamp }
        - { name: status, type: varchar(16), description: "label_created|in_transit|out_for_delivery|delivered|exception|returned" }

    - name: return_authorization
      description: RMA covering a customer's return of one or more order_lines. Routes per oms.d.return_reroute decision; settles refund + restock.
      keys: [rma_id]
      attributes:
        - { name: rma_id, type: varchar(32), isPrimaryKey: true }
        - { name: order_id, type: varchar(32), isForeignKey: true, references: order.order_id }
        - { name: customer_id, type: varchar(32), isForeignKey: true, references: customer.customer_id }
        - { name: return_reason, type: varchar(32), description: "wrong_item|defective|too_small|too_large|did_not_like|late|damaged_in_transit|other" }
        - { name: return_method, type: varchar(16), description: "in_store|mail|carrier_pickup|locker" }
        - { name: return_location_id, type: varchar(16), description: "Selected return node" }
        - { name: refund_method, type: varchar(16), description: "original_tender|store_credit|gift_card|exchange" }
        - { name: refund_amount_minor, type: bigint }
        - { name: restock_outcome, type: varchar(16), description: "restocked|damaged|donated|destroyed|return_to_vendor" }
        - { name: initiated_at, type: timestamp }
        - { name: received_at, type: timestamp }
        - { name: refund_issued_at, type: timestamp }
        - { name: status, type: varchar(16), description: "initiated|in_transit|received|inspected|refunded|cancelled" }

  relationships:
    - { from: order, to: customer, kind: many_to_one }
    - { from: order_line, to: order, kind: many_to_one }
    - { from: order_line, to: product, kind: many_to_one }
    - { from: inventory_position, to: location, kind: many_to_one }
    - { from: inventory_position, to: product, kind: many_to_one }
    - { from: allocation, to: order_line, kind: many_to_one }
    - { from: allocation, to: location, kind: many_to_one }
    - { from: fulfillment_event, to: allocation, kind: many_to_one }
    - { from: fulfillment_event, to: order_line, kind: many_to_one }
    - { from: shipment, to: allocation, kind: many_to_one }
    - { from: return_authorization, to: order, kind: many_to_one }
    - { from: return_authorization, to: customer, kind: many_to_one }

