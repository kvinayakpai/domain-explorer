ingestionChallenges:
  - High-frequency inventory deltas — every store, DC, and dark store emits per-second on-hand movements; the OMS ingest must absorb 10k+ events/sec without lag drifting past the 60-second ATP staleness budget.
  - Event-sourced order state with out-of-order arrival — Fluent Commerce / Sterling-style event journals can deliver `pick_complete` before `pick_started` under partition retries; the staging layer must idempotently replay events and reconstruct lifecycle.
  - Multi-source inventory truth — Manhattan WMS, store handheld counts, and POS-side cycle counts disagree by 0.5-3% on any given day; reconciliation is a continuous process, not a batch.
  - Carrier webhooks are noisy and partial — FedEx and UPS push tracking events with minute-scale duplicates; USPS only updates at sortation scans; correlation by tracking_number requires deduplication and gap-filling.
  - Store-network partitions — store fulfillment workstations frequently lose VPN; queued events arrive in bursts when connectivity restores, with timestamps from the disconnected window.
  - PII propagation in shipping payloads — every shipment record carries customer name + address; tokenization must happen at the OMS boundary before it lands in the data warehouse to avoid a CCPA / GDPR Art. 5 problem.

integrationChallenges:
  - name: ATP staleness vs availability latency
    description: Surfacing fresh ATP at the storefront requires sub-second propagation from store on-hand mutations to the .com inventory cache. Most retailers settle at 30-90 second cache TTLs, which is fine until a flash promotion blows through 30s of demand at one store before the cache refreshes — then the same SKU is over-promised across 100 web sessions.
    mitigation: Adopt a tiered ATP cache (per-node hot cache + chain-wide aggregate) with safety reservations sized by the store's peak per-second sell rate; promote a near-real-time inventory event bus (Manhattan Active Inventory or Kafka CDC) over polled snapshots; expose ATP as a streamed resource not a cached blob.
  - name: Sourcing rule drift across vendors
    description: Each OMS expresses sourcing rules in a different DSL — Manhattan's strategies, Sterling's business rule framework, Fluent's GraphQL rules, Salesforce OMS flows. Cross-vendor migration loses or distorts rule semantics, and consolidating multi-banner retailers ends up with three OMSes and three rule sets that disagree on edge cases.
    mitigation: Maintain a vendor-neutral rule registry (sourcing_rule.condition_json) with a translation layer that round-trips through each vendor's DSL; cohort-test new rules in shadow mode before promoting to production; freeze rule semantics with a regression suite that replays last 30 days of orders.
  - name: Split-shipment cost vs promise tradeoff
    description: A two-line order can be sourced from one DC for a single ship-cost or split across two stores for a faster promise. The cost-versus-promise decision is the central economic question of distributed OMS; doing it badly bleeds margin.
    mitigation: Quantify both sides in the allocation step — capture estimated_cost_minor and estimated_delivery_ts on every candidate node; let the per-rule weights (cost_weight, speed_weight) reflect channel-economic policy; report Order Split Rate against a per-banner target band.
  - name: BOPIS pickup handoff data loss
    description: Customer orders BOPIS, store associate picks the line at 2pm, but the in-store pickup-counter check-in system is a separate POS module. The store_pickup_complete event misses 5-15% of the time, leaving orders stuck in `ready_for_pickup` for days.
    mitigation: Wire the in-store pickup-counter scanner directly to the OMS via a POS webhook; reconcile nightly against EOD store_credit settlement; auto-close orders aged >7 days in `ready_for_pickup` after a customer-reachout job.
  - name: Carrier tracking event correlation
    description: A single FedEx parcel emits 6-12 tracking events; UPS sometimes emits "out for delivery" twice; USPS often skips intermediate scans entirely. Correlating these into the canonical `delivered_at` for the `On-Time Delivery %` KPI requires per-carrier event normalization plus gap-filling logic.
    mitigation: Build per-carrier event-mapping tables; deduplicate by (tracking_number, event_type, scan_ts) within a 60s window; treat a missing intermediate scan as inferred not absent; report OTD with confidence interval where carrier data is sparse.
  - name: Returns reverse-logistics visibility
    description: A customer drops a return at a UPS Store; UPS scans it days later; the package shows up at the retailer's central returns hub a week after that. Until inspection, the refund is held — but customers expect refunds within 48 hours.
    mitigation: Trigger the refund on first carrier scan (return_initiated_at) for trusted-customer cohorts; settle to inspected-then-restocked outcome via a downstream true-up; per-RMA visibility on inspected vs in-transit vs awaiting-receipt.
  - name: Endless aisle inventory commitment from POS
    description: A store associate at register uses Aptos ONE's endless-aisle to promise a SKU not on the rack, sourced from the chain's pool. If the inventory commitment isn't atomic with the ATP read, two associates in different stores can promise the last unit at the same moment.
    mitigation: Implement a strong allocation lock at ATP-decrement time (Manhattan Active OM commit semantics); fall back to soft reservation with a 10-minute hold that auto-releases if not confirmed; surface clear failure UX to the associate when the lock is denied.
  - name: Distributed order state consistency
    description: The order is `partial_shipped` after one of three lines ships, but the store-side pick app still shows it `open` because the partial-fulfillment event hasn't propagated. Customer service sees inconsistent state and either over-refunds or under-services.
    mitigation: Adopt event-sourced order state (Fluent Commerce model); every consumer derives state from the event log rather than a cached header status; expose a read-model latency SLO and alert when consumer derived-state lags producer events.

