ingestionChallenges:
  - HL7 v2 z-segments and locally-defined fields differ across hospitals — require per-tenant mapping.
  - High ADT throughput (thousands of msgs/sec) at metro health systems with strict ordering by patient_id.
  - FHIR Bulk Data exports return NDJSON files that can exceed 100GB per resource type.
  - Patient identity matching across master patient indexes (MPI) requires probabilistic record linkage.
  - Rate limits on Epic / Cerner FHIR APIs vary by tenant and require token bucket smoothing.
  - USCDI v3 element gaps in legacy v2 feeds need separate enrichment pipelines.

integrationChallenges:
  - 21st Century Cures Act information blocking exceptions — must respect Consent.provision deny rules.
  - HIPAA minimum-necessary requires SMART scope filtering at the resource level.
  - Conflict between Epic/Cerner USCDI implementations and downstream payer profile expectations (Da Vinci PDex).
  - C-CDA narrative drift — only structured sections are reliably parseable.
  - SMART backend services key rotation across many JWT-issuing apps requires KMS automation.
  - GDPR/data-residency for cross-border deployments where European tenants share an EHR vendor.
