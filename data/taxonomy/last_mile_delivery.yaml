id: last_mile_delivery
name: Last Mile Delivery
vertical: Retail
oneLiner: Final-mile delivery orchestration to consumer doorstep including gig and 3PL fleets.

personas:
  - { name: 'Head of Delivery', title: 'Head of Last-Mile Delivery', level: Director }
  - { name: 'Routing Manager', title: 'Route Optimisation Manager', level: Manager }
  - { name: 'Driver Ops Lead', title: 'Driver Operations Lead', level: Manager }

kpis:
  - { id: lm.kpi.on_time, name: 'On-Time Delivery', formula: 'on_time / total', unit: '%', direction: higher_is_better }
  - { id: lm.kpi.cost_per_drop, name: 'Cost per Drop', formula: 'cost / drops', unit: 'USD', direction: lower_is_better }
  - { id: lm.kpi.first_attempt, name: 'First Attempt Success', formula: 'first_attempt_ok / total', unit: '%', direction: higher_is_better }
  - { id: lm.kpi.utilisation, name: 'Vehicle Utilisation', formula: 'drops / capacity', unit: '%', direction: higher_is_better }
  - { id: lm.kpi.csat, name: 'Delivery CSAT', formula: 'positive / responses', unit: '%', direction: higher_is_better }

dataModel:
  entities:
    - { name: Shipment, description: 'Outbound shipment' }
    - { name: Route, description: 'Optimised driver route' }
    - { name: Stop, description: 'Individual stop on a route' }
    - { name: Driver, description: 'Driver / courier' }
    - { name: Vehicle, description: 'Delivery vehicle' }
    - { name: ProofOfDelivery, description: 'Signature/photo POD' }

sourceSystems:
  - { vendor: 'Bringg', product: 'Last Mile', category: 'Delivery Platform' }
  - { vendor: 'Onfleet', product: 'Routing', category: 'Routing' }
  - { vendor: 'FarEye', product: 'Eye-On-Delivery', category: 'Delivery Platform' }
  - { vendor: 'DispatchTrack', product: 'Last Mile', category: 'Delivery Platform' }
  - { vendor: 'Stuart', product: 'Couriers', category: 'Gig Network' }

connectors:
  - { type: 'REST', protocol: 'HTTPS', auth: 'OAuth2' }
  - { type: 'Webhook', protocol: 'HTTPS', auth: 'HMAC' }
  - { type: 'Mobile SDK', protocol: 'HTTPS', auth: 'OAuth2' }
