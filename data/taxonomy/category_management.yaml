ingestionChallenges:
  - Syndicated panels (Circana, NielsenIQ, Numerator, Kantar) project to different geographies (TotalUS, TotalUS-Food, banner-specific, panel-only) at different cadences; union-vs-projection rules must be enforced per metric so velocity and share are not double-counted.
  - GTIN-to-internal-SKU mapping is brittle — pack repacks, promo bonus packs, and seasonal variants spawn new GTINs that the master data team back-dates by weeks, leaving syndicated rows orphaned in staging and breaking %ACV distribution coverage dashboards.
  - Planogram authoring tools (Blue Yonder, Symphony, RELEX, Quad) emit binary or proprietary XML files (PSA/POG/PLN) that must be parsed for position-level facings, dimensions, and adjacencies — text extraction is fragile and version-dependent.
  - Audit-photo evidence (AFS Customer Connect, Numerator photo crowd, Salesforce CG Cloud) lands days after the audit visit, sometimes weeks; compliance KPIs must be late-binding and re-publish when photo audits land.
  - Attribute hierarchy drift — flavor / pack format / claim attributes change definition over time as marketing introduces new sub-segments; the consumer-decision-tree axis must be versioned, not just the SKU.
  - EDI 852 store coverage is uneven (Walmart daily, Kroger weekly, regional grocers monthly or never); the assortment-compliance fact must blend EDI for in-flight monitoring with Circana / NielsenIQ panels for closeout.

integrationChallenges:
  - name: Reconciling planogram authoring to scan reality
    description: A category captain authors a planogram in Blue Yonder Space Planning with 84 SKUs across 11 shelves; the retailer's scan data shows 92 SKUs ringing in that store, 4 of which are not on the planogram and 12 mandated SKUs missing. Reconciling planogram-as-authored to shelf-as-scanned requires position-level joins that frequently fall back to fuzzy GTIN matching.
    mitigation: Persist planogram_position with explicit GTIN bindings; build a daily reconciliation job that compares scan-data SKU set to planogram SKU set per store; surface the "on-shelf, not on planogram" and "on planogram, not on shelf" buckets as audit-grade DQ checks.
  - name: Syndicated panel projection vs scan census mismatch
    description: Circana Unify and NielsenIQ Connect project from panel households to total category at 8-12 week latency; retailer EDI 852 is store-census at 2-5 day latency but covers only the participating banner. A category sales growth number computed against panel data and one computed against EDI 852 will disagree by 5-20%, and the dashboard hides which it used.
    mitigation: Tag every syndicated_measurement row with source + projection_factor + panel_id; downstream category share metrics always declare source policy (panel for closeout, EDI for in-flight); expose the panel-EDI delta as a guardrail metric, not a hidden field.
  - name: Pack-master volatility — GTIN repacks and bonus packs
    description: A 12-pack with 20%-extra-free is a new GTIN that the master data team back-dates by weeks; the new GTIN's syndicated rows sit unjoined to the pack-tier hierarchy, disappear from velocity dashboards, and resurface as "unknown SKU" anomalies in range-review prep.
    mitigation: Run a daily orphan-row report on syndicated_measurement.sku_id IS NULL; stand up a master-data SLA on GS1 GDSN ingest; treat back-dated GTINs as a tracked gtin_repack_event class with explicit fall-through rules and a 4-week grace window.
  - name: Cluster definition is silent infrastructure
    description: Store clusters drive assortment differentiation — premium / mainstream / value, or Hispanic-skew / pet-owner-heavy / urban — but cluster membership is set once a year and then forgotten. By month nine of a planogram cycle, the cluster definition is stale, demographic data has drifted, and the assortment is locked to the wrong axis.
    mitigation: Implement bi-temporal cluster assignment (effective_from, recorded_at); attach the cluster definition signature to every assortment decision so range-review impact can be re-evaluated when the cluster is refreshed; alert when cluster centroid drifts >X% from definition.
  - name: Adjacency rules vs space optimizer conflict
    description: The space optimizer (Blue Yonder, RELEX) wants to compress facings to maximise $/linear-ft productivity; the category captain demands brand-block adjacency for halo; the retailer demands a private-label position next to every national-brand leader. Optimizer-generated planograms reject the human-policy constraints unless the constraints are explicit.
    mitigation: Encode adjacency policies as hard / soft constraints on the planogram_position model; require the optimizer run to declare which constraints were hard-bound vs relaxed; persist the relaxation report so the merchant can audit trade-offs.
  - name: Range-review decision lineage
    description: A SKU drop decision in a range review must be defensible months later when the manufacturer's KAM disputes it — what shopper data, what velocity, what halo, what private-label balance argued for the drop. Without a decision-lineage record, the conversation devolves into politics.
    mitigation: Persist range_review_decision with rationale + confidence + the snapshot of velocity/halo/cannibalization that informed it; treat the decision row as a content-addressable audit artifact; surface in a Buyer Conversation pack alongside every disputed delist.
  - name: Must-have SKU intersection across banners
    description: Walmart's must-have list and Kroger's must-have list differ; a manufacturer's pan-banner assortment matrix has to satisfy both with a single SKU set per category × cluster. The intersection logic — "must-stock at >70% of either banner's must-haves" — is non-trivial and easy to get wrong, with eight-figure consequences.
    mitigation: Maintain a per-banner must_have_skus list per range review; compute the union/intersection in a dedicated mart with policy-tagged thresholds; surface the disagreement matrix as a buyer-facing diff before range-review presentation.
  - name: Innovation slot vs incumbent cannibalization
    description: Launching a new flavor takes a slot that has to come from somewhere — usually from a slower-velocity incumbent in the same brand. The cannibalization math is rarely declared up front, so post-launch the innovation looks accretive when it is actually mostly migrating volume from the brand's other SKUs.
    mitigation: Define a cannibalization basket per innovation SKU at launch (default: same brand + adjacent attribute tree); compute Innovation Sales % net of basket cannibalization; require the launch business case to declare basket and tolerance up-front; revisit at first range review.
  - name: Category captain vs validator manufacturer alignment
    description: One manufacturer holds the captain seat in a category (e.g. Coke in CSDs); a competing validator manufacturer (e.g. Pepsi) reviews and challenges captain recommendations. Both work off the same Circana / NielsenIQ data but with different incentive structures, and the retailer ultimately decides. Data must be presented with vendor-neutral attribution and audit trail.
    mitigation: Persist captain vs validator role on every range-review record; expose the same syndicated_measurement view to both; record contested recommendations and decision rationale to keep the process auditable.

