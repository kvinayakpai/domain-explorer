id: payments
name: Payments
vertical: BFSI
oneLiner: End-to-end money movement across rails (cards, ACH, wires, real-time) with auth, clearing, settlement, and dispute handling.

personas:
  - { name: Head of Payments, title: Head of Payments, level: VP }
  - { name: Payments Ops Lead, title: Payments Operations Lead, level: Director }
  - { name: Fraud/Risk Lead, title: Head of Payment Fraud & Risk, level: Director }
  - { name: CFO, title: Chief Financial Officer, level: C-suite }

decisions:
  - { id: pay.d.rail, statement: Choose the cheapest reliable rail per transaction profile. }
  - { id: pay.d.fraud_threshold, statement: Tune fraud auth thresholds to balance false positives vs loss. }
  - { id: pay.d.dispute_invest, statement: Decide whether to contest or refund a chargeback. }
  - { id: pay.d.partner_mix, statement: Rebalance acquirer/processor mix by region and MCC. }

kpis:
  - id: pay.kpi.stp_rate
    name: STP Rate
    formula: straight_through_count / total_count
    unit: "%"
    direction: higher_is_better
    decisionsSupported: [pay.d.partner_mix]
  - id: pay.kpi.settlement_latency
    name: Settlement Latency
    formula: avg(settlement_ts - auth_ts)
    unit: hours
    direction: lower_is_better
    decisionsSupported: [pay.d.rail]
  - id: pay.kpi.chargeback_ratio
    name: Chargeback Ratio
    formula: chargebacks / sales_count
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [pay.d.dispute_invest, pay.d.fraud_threshold]
  - id: pay.kpi.afr
    name: Auth Failure Rate (AFR)
    formula: failed_auths / total_auths
    unit: "%"
    direction: lower_is_better
    decisionsSupported: [pay.d.fraud_threshold]
  - id: pay.kpi.interchange_revenue
    name: Interchange Revenue
    formula: sum(interchange_amount)
    unit: USD
    direction: higher_is_better
    decisionsSupported: [pay.d.partner_mix]
  - id: pay.kpi.dispute_resolution_time
    name: Dispute Resolution Time
    formula: avg(resolved_ts - opened_ts)
    unit: days
    direction: lower_is_better
    decisionsSupported: [pay.d.dispute_invest]

dataModel:
  entities:
    - name: merchant
      description: Authoritative party accepting payments; one row per onboarded merchant.
      keys: [merchant_id]
      attributes:
        - { name: merchant_id, type: varchar, isPrimaryKey: true }
        - { name: legal_name, type: varchar }
        - { name: mcc, type: varchar(4) }
        - { name: country_iso2, type: varchar(2) }
        - { name: onboarded_at, type: timestamp }
        - { name: is_active, type: boolean }
      relationships:
        - { to: transaction, kind: one_to_many, via: merchant_id }
    - name: card_token
      description: Tokenised representation of a payment instrument (PAN never stored).
      keys: [token_id]
      attributes:
        - { name: token_id, type: varchar, isPrimaryKey: true }
        - { name: masked_pan, type: varchar(19) }
        - { name: bin, type: varchar(8) }
        - { name: last4, type: varchar(4) }
        - { name: network, type: varchar(16) }
        - { name: issuer_country, type: varchar(2) }
      relationships:
        - { to: transaction, kind: one_to_many, via: token_id }
    - name: transaction
      description: A single payment attempt (auth + capture + settle lifecycle).
      keys: [transaction_id]
      attributes:
        - { name: transaction_id, type: varchar, isPrimaryKey: true }
        - { name: merchant_id, type: varchar, isForeignKey: true, references: merchant.merchant_id }
        - { name: token_id, type: varchar, isForeignKey: true, references: card_token.token_id }
        - { name: rail, type: varchar(16) }
        - { name: amount_minor, type: bigint }
        - { name: currency, type: varchar(3) }
        - { name: initiated_at, type: timestamp }
        - { name: status, type: varchar(16) }
      relationships:
        - { to: authorization, kind: one_to_many, via: transaction_id }
        - { to: settlement, kind: one_to_many, via: transaction_id }
        - { to: dispute, kind: one_to_many, via: transaction_id }
    - name: authorization
      description: Auth response from the issuer for a transaction.
      keys: [auth_id]
      attributes:
        - { name: auth_id, type: varchar, isPrimaryKey: true }
        - { name: transaction_id, type: varchar, isForeignKey: true, references: transaction.transaction_id }
        - { name: response_code, type: varchar(8) }
        - { name: approved, type: boolean }
        - { name: auth_ts, type: timestamp }
    - name: settlement
      description: Net settlement record posted by the acquirer/network.
      keys: [settlement_id]
      attributes:
        - { name: settlement_id, type: varchar, isPrimaryKey: true }
        - { name: transaction_id, type: varchar, isForeignKey: true, references: transaction.transaction_id }
        - { name: settled_amount_minor, type: bigint }
        - { name: settled_at, type: timestamp }
        - { name: interchange_minor, type: bigint }
    - name: dispute
      description: Cardholder-initiated chargeback or representment.
      keys: [dispute_id]
      attributes:
        - { name: dispute_id, type: varchar, isPrimaryKey: true }
        - { name: transaction_id, type: varchar, isForeignKey: true, references: transaction.transaction_id }
        - { name: reason_code, type: varchar(16) }
        - { name: opened_at, type: timestamp }
        - { name: resolved_at, type: timestamp }
        - { name: outcome, type: varchar(16) }

dataModelArtifacts:
  threeNF: modeling/ddl/payments_3nf.sql
  vault: modeling/ddl/payments_vault.sql
  dimensional: modeling/ddl/payments_dim.sql

sourceSystems:
  - { vendor: Temenos, product: Transact, category: Core Banking }
  - { vendor: FIS, product: Profile, category: Core Banking }
  - { vendor: Finastra, product: Fusion, category: Payments Hub }
  - { vendor: ACI Worldwide, product: Enterprise Payments Platform, category: Payments Hub }
  - { vendor: SWIFT, product: Alliance, category: Messaging Network }
  - { vendor: Stripe, product: Payments, category: Acquirer/PSP }

connectors:
  - { type: SWIFT MT/ISO20022, protocol: MQ/file, auth: PKI }
  - { type: ACH/NACHA file, protocol: SFTP, auth: SSH key }
  - { type: REST/Webhook, protocol: HTTPS, auth: OAuth2/HMAC }
  - { type: ISO8583, protocol: TCP, auth: PKI/MAC }
  - { type: SAP RFC, protocol: RFC, auth: SAP user }

ingestionChallenges:
  - High-volume real-time event firehose with strict ordering guarantees per account.
  - Dual writes between core ledger and acquirer feeds requiring reconciliation.
  - Late-arriving settlement files that retroactively change daily totals.

integrationChallenges:
  - Heterogeneous message standards (ISO20022, ISO8583, NACHA, proprietary).
  - "PII/PCI scope: tokenization required before data leaves the secure zone."
  - Strict idempotency required across retries on every rail.
