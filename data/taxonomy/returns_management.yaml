id: returns_management
name: Returns Management
vertical: Retail
oneLiner: Reverse logistics, restocking, refunds, and disposition for returned merchandise.

personas:
  - { name: Returns Ops Director, title: Director of Reverse Logistics, level: Director }
  - { name: Refund Policy Lead, title: Returns Policy Lead, level: Manager }
  - { name: Loss Prevention Analyst, title: Returns Fraud Analyst, level: IC }

kpis:
  - { id: ret.kpi.return_rate, name: Return Rate, formula: returns / sales, unit: "%", direction: lower_is_better }
  - { id: ret.kpi.restock_pct, name: Restock-to-Sellable %, formula: resellable / received, unit: "%", direction: higher_is_better }
  - { id: ret.kpi.refund_cycle_time, name: Refund Cycle Time, formula: avg(refund_ts - return_ts), unit: hours, direction: lower_is_better }
  - { id: ret.kpi.return_fraud_rate, name: Return Fraud Rate, formula: flagged / total_returns, unit: "%", direction: lower_is_better }
  - { id: ret.kpi.shipping_recovery, name: Return Shipping Recovery, formula: shipping_charged / shipping_cost, unit: "%", direction: target_band }

sourceSystems:
  - { vendor: Narvar, product: Returns, category: Returns Platform }
  - { vendor: Loop, product: Returns, category: Returns Platform }
  - { vendor: Optoro, product: Returns Mgmt, category: Reverse Logistics }
  - { vendor: SAP, product: S/4HANA Retail, category: ERP }
  - { vendor: Manhattan, product: WMOS, category: WMS }

connectors:
  - { type: REST, protocol: HTTPS, auth: OAuth2 }
  - { type: EDI 180, protocol: AS2, auth: PKI }
  - { type: Webhook, protocol: HTTPS, auth: HMAC }
