name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node — lint + typecheck + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest
        run: pnpm --filter explorer-web test

  python:
    name: Python — ruff + mypy + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: uv sync
        run: uv sync --all-extras --dev

      - name: Install test deps
        run: uv pip install pytest networkx pyarrow faker mimesis

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy services/api/app packages/metadata/python/metadata

      - name: pytest
        run: uv run pytest
