version: 2

models:
  - name: stg_p_and_c_claims__claims
    description: Claim header with computed report_lag_days.
    columns:
      - name: claim_id
        tests: [unique, not_null]
      - name: policy_id
        tests: [not_null]
  - name: stg_p_and_c_claims__claim_payments
    description: Indemnity payments with typed timestamps.
    columns:
      - name: payment_id
        tests: [unique, not_null]
  - name: dim_policyholder
    description: Policyholder dimension keyed by md5(policyholder_id).
    columns:
      - name: policyholder_key
        tests: [unique, not_null]
      - name: policyholder_id
        tests: [unique, not_null]
  - name: dim_policy
    description: Policy dimension joined to its policyholder.
    columns:
      - name: policy_key
        tests: [unique, not_null]
      - name: policy_id
        tests: [unique, not_null]
      - name: policyholder_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_policyholder')
              field: policyholder_id
  - name: dim_adjuster
    description: Adjuster dimension with seniority band.
    columns:
      - name: adjuster_key
        tests: [unique, not_null]
      - name: adjuster_id
        tests: [unique, not_null]
  - name: dim_claim
    description: Claim dimension — descriptive attributes for each filed claim.
    columns:
      - name: claim_key
        tests: [unique, not_null]
      - name: claim_id
        tests: [unique, not_null]
      - name: policy_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_policy')
              field: policy_id
      - name: report_lag_band
        tests:
          - accepted_values:
              values: [same_day, within_week, within_month, late, unknown]
      - name: fraud_risk_band
        tests:
          - accepted_values:
              values: [low, medium, high, unknown]
  - name: dim_date
    description: Conformed daily date dimension for P&C claims.
    columns:
      - name: date_key
        tests: [unique, not_null]
  - name: fct_claims
    description: Grain = one row per claim, with rolled-up payments / reserves / FNOL.
    columns:
      - name: claim_key
        tests: [unique, not_null]
      - name: claim_id
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_claim')
              field: claim_id
  - name: fct_claims_daily
    description: Grain = one row per (FNOL date, peril). Daily claim volume / incurred / paid / reserve aggregates.
    columns:
      - name: claims_daily_key
        tests: [unique, not_null]
      - name: fnol_date_key
        tests: [not_null]
      - name: peril
        tests: [not_null]
  - name: fct_reserves
    description: Grain = one row per reserve posting against a claim.
    columns:
      - name: reserve_key
        tests: [unique, not_null]
      - name: reserve_id
        tests: [unique, not_null]
      - name: claim_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_claim')
              field: claim_id
      - name: reserve_category_norm
        tests:
          - accepted_values:
              values: [case, bulk, salvage, subrogation, other]
  - name: fct_payments
    description: Grain = one row per indemnity payment, with policy and peril context.
    columns:
      - name: payment_key
        tests: [unique, not_null]
      - name: payment_id
        tests: [unique, not_null]
      - name: claim_id
        tests:
          - relationships:
              to: ref('dim_claim')
              field: claim_id
  - name: fct_claim_payments
    description: Original grain = one row per indemnity payment (kept for back-compat with existing dashboards).
    columns:
      - name: payment_key
        tests: [unique, not_null]
      - name: payment_id
        tests: [unique, not_null]
