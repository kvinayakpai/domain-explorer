version: 2

models:
  - name: stg_demand_planning__forecasts
    description: Forecasts with computed PI relative width.
    columns:
      - name: forecast_id
        tests: [unique, not_null]
  - name: stg_demand_planning__shipments
    description: Outbound shipments with computed transit_hours.
    columns:
      - name: shipment_id
        tests: [unique, not_null]
  - name: dim_item
    description: Item dimension keyed by md5(item_id).
    columns:
      - name: item_key
        tests: [unique, not_null]
      - name: item_id
        tests: [unique, not_null]
  - name: dim_location
    description: Location dimension keyed by md5(location_id).
    columns:
      - name: location_key
        tests: [unique, not_null]
      - name: location_id
        tests: [unique, not_null]
  - name: dim_date_demand_planning
    description: Conformed daily date dimension reusing the planning calendar.
    columns:
      - name: date_key
        tests: [unique, not_null]
  - name: fct_demand
    description: Grain = one row per historical demand observation.
    columns:
      - name: demand_key
        tests: [unique, not_null]
      - name: demand_id
        tests: [unique, not_null]
      - name: item_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_item')
              field: item_id
      - name: location_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_location')
              field: location_id
  - name: fct_forecast
    description: Grain = one row per forecast prediction; surfaces forecast_qty and 80% prediction interval bands.
    columns:
      - name: forecast_key
        tests: [unique, not_null]
      - name: forecast_id
        tests: [unique, not_null]
      - name: item_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_item')
              field: item_id
      - name: pi_band
        tests:
          - accepted_values:
              values: [tight, moderate, wide, unknown]
  - name: fct_forecast_accuracy
    description: Grain = one row per forecast/error pair, with accuracy and PI hit-rate.
    columns:
      - name: accuracy_key
        tests: [unique, not_null]
      - name: error_id
        tests: [unique, not_null]
  - name: fct_shipments
    description: Grain = one row per outbound shipment line, with transit and on-time signals.
    columns:
      - name: shipment_key
        tests: [unique, not_null]
      - name: shipment_id
        tests: [unique, not_null]
      - name: delivery_status
        tests:
          - accepted_values:
              values: [on_time, late, in_transit]
      - name: transit_band
        tests:
          - accepted_values:
              values: [next_day, three_day, one_week, over_one_week, unknown]
  - name: fct_inventory_positions
    description: Grain = one row per inventory position observation.
    columns:
      - name: position_key
        tests: [unique, not_null]
      - name: position_id
        tests: [unique, not_null]
