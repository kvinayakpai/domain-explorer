version: 2

models:
  - name: stg_merchandising__sales_lines
    description: Light typing on POS sale lines.
    columns:
      - name: sale_line_id
        tests: [unique, not_null]
  - name: stg_merchandising__products
    description: SKU master with computed margin_at_msrp.
    columns:
      - name: sku
        tests: [unique, not_null]
  - name: dim_product
    description: Product dimension keyed by md5(sku).
    columns:
      - name: product_key
        tests: [unique, not_null]
      - name: sku
        tests: [unique, not_null]
      - name: vendor_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_vendor')
              field: vendor_id
  - name: dim_store
    description: Store dimension keyed by md5(store_id).
    columns:
      - name: store_key
        tests: [unique, not_null]
      - name: store_id
        tests: [unique, not_null]
  - name: dim_vendor
    description: Vendor dimension keyed by md5(vendor_id).
    columns:
      - name: vendor_key
        tests: [unique, not_null]
      - name: vendor_id
        tests: [unique, not_null]
  - name: dim_date_merchandising
    description: Conformed daily date dimension for merchandising.
    columns:
      - name: date_key
        tests: [unique, not_null]
  - name: fct_sales
    description: Grain = one row per POS sale line, with COGS / margin / return signals.
    columns:
      - name: sale_key
        tests: [unique, not_null]
      - name: sale_line_id
        tests: [unique, not_null]
      - name: sku
        tests:
          - relationships:
              to: ref('dim_product')
              field: sku
  - name: fct_sales_daily
    description: Grain = one row per (sale_date, store, channel). Daily aggregates rolled up from fct_sales.
    columns:
      - name: sales_daily_key
        tests: [unique, not_null]
      - name: sale_date_key
        tests: [not_null]
  - name: fct_inventory_snapshots
    description: Grain = one row per (snapshot, sku, store).
    columns:
      - name: snapshot_key
        tests: [unique, not_null]
      - name: snapshot_id
        tests: [unique, not_null]
  - name: fct_returns
    description: Grain = one row per return event.
    columns:
      - name: return_key
        tests: [unique, not_null]
      - name: return_id
        tests: [unique, not_null]
  - name: fct_markdowns
    description: Grain = one row per markdown event with vendor / category / band context.
    columns:
      - name: markdown_key
        tests: [unique, not_null]
      - name: markdown_id
        tests: [unique, not_null]
      - name: sku
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: sku
      - name: markdown_band
        tests:
          - accepted_values:
              values: [shallow, standard, deep, clearance]
