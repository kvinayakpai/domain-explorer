version: 2

sources:
  - name: payments_raw
    description: Raw event tables landed from the payments hub.
    tables:
      - name: authorizations
        description: One row per auth attempt — populated from acquirer feed.
      - name: settlements
        description: Settlement net file per merchant per day.
      - name: chargebacks
        description: Inbound dispute notifications.

  - name: claims_raw
    description: Raw extracts from Guidewire ClaimCenter.
    tables:
      - name: claims
      - name: claim_notes
      - name: payouts

  - name: retail_raw
    description: Raw POS + RMS extracts.
    tables:
      - name: pos_lines
      - name: inventory_positions
