# Local DuckDB profile.
# Either set DOMAIN_EXPLORER_DUCKDB to an absolute path to the populated
# `domain-explorer.duckdb`, or rely on the default (../../domain-explorer.duckdb)
# which works when running from modeling/dbt/.
domain_explorer:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DOMAIN_EXPLORER_DUCKDB', '../../domain-explorer.duckdb') }}"
      threads: 4
