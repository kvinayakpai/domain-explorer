# dbt profile for Postgres — generated by @domain-explorer/init for ${customer}.

${customer}:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PGHOST', 'localhost') }}"
      user: "{{ env_var('PGUSER', 'postgres') }}"
      password: "{{ env_var('PGPASSWORD') }}"
      port: "{{ env_var('PGPORT', '5432') | as_number }}"
      dbname: "{{ env_var('PGDATABASE', '${customer}_domain_explorer') }}"
      schema: "{{ env_var('PGSCHEMA', 'public') }}"
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
