# dbt profile for Snowflake — generated by @domain-explorer/init for ${customer}.
#
# Move/rename this to ~/.dbt/profiles.yml or invoke dbt with
#   DBT_PROFILES_DIR=./modeling/dbt --profile=snowflake
#
# Auth uses key-pair (recommended). Swap to password by replacing
# `private_key_path` with `password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"`.

${customer}:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'DOMAIN_EXPLORER_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'PUBLIC') }}"
      threads: 4
      client_session_keep_alive: false
      query_tag: "domain-explorer-${customer}"
